<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شجره نامه پرو</title>

<style>
body{margin:0;background:#0f172a;font-family:tahoma;color:white;text-align:center}
.header{padding:40px 20px;background:linear-gradient(135deg,#14532d,#0f172a)}
.box{max-width:1100px;margin:auto;padding:20px}
.card{background:#1e293b;padding:20px;border-radius:18px;margin-top:20px}
input,select,button{padding:11px;margin:6px;border-radius:10px;border:none;font-size:15px}
input,select{max-width:90%}
button{background:#22c55e;color:white;cursor:pointer}
.edit{background:#3b82f6}.delete{background:#ef4444}
.person{background:#0f172a;padding:12px;border-radius:12px;margin:8px 0;text-align:right}
.tree-area{overflow:auto;background:#020617;padding:30px;border-radius:18px;margin-top:20px}
.tree-node{display:inline-block;background:#2563eb;color:white;padding:12px 18px;border-radius:14px;min-width:140px;margin:10px;box-shadow:0 8px 20px rgba(0,0,0,.4)}
.tree-node.found{outline:4px solid #facc15;background:#ca8a04}
.tree-children{border-top:2px solid #64748b;margin-top:18px;padding-top:18px;display:flex;justify-content:center;gap:20px;flex-wrap:wrap}
.line{width:2px;height:20px;background:#64748b;margin:auto}
.avatar{width:70px;height:70px;border-radius:50%;object-fit:cover;border:3px solid white;display:block;margin:0 auto 8px}
.small-img{width:40px;height:40px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-left:8px}
.result{background:#020617;border:1px solid #334155;border-radius:12px;padding:12px;margin:8px;text-align:right}
</style>
</head>

<body>

<div class="header">
  <h1>🌳 شجره نامه پرو</h1>
  <p>ثبت افراد، فرزندان، عکس و جستجوی سریع</p>
</div>

<div class="box">

  <div class="card">
    <h2>➕ افزودن فرد اصلی</h2>
    <input id="name" placeholder="نام فرد">
    <input id="photo" type="file" accept="image/*">
    <button onclick="addPerson()">افزودن</button>
  </div>

  <div class="card">
    <h2>👶 افزودن فرزند</h2>
    <select id="parentSelect"></select>
    <input id="childName" placeholder="نام فرزند">
    <input id="childPhoto" type="file" accept="image/*">
    <button onclick="addChild()">افزودن فرزند</button>
  </div>

  <div class="card">
    <h2>🔎 جستجوی افراد</h2>
    <input id="searchInput" placeholder="نام فرد را جستجو کنید" oninput="searchPeople()">
    <button onclick="clearSearch()">پاک کردن جستجو</button>
    <div id="searchResults"></div>
  </div>

  <div class="card">
    <h2>📋 مدیریت افراد</h2>
    <div id="list"></div>
  </div>

  <div class="card">
    <h2>🌳 نمایش گرافیکی شجره</h2>
    <div id="tree" class="tree-area"></div>
  </div>

</div>

<script>
let people = JSON.parse(localStorage.getItem("people")) || [];
let currentSearch = "";

function save(){
  localStorage.setItem("people", JSON.stringify(people));
  render();
}

function fileToBase64(file, callback){
  if(!file){ callback(""); return; }
  let reader = new FileReader();
  reader.onload = function(e){ callback(e.target.result); };
  reader.readAsDataURL(file);
}

function addPerson(){
  let name = document.getElementById("name").value.trim();
  let photoFile = document.getElementById("photo").files[0];

  if(!name){
    alert("نام را وارد کنید");
    return;
  }

  fileToBase64(photoFile, function(photo){
    people.push({
      id: Date.now(),
      name: name,
      photo: photo,
      children: []
    });

    document.getElementById("name").value = "";
    document.getElementById("photo").value = "";
    save();
  });
}

function addChild(){
  let parentId = document.getElementById("parentSelect").value;
  let childName = document.getElementById("childName").value.trim();
  let childPhotoFile = document.getElementById("childPhoto").files[0];

  if(!childName){
    alert("نام فرزند را وارد کنید");
    return;
  }

  let parent = findPerson(people, parentId);

  fileToBase64(childPhotoFile, function(photo){
    if(parent){
      parent.children.push({
        id: Date.now(),
        name: childName,
        photo: photo,
        children: []
      });
    }

    document.getElementById("childName").value = "";
    document.getElementById("childPhoto").value = "";
    save();
  });
}

function findPerson(list, id){
  for(let p of list){
    if(p.id == id) return p;
    let found = findPerson(p.children || [], id);
    if(found) return found;
  }
  return null;
}

function editPerson(id){
  let person = findPerson(people, id);
  let newName = prompt("نام جدید را وارد کنید:", person.name);

  if(newName && newName.trim()){
    person.name = newName.trim();
    save();
  }
}

function deletePerson(id){
  if(!confirm("حذف شود؟")) return;
  people = deleteFromList(people, id);
  save();
}

function deleteFromList(list, id){
  return list
    .filter(p => p.id != id)
    .map(p => ({
      ...p,
      children: deleteFromList(p.children || [], id)
    }));
}

function renderOptions(list){
  let html = "";
  list.forEach(p => {
    html += `<option value="${p.id}">${p.name}</option>`;
    html += renderOptions(p.children || []);
  });
  return html;
}

function imgTag(photo, cls){
  if(photo){
    return `<img src="${photo}" class="${cls}">`;
  }
  return `<div class="${cls}" style="background:#334155;line-height:70px">👤</div>`;
}

function renderList(list){
  let html = "";

  list.forEach(p => {
    html += `
      <div class="person">
        ${p.photo ? `<img src="${p.photo}" class="small-img">` : "👤"}
        <strong>${p.name}</strong>
        <button class="edit" onclick="editPerson(${p.id})">ویرایش نام</button>
        <button class="delete" onclick="deletePerson(${p.id})">حذف</button>
        <div style="margin-right:25px">
          ${renderList(p.children || [])}
        </div>
      </div>
    `;
  });

  return html;
}

function renderTreeNode(p){
  let children = p.children || [];
  let foundClass = currentSearch && p.name.toLowerCase().includes(currentSearch.toLowerCase()) ? "found" : "";

  return `
    <div>
      <div class="tree-node ${foundClass}">
        ${imgTag(p.photo, "avatar")}
        <div>${p.name}</div>
      </div>
      ${
        children.length
        ? `<div class="line"></div><div class="tree-children">${children.map(renderTreeNode).join("")}</div>`
        : ""
      }
    </div>
  `;
}

function renderTree(){
  if(!people.length){
    return "<p>هنوز فردی ثبت نشده است.</p>";
  }
  return people.map(renderTreeNode).join("");
}

function flattenPeople(list, path=""){
  let all = [];
  list.forEach(p => {
    let currentPath = path ? path + " ← " + p.name : p.name;
    all.push({...p, path: currentPath});
    all = all.concat(flattenPeople(p.children || [], currentPath));
  });
  return all;
}

function searchPeople(){
  currentSearch = document.getElementById("searchInput").value.trim();
  let resultsBox = document.getElementById("searchResults");

  if(!currentSearch){
    resultsBox.innerHTML = "";
    render();
    return;
  }

  let all = flattenPeople(people);
  let results = all.filter(p => p.name.toLowerCase().includes(currentSearch.toLowerCase()));

  if(!results.length){
    resultsBox.innerHTML = "<p>نتیجه‌ای پیدا نشد.</p>";
  } else {
    resultsBox.innerHTML = results.map(p => `
      <div class="result">
        ${p.photo ? `<img src="${p.photo}" class="small-img">` : "👤"}
        <strong>${p.name}</strong>
        <br>
        <small>مسیر: ${p.path}</small>
      </div>
    `).join("");
  }

  render();
}

function clearSearch(){
  document.getElementById("searchInput").value = "";
  currentSearch = "";
  document.getElementById("searchResults").innerHTML = "";
  render();
}

function render(){
  document.getElementById("parentSelect").innerHTML = renderOptions(people);
  document.getElementById("list").innerHTML = renderList(people);
  document.getElementById("tree").innerHTML = renderTree();

  if(currentSearch){
    searchPeople();
  }
}

render();
</script>

</body>
</html>
