<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شجره‌نامه پرو</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  background:
    radial-gradient(circle at top right, rgba(34,197,94,.22), transparent 35%),
    radial-gradient(circle at top left, rgba(59,130,246,.18), transparent 35%),
    #0f172a;
  font-family:tahoma, Arial, sans-serif;
  color:white;
  text-align:center;
}

.header{
  padding:45px 20px;
  background:linear-gradient(135deg,#064e3b,#0f172a);
  border-bottom:1px solid rgba(255,255,255,.08);
  box-shadow:0 10px 40px rgba(0,0,0,.35);
}

.header h1{
  font-size:42px;
  margin:0 0 12px;
}

.header p{
  color:#cbd5e1;
  font-size:16px;
}

.box{
  max-width:1180px;
  margin:auto;
  padding:22px;
}

.card{
  background:rgba(30,41,59,.88);
  backdrop-filter:blur(10px);
  padding:22px;
  border-radius:22px;
  margin-top:22px;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 12px 35px rgba(0,0,0,.28);
}

.card h2{
  margin-top:0;
  color:#dcfce7;
}

input,select,textarea{
  padding:12px;
  margin:7px;
  border-radius:12px;
  border:1px solid #334155;
  font-size:15px;
  font-family:tahoma;
  background:#020617;
  color:white;
  outline:none;
}

input:focus,select:focus,textarea:focus{
  border-color:#22c55e;
  box-shadow:0 0 0 3px rgba(34,197,94,.15);
}

textarea{
  width:85%;
  min-height:75px;
}

button{
  padding:12px 18px;
  margin:6px;
  border-radius:12px;
  border:none;
  font-size:15px;
  font-family:tahoma;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;
  cursor:pointer;
  box-shadow:0 8px 18px rgba(34,197,94,.22);
}

button:hover{
  transform:translateY(-1px);
  opacity:.92;
}

.edit{
  background:linear-gradient(135deg,#3b82f6,#2563eb);
}

.delete{
  background:linear-gradient(135deg,#ef4444,#b91c1c);
}

.backup{
  background:linear-gradient(135deg,#f59e0b,#d97706);
}

.print{
  background:linear-gradient(135deg,#8b5cf6,#6d28d9);
}

.person{
  background:linear-gradient(135deg,#020617,#111827);
  padding:14px;
  border-radius:16px;
  margin:10px 0;
  text-align:right;
  border:1px solid rgba(255,255,255,.07);
}

.tree-area{
  overflow:auto;
  background:
    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px),
    #020617;
  background-size:30px 30px;
  padding:35px;
  border-radius:22px;
  margin-top:20px;
  border:1px solid rgba(255,255,255,.08);
}

.tree-node{
  display:inline-block;
  color:white;
  padding:16px 20px;
  border-radius:18px;
  min-width:170px;
  margin:12px;
  box-shadow:0 12px 28px rgba(0,0,0,.45);
  border:1px solid rgba(255,255,255,.18);
  transition:.2s;
}

.tree-node:hover{
  transform:scale(1.04);
}

.male{
  background:linear-gradient(135deg,#2563eb,#1e40af);
}

.female{
  background:linear-gradient(135deg,#db2777,#9d174d);
}

.unknown{
  background:linear-gradient(135deg,#64748b,#334155);
}

.tree-children{
  border-top:2px dashed #64748b;
  margin-top:20px;
  padding-top:20px;
  display:flex;
  justify-content:center;
  gap:22px;
  flex-wrap:wrap;
}

.line{
  width:3px;
  height:24px;
  background:linear-gradient(#22c55e,#64748b);
  margin:auto;
  border-radius:20px;
}

.info{
  font-size:13px;
  color:#e5e7eb;
  margin-top:7px;
  line-height:1.8;
}

.result{
  background:#020617;
  border:1px solid #334155;
  border-radius:14px;
  padding:14px;
  margin:10px;
  text-align:right;
}

.stats-box{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:14px;
}

.stat-item{
  background:linear-gradient(135deg,#020617,#111827);
  border:1px solid rgba(255,255,255,.08);
  padding:18px;
  border-radius:18px;
  min-width:150px;
  box-shadow:0 8px 25px rgba(0,0,0,.25);
}

.stat-item strong{
  font-size:24px;
  color:#22c55e;
}

.badge{
  display:inline-block;
  padding:4px 9px;
  border-radius:999px;
  background:#064e3b;
  color:#bbf7d0;
  font-size:12px;
}

@media(max-width:700px){
  .header h1{
    font-size:32px;
  }

  .box{
    padding:12px;
  }

  .card{
    padding:16px;
  }

  input,select,textarea{
    width:92%;
  }

  .tree-area{
    padding:18px;
  }

  .tree-node{
    min-width:140px;
    padding:13px;
  }
}

@media print{
  body{
    background:white;
    color:black;
  }

  .no-print{
    display:none !important;
  }

  .header{
    background:white;
    color:black;
    box-shadow:none;
  }

  .box{
    max-width:none;
    padding:0;
  }

  .card{
    background:white;
    color:black;
    border:none;
    box-shadow:none;
  }

  .tree-area{
    background:white;
    color:black;
    overflow:visible;
  }

  .tree-node{
    box-shadow:none;
    color:white;
  }

  button,input,select,textarea{
    display:none;
  }
}
