<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شجره نامه</title>

<style>
body{
  margin:0;
  font-family:tahoma;
  background:#0f172a;
  color:white;
  text-align:center;
}
.box{
  max-width:850px;
  margin:35px auto;
  background:#1e293b;
  padding:25px;
  border-radius:18px;
}
input,select,button{
  padding:12px;
  margin:8px;
  border-radius:10px;
  border:none;
  font-family:tahoma;
}
button{
  background:#22c55e;
  color:white;
}
.delete{
  background:#ef4444;
}
.person{
  background:#020617;
  margin:10px;
  padding:12px;
  border-radius:12px;
  text-align:right;
}
.child{
  margin-right:25px;
  color:#cbd5e1;
}
</style>
</head>

<body>

<div class="box">
<h1>🌳 شجره نامه</h1>

<h3>افزودن فرد اصلی</h3>
<input id="name" placeholder="نام فرد">
<button onclick="addPerson()">افزودن</button>

<h3>افزودن فرزند</h3>
<select id="parentSelect"></select>
<input id="childName" placeholder="نام فرزند">
<button onclick="addChild()">افزودن فرزند</button>

<hr>

<div id="list"></div>
</div>

<script>
var people = JSON.parse(localStorage.getItem("people") || "[]");

function save(){
  localStorage.setItem("people", JSON.stringify(people));
  show();
}

function addPerson(){
  var name = document.getElementById("name").value.trim();

  if(name === ""){
    alert("نام را وارد کنید");
    return;
  }

  people.push({
    name:name,
    children:[]
  });

  document.getElementById("name").value = "";
  save();
}

function addChild(){
  var parentIndex = document.getElementById("parentSelect").value;
  var childName = document.getElementById("childName").value.trim();

  if(childName === ""){
    alert("نام فرزند را وارد کنید");
    return;
  }

  people[parentIndex].children.push(childName);

  document.getElementById("childName").value = "";
  save();
}

function removePerson(index){
  people.splice(index,1);
  save();
}

function removeChild(parentIndex, childIndex){
  people[parentIndex].children.splice(childIndex,1);
  save();
}

function show(){
  var listHtml = "";
  var selectHtml = "";

  for(var i=0;i<people.length;i++){
    selectHtml += "<option value='"+i+"'>" + people[i].name + "</option>";

    listHtml += "<div class='person'>";
    listHtml += "👤 <strong>" + people[i].name + "</strong>";
    listHtml += " <button class='delete' onclick='removePerson("+i+")'>حذف</button>";

    for(var j=0;j<people[i].children.length;j++){
      listHtml += "<div class='child'>👶 " + people[i].children[j] +
      " <button class='delete' onclick='removeChild("+i+","+j+")'>حذف</button></div>";
    }

    listHtml += "</div>";
  }

  document.getElementById("list").innerHTML = listHtml;
  document.getElementById("parentSelect").innerHTML = selectHtml;
}

show();
</script>

</body>
</html>
