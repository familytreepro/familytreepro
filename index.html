function personById(id){id=String(id||'');return peopleCache.find(p=>String(p.id)===id)||null}function personName(id){const p=personById(id);return p?.fullName||'Ш«ШЁШӘ ЩҶШҙШҜЩҮ'}function childrenOf(id){id=String(id||'');return peopleCache.filter(p=>String(p.fatherId||'')===id||String(p.motherId||'')===id)}function getSpouseIds(p){const ids=new Set();if(p?.spouseId)ids.add(String(p.spouseId));(Array.isArray(p?.spouseIds)?p.spouseIds:[]).forEach(x=>x&&ids.add(String(x)));return [...ids]}function spousesOf(id){id=String(id||'');const ids=new Set();peopleCache.forEach(p=>{if(String(p.id)===id)getSpouseIds(p).forEach(x=>ids.add(String(x)));if(getSpouseIds(p).includes(id))ids.add(String(p.id));});return [...ids].map(personById).filter(Boolean)}function goProfile(id){if(!id||!personById(id))return;selectedPersonId=String(id);setRoute('profile')}window.goProfile=goProfile;
function generationOf(id,seen=new Set()){if(!id||seen.has(id)||!personById(id))return 0;seen.add(id);const p=personById(id);return Math.max(generationOf(p.fatherId,new Set(seen)),generationOf(p.motherId,new Set(seen)))+1}function countGenerations(){if(!peopleCache.length)return 0;return Math.max(1,...peopleCache.map(p=>generationOf(p.id)))}
function dependencyInfo(id){const ch=childrenOf(id),sp=spousesOf(id);return{children:ch,spouses:sp,count:ch.length+sp.length}}function parentsOf(id){const p=personById(id);return{father:personById(p?.fatherId),mother:personById(p?.motherId)}}function normalizeName(s){return String(s||'').trim().replace(/\s+/g,' ').toLowerCase()}function duplicatePerson(name,fatherId,exceptId=''){const n=normalizeName(name);return peopleCache.find(p=>p.id!==exceptId&&normalizeName(p.fullName)===n&&String(p.fatherId||'')===String(fatherId||''))}

function personOptions(g){return peopleCache.filter(p=>!g||p.gender===g).map(p=>`<option value="${esc(p.id)}">${esc(p.fullName||'ШЁШҜЩҲЩҶ ЩҶШ§Щ…')}</option>`).join('')}
function peopleList(list,open=false){const openAttr=open?' open':'';return`<details class="family-accordion"${openAttr}><summary><span>рҹ‘Ҙ Ш§ЩҒШұШ§ШҜ Ш®Ш§ЩҶЩҲШ§ШҜЩҮ</span><span class="family-count">${list.length} ЩҶЩҒШұ</span><span class="family-arrow">вҢ„</span></summary><div class="family-body"><div class="list">${list.map(p=>{const children=childrenOf(p.id),sp=spousesOf(p.id),gen=generationOf(p.id)||'-';const title=esc(p.fullName||'ШЁШҜЩҲЩҶ ЩҶШ§Щ…');const fatherTxt=p.fatherId?`<button class="link-person openProfile" data-id="${esc(p.fatherId)}">${esc(personName(p.fatherId))}</button>`:'Ш«ШЁШӘ ЩҶШҙШҜЩҮ';const motherTxt=p.motherId?`<button class="link-person openProfile" data-id="${esc(p.motherId)}">${esc(personName(p.motherId))}</button>`:'Ш«ШЁШӘ ЩҶШҙШҜЩҮ';const spouseTxt=sp.length?sp.map(x=>`<button class="link-person openProfile" data-id="${esc(x.id)}">${esc(x.fullName)}</button>`).join(' '):(p.spouseId?`<button class="link-person openProfile" data-id="${esc(p.spouseId)}">${esc(personName(p.spouseId))}</button>`:'Ш«ШЁШӘ ЩҶШҙШҜЩҮ');return`<div class="person-accordion" data-id="${esc(p.id)}"><button class="person-summary togglePerson" data-id="${esc(p.id)}" type="button"><span class="person-summary-main">${personListAvatarHtml(p)}<span class="person-title">рҹ‘Ө ${title}</span><span class="compact-badges"><span class="mini-pill">${p.gender==='female'?'ШІЩҶ':'Щ…ШұШҜ'}</span><span class="mini-pill">ЩҒШұШІЩҶШҜ: ${children.length}</span><span class="mini-pill">ЩҶШіЩ„ ${gen}</span></span></span><span class="person-arrow">вҢ„</span></button><div class="person-details"><div class="person-card-main"><small>ЩҫШҜШұ: ${fatherTxt} | Щ…Ш§ШҜШұ: ${motherTxt} | ЩҮЩ…ШіШұ: ${spouseTxt}</small><div class="person-meta"><span class="pill ${p.gender==='female'?'pink':'blue'}">${p.gender==='female'?'ШІЩҶ':'Щ…ШұШҜ'}</span><span class="pill ${p.lifeStatus==='dead'?'bad':'ok'}">${p.lifeStatus==='dead'?'ЩҒЩҲШӘвҖҢШҙШҜЩҮ':'ШІЩҶШҜЩҮ'}</span><span class="pill purple">ЩҶШіЩ„ ${gen}</span><span class="pill">ШӘЩҲЩ„ШҜ: ${esc([p.birthYear,p.birthMonth,p.birthDay].filter(Boolean).join('/')||'-')}</span></div><div class="children-line"><span class="pill blue">ЩҒШұШІЩҶШҜШ§ЩҶ: ${children.length} ЩҶЩҒШұ</span><button class="btn small purple showChildren" data-id="${esc(p.id)}">ЩҶЩ…Ш§ЫҢШҙ ЩҒШұШІЩҶШҜШ§ЩҶ</button><button class="btn small green addChildForParent" data-id="${esc(p.id)}">Ш§ЩҒШІЩҲШҜЩҶ ЩҒШұШІЩҶШҜ</button></div></div><div class="actions"><button class="btn small blue openProfile" data-id="${esc(p.id)}">ЩҫШұЩҲЩҒШ§ЫҢЩ„</button><button class="btn small purple bioPerson" data-id="${esc(p.id)}">ШЁЫҢЩҲЪҜШұШ§ЩҒЫҢ Ъ©Ш§Щ…Щ„</button><button class="btn small editPerson" data-id="${esc(p.id)}">ЩҲЫҢШұШ§ЫҢШҙ ШіШұЫҢШ№</button><button class="btn small red deletePerson" data-id="${esc(p.id)}">ШӯШ°ЩҒ</button></div></div></div>`}).join('')||'<div class="empty">ЩҮЩҶЩҲШІ ЩҒШұШҜЫҢ Ш«ШЁШӘ ЩҶШҙШҜЩҮ Ш§ШіШӘ.</div>'}</div></div></details>`}

function relationView(){return`<div class="hero"><h2>ЩҶЩӮШҙЩҮ Ш®ЩҲЫҢШҙШ§ЩҲЩҶШҜЫҢ</h2><p><b>V244</b> | ШӘШҙШ®ЫҢШө ЩҶШіШЁШӘ ШЁЫҢЩҶ ШҜЩҲ ЩҶЩҒШұ ЩҮЩ…ШұШ§ЩҮ ШЁШ§ Щ…ШіЫҢШұ ШұЩҶЪҜЫҢ ЩҲ ЩӮШ§ШЁЩ„ Ъ©Щ„ЫҢЪ©</p></div><div class="card"><b>Ш§ЩҶШӘШ®Ш§ШЁ ШҜЩҲ ЩҶЩҒШұ</b><div class="form-grid" style="grid-template-columns:1fr 1fr; margin-top:10px"><select id="relationA" class="field"><option value="">ЩҶЩҒШұ Ш§ЩҲЩ„</option>${personOptions('')}</select><select id="relationB" class="field"><option value="">ЩҶЩҒШұ ШҜЩҲЩ…</option>${personOptions('')}</select></div><div class="toolbar"><button id="runRelationBtn" class="btn green">рҹ§  ШӘШҙШ®ЫҢШө ЩҶШіШЁШӘ ЩҲ ЩҶЩ…Ш§ЫҢШҙ Щ…ШіЫҢШұ</button><button id="swapRelationBtn" class="btn ghost">вҮ„ Ш¬Ш§ШЁЩҮвҖҢШ¬Ш§ЫҢЫҢ ШҜЩҲ ЩҶЩҒШұ</button><button id="printRelationBtn" class="btn gray">рҹ–ЁпёҸ ЪҶШ§Щҫ Щ…ШіЫҢШұ</button></div><div class="relation-mini-help">ШЁШ№ШҜ Ш§ШІ Ш§ЩҶШӘШ®Ш§ШЁ ШҜЩҲ ЩҶЩҒШұШҢ ШіЫҢШіШӘЩ… Щ…ШіЫҢШұ ЩҫШҜШұШҢ Щ…Ш§ШҜШұШҢ ЩҒШұШІЩҶШҜ ЩҲ ЩҮЩ…ШіШұ ШұШ§ ЩҫЫҢШҜШ§ Щ…ЫҢвҖҢЪ©ЩҶШҜ ЩҲ ШЁЩҮ ШҙЪ©Щ„ ЩҶЩӮШҙЩҮ Ш®ЩҲЫҢШҙШ§ЩҲЩҶШҜЫҢ ЩҶШҙШ§ЩҶ Щ…ЫҢвҖҢШҜЩҮШҜ.</div><div id="relationResult" class="relation-result-box"><div class="empty">ШҜЩҲ ЩҶЩҒШұ ШұШ§ Ш§ЩҶШӘШ®Ш§ШЁ Ъ©ЩҶ ЩҲ ШҜЪ©Щ…ЩҮ ШӘШҙШ®ЫҢШө ШұШ§ ШЁШІЩҶ.</div></div></div>`}

function relationButtons(list){return list.length?list.map(p=>`<button class="link-person openProfile" data-id="${esc(p.id)}">${esc(p.fullName||'ШЁШҜЩҲЩҶ ЩҶШ§Щ…')}</button>`).join(' '):'<span class="pill">Ш«ШЁШӘ ЩҶШҙШҜЩҮ</span>'}
function profilePersonOptions(g,selected){return `<option value="">Ш§ЩҶШӘШ®Ш§ШЁ ЩҶШҙШҜЩҮ</option>`+peopleCache.filter(p=>!g||p.gender===g).map(p=>`<option value="${esc(p.id)}" ${p.id===selected?'selected':''}>${esc(p.fullName||'ШЁШҜЩҲЩҶ ЩҶШ§Щ…')}</option>`).join('')}

function personPhotoLargeHtml(p,cls=''){
  const src=personPhotoSrc(p);
  const base=`profile-photo-large ${p?.gender==='female'?'female':''} ${cls}`;
  return `<div class="${base}">${src?`<img loading="lazy" src="${esc(src)}" alt="${esc(p?.fullName||'Ш№Ъ©Ші')}">`:photoInitials(p)}</div>`;
}
function personListAvatarHtml(p){
  const src=personPhotoSrc(p);
  return `<span class="person-list-avatar ${p?.gender==='female'?'female':''}">${src?`<img loading="lazy" src="${esc(src)}" alt="">`:photoInitials(p)}</span>`;
}
function fullDateText(p,prefix){
  const y=p?.[prefix+'Year']||'',m=p?.[prefix+'Month']||'',d=p?.[prefix+'Day']||'';
  return [y,m,d].filter(Boolean).join('/')||'-';
}
function fullBiographyHtml(id){
  const p=personById(id); if(!p)return '<div class="empty">ЩҒШұШҜ ЩҫЫҢШҜШ§ ЩҶШҙШҜ.</div>';
  const parents=parentsOf(id), sp=spousesOf(id), ch=childrenOf(id);
  const src=personPhotoSrc(p);
  const born=fullDateText(p,'birth'), died=fullDateText(p,'death');
  const notes=String(p.notes||p.bio||p.biography||p.memory||'').trim();
  return `<div class="bio-modal-head"><div class="bio-avatar ${p.gender==='female'?'female':''}">${src?`<img src="${esc(src)}" loading="lazy" alt="">`:photoInitials(p)}</div><div><h2 style="margin:0 0 6px">${esc(p.fullName||'ШЁШҜЩҲЩҶ ЩҶШ§Щ…')}</h2><span class="pill ${p.gender==='female'?'pink':'blue'}">${p.gender==='female'?'ШІЩҶ':'Щ…ШұШҜ'}</span><span class="pill ${p.lifeStatus==='dead'?'bad':'ok'}">${p.lifeStatus==='dead'?'ЩҒЩҲШӘвҖҢШҙШҜЩҮ':'ШІЩҶШҜЩҮ'}</span><span class="pill purple">ЩҶШіЩ„ ${generationOf(p.id)||'-'}</span></div></div><table class="bio-table"><tbody><tr><th>ЩҶШ§Щ… Ъ©Ш§Щ…Щ„</th><td>${esc(p.fullName||'-')}</td></tr><tr><th>ЩҫШҜШұ</th><td>${parents.father?`<button class="link-person openProfile" data-id="${esc(parents.father.id)}">${esc(parents.father.fullName)}</button>`:'-'}</td></tr><tr><th>Щ…Ш§ШҜШұ</th><td>${parents.mother?`<button class="link-person openProfile" data-id="${esc(parents.mother.id)}">${esc(parents.mother.fullName)}</button>`:'-'}</td></tr><tr><th>ЩҮЩ…ШіШұ</th><td>${sp.length?sp.map(x=>`<button class="link-person openProfile" data-id="${esc(x.id)}">${esc(x.fullName)}</button>`).join(' '):'-'}</td></tr><tr><th>ЩҒШұШІЩҶШҜШ§ЩҶ</th><td>${ch.length?ch.map(x=>`<button class="link-person openProfile" data-id="${esc(x.id)}">${esc(x.fullName)}</button>`).join(' '):'-'}</td></tr><tr><th>ШӘЩҲЩ„ШҜ</th><td>${esc(born)} ${p.birthPlace?`- ${esc(p.birthPlace)}`:''}</td></tr><tr><th>ЩҒЩҲШӘ</th><td>${esc(died)} ${p.burialPlace?`- Щ…ШӯЩ„ ШҜЩҒЩҶ: ${esc(p.burialPlace)}`:''}</td></tr><tr><th>ШҙШәЩ„</th><td>${esc(p.job||'-')}</td></tr><tr><th>ШӘЩ…Ш§Ші</th><td>${esc(p.phone||'-')}</td></tr></tbody></table><div class="bio-text"><b>ШҙШұШӯ ШІЩҶШҜЪҜЫҢ / ШЁЫҢЩҲЪҜШұШ§ЩҒЫҢ:</b><br>${esc(notes||'ШЁШұШ§ЫҢ Ш§ЫҢЩҶ ШҙШ®Шө ЩҮЩҶЩҲШІ ШЁЫҢЩҲЪҜШұШ§ЩҒЫҢ Ш«ШЁШӘ ЩҶШҙШҜЩҮ Ш§ШіШӘ.')}</div>`;
}
function showBiography(id){openModal('ШЁЫҢЩҲЪҜШұШ§ЩҒЫҢ Ъ©Ш§Щ…Щ„',fullBiographyHtml(id));setTimeout(()=>{document.querySelectorAll('#modalBody .openProfile').forEach(b=>b.onclick=()=>{closeModal();goProfile(b.dataset.id)})},0)}

function personProfileView(){const p=personById(selectedPersonId);if(!p)return`<div class="card empty">ЩҒШұШҜ Ш§ЩҶШӘШ®Ш§ШЁ ЩҶШҙШҜЩҮ Ш§ШіШӘ. Ш§ШІ Щ„ЫҢШіШӘ Ш§ЩҒШұШ§ШҜ ШұЩҲЫҢ ЩҫШұЩҲЩҒШ§ЫҢЩ„ Ъ©Щ„ЫҢЪ© Ъ©ЩҶ.</div>`;const children=childrenOf(p.id),sp=spousesOf(p.id),parents=parentsOf(p.id),gen=generationOf(p.id)||'-';return`<div class="hero"><h2>ЩҫШұЩҲЩҒШ§ЫҢЩ„ ЩҒШұШҜ</h2><p><b>V248</b> | Ш№Ъ©Ші ЩҫШұЩҲЩҒШ§ЫҢЩ„ШҢ Ш№Ъ©Ші ШҙШ¬ШұЩҮ ЩҲ ШЁЫҢЩҲЪҜШұШ§ЩҒЫҢ Ъ©Ш§Щ…Щ„ ЩҮШұ ШҙШ®Шө</p></div><div class="profile-photo-card"><div>${personPhotoLargeHtml(p)}<input id="profilePhotoFile" class="profile-photo-file" type="file" accept="image/*"></div><div class="profile-photo-info"><h2>${esc(p.fullName||'ШЁШҜЩҲЩҶ ЩҶШ§Щ…')}</h2><div class="person-meta"><span class="pill ${p.gender==='female'?'pink':'blue'}">${p.gender==='female'?'ШІЩҶ':'Щ…ШұШҜ'}</span><span class="pill ${p.lifeStatus==='dead'?'bad':'ok'}">${p.lifeStatus==='dead'?'ЩҒЩҲШӘвҖҢШҙШҜЩҮ':'ШІЩҶШҜЩҮ'}</span><span class="pill purple">ЩҶШіЩ„ ${gen}</span><span class="pill blue">ЩҒШұШІЩҶШҜШ§ЩҶ ${children.length}</span><span class="pill pink">ЩҮЩ…ШіШұШ§ЩҶ ${sp.length}</span></div><div class="profile-actions"><button id="profilePickPhotoBtn" class="btn green" data-id="${esc(p.id)}">рҹ“· Ш§ЩҒШІЩҲШҜЩҶ/ШӘШ№ЩҲЫҢШ¶ Ш№Ъ©Ші</button>${personPhotoSrc(p)?`<button id="profileRemovePhotoBtn" class="btn red" data-id="${esc(p.id)}">ШӯШ°ЩҒ Ш№Ъ©Ші</button>`:''}<button class="btn purple bioPerson" data-id="${esc(p.id)}">рҹ“– ШЁЫҢЩҲЪҜШұШ§ЩҒЫҢ Ъ©Ш§Щ…Щ„</button></div><div class="hint">ЩҮЩ…ЫҢЩҶ Ш№Ъ©Ші ШҜШұ ЩҫШұЩҲЩҒШ§ЫҢЩ„ШҢ Щ„ЫҢШіШӘ Ъ©Ш§Щ…Щ„ ЩҲ ШҙШ¬ШұЩҮ ЩҶЩ…Ш§ЫҢШҙ ШҜШ§ШҜЩҮ Щ…ЫҢвҖҢШҙЩҲШҜ.</div></div></div><div class="card"><div class="profile-links"><b>ЩҫШҜШұ:</b> ${parents.father?`<button class="link-person openProfile" data-id="${esc(parents.father.id)}">${esc(parents.father.fullName)}</button>`:'Ш«ШЁШӘ ЩҶШҙШҜЩҮ'} <b>Щ…Ш§ШҜШұ:</b> ${parents.mother?`<button class="link-person openProfile" data-id="${esc(parents.mother.id)}">${esc(parents.mother.fullName)}</button>`:' function parseLegacyDateParts(v){const s=String(v||'').trim();if(!s)return{year:'',month:'',day:''};const parts=s.split(/[\/\-\.]/).map(x=>x.trim()).filter(Boolean);return{year:parts[0]||s,month:parts[1]||'',day:parts[2]||''}}
function normalizeLegacyPerson(raw){const id=String(raw.id||raw.uid||Date.now()+Math.random());const birth=parseLegacyDateParts(raw.birth||raw.birthDate||raw.birthYear);const death=parseLegacyDateParts(raw.deathDate||raw.death||'');const spouseIds=[...(Array.isArray(raw.spouses)?raw.spouses:[]),...(Array.isArray(raw.spouseIds)?raw.spouseIds:[])].filter(Boolean).map(String);const fatherId=String(raw.fatherId||raw.parentId||'');const motherId=String(raw.motherId||'');return{legacyId:id,fullName:raw.fullName||raw.name||'ШЁШҜЩҲЩҶ ЩҶШ§Щ…',gender:raw.gender==='female'?'female':'male',lifeStatus:(raw.lifeStatus==='dead'||raw.isDead===true)?'dead':'alive',birthYear:raw.birthYear||birth.year||'',birthMonth:raw.birthMonth||birth.month||'',birthDay:raw.birthDay||birth.day||'',deathYear:raw.deathYear||death.year||'',deathMonth:raw.deathMonth||death.month||'',deathDay:raw.deathDay||death.day||'',fatherId:fatherId,motherId:motherId,spouseId:spouseIds[0]||'',spouseIds:spouseIds,job:raw.job||'',phone:raw.phone||'',notes:raw.notes||raw.memory||'',burialPlace:raw.burialPlace||raw.gravePlace||'',deathNote:raw.deathNote||'',photo:raw.photo||'',gallery:Array.isArray(raw.gallery)?raw.gallery:[],docs:Array.isArray(raw.docs)?raw.docs:[],voices:Array.isArray(raw.voices)?raw.voices:[],events:Array.isArray(raw.events)?raw.events:[],manualSpouses:Array.isArray(raw.manualSpouses)?raw.manualSpouses:[],updatedAt:serverTimestamp(),source:'v225-backup-import'}}
function calcRawStats(list){const byId=new Map(list.map(r=>[String(r.id),r]));function gen(id,seen=new Set()){id=String(id||'');if(!id||seen.has(id)||!byId.has(id))return 0;seen.add(id);const r=byId.get(id);return gen(r.parentId||r.fatherId,new Set(seen))+1}return{total:list.length,male:list.filter(p=>p.gender!=='female').length,female:list.filter(p=>p.gender==='female').length,dead:list.filter(p=>p.isDead===true||p.lifeStatus==='dead').length,generations:list.length?Math.max(1,...list.map(p=>gen(p.id))):0}}

function relParentEdges(id){
  const p=personById(id); if(!p)return [];
  const out=[];
  if(p.fatherId&&personById(p.fatherId))out.push({id:String(p.fatherId),side:'father',label:'ЩҫШҜШұ'});
  if(p.motherId&&personById(p.motherId))out.push({id:String(p.motherId),side:'mother',label:'Щ…Ш§ШҜШұ'});
  return out;
}
function relAncestors(id){
  const out=[], q=relParentEdges(id).map(e=>({...e,level:1,path:[e]})), seen=new Set();
  while(q.length){
    const cur=q.shift();
    if(seen.has(cur.id))continue;
    seen.add(cur.id);
    const person=personById(cur.id);
    if(person)out.push({id:cur.id,person,level:cur.level,path:cur.path,side:cur.side});
    relParentEdges(cur.id).forEach(e=>q.push({...e,level:cur.level+1,path:cur.path.concat([e])}));
  }
  return out;
}

  a=String(a||''); b=String(b||'');
  if(!a||!b)return relCard('Ш§ЩҶШӘШ®Ш§ШЁ ЩҶШ§ЩӮШө','ЩҮШұ ШҜЩҲ ЩҶЩҒШұ ШұШ§ Ш§ЩҶШӘШ®Ш§ШЁ Ъ©ЩҶ.','', 'ЩҶШ§Щ…ШҙШ®Шө');
  if(a===b)return relCard('Ш®ЩҲШҜ ЩҒШұШҜ','ЩҮШұ ШҜЩҲ Ш§ЩҶШӘШ®Ш§ШЁ ЫҢЪ© ЩҶЩҒШұ ЩҮШіШӘЩҶШҜ.','', 'ЩӮШ·Ш№ЫҢ');
  const A=personById(a), B=personById(b);
  if(!A||!B)return relCard('ЩҶШ§Щ…ШҙШ®Шө','ЫҢЪ©ЫҢ Ш§ШІ Ш§ЩҒШұШ§ШҜ ЩҫЫҢШҜШ§ ЩҶШҙШҜ.','', 'ЩҶШ§Щ…ШҙШ®Шө');

  if(spousesOf(a).some(x=>String(x.id)===b)) return relCard('ЩҮЩ…ШіШұ',`${A.fullName} ЩҮЩ…ШіШұ ${B.fullName} Ш§ШіШӘ.`,`${A.fullName} вҶҗ ЩҮЩ…ШіШұ вҶҗ ${B.fullName}`,'ЩӮШ·Ш№ЫҢ');

  if(relIsParent(a,b)) return relCard(relPersonWord(A),`${A.fullName} ${relPersonWord(A)} ${B.fullName} Ш§ШіШӘ.`,`${A.fullName} вҶҗ ${relChildWord(B)} вҶҗ ${B.fullName}`,'ЩӮШ·Ш№ЫҢ');
  if(relIsParent(b,a)) return relCard(relChildWord(A),`${A.fullName} ${relChildWord(A)} ${B.fullName} Ш§ШіШӘ.`,`${A.fullName} вҶҗ ${relPersonWord(B)} вҶҗ ${B.fullName}`,'ЩӮШ·Ш№ЫҢ');

  const aAnc=relAncestors(a), bAnc=relAncestors(b);
  const AisAnc=bAnc.find(x=>x.id===a);
  if(AisAnc)return relCard(relGrandWord(AisAnc.level,A,true),`${A.fullName} ${relGrandWord(AisAnc.level,A,true)} ${B.fullName} Ш§ШіШӘ.`,`${A.fullName} вҶҗ ${AisAnc.level} ЩҶШіЩ„ ЩҫШ§ЫҢЫҢЩҶвҖҢШӘШұ вҶҗ ${B.fullName}`,'ЩӮШ·Ш№ЫҢ');
  const BisAnc=aAnc.find(x=>x.id===b);
  if(BisAnc)return relCard(relGrandWord(BisAnc.level,A,false),`${A.fullName} ${relGrandWord(BisAnc.level,A,false)} ${B.fullName} Ш§ШіШӘ.`,`${A.fullName} вҶҗ ${BisAnc.level} ЩҶШіЩ„ ШЁШ§Щ„Ш§ШӘШұ вҶҗ ${B.fullName}`,'ЩӮШ·Ш№ЫҢ');

  const shared=relSharedParents(a,b);
  if(shared.length){
    const parent=personById(shared[0]);
    return relCard(relSiblingWord(A),`${A.fullName} ${relSiblingWord(A)} ${B.fullName} Ш§ШіШӘ.`,`${A.fullName} вҶҗ ЩҲШ§Щ„ШҜ Щ…ШҙШӘШұЪ©: ${parent?.fullName||'ЩҶШ§Щ…ШҙШ®Шө'} вҶҗ ${B.fullName}`,'ШЁШ§Щ„Ш§');
  }

  const bParents=relParentEdges(b);
  for(const bp of bParents){
    if(relSharedParents(a,bp.id).length){
      return relCard(relUncleAuntWord(A,bp.side),`${A.fullName} ${relUncleAuntWord(A,bp.side)} ${B.fullName} Ш§ШіШӘ.`,`${A.fullName} вҶҗ Ш®ЩҲШ§ЩҮШұ/ШЁШұШ§ШҜШұ ${personName(bp.id)} вҶҗ ${bp.label} ${B.fullName}`,'ШЁШ§Щ„Ш§');
    }
  }
  const aParents=relParentEdges(a);
  for(const ap of aParents){
    if(relSharedParents(b,ap.id).length){
      const through=personById(ap.id);
      return relCard(relNephewNieceWord(A,through),`${A.fullName} ${relNephewNieceWord(A,through)} ${B.fullName} Ш§ШіШӘ.`,`${A.fullName} вҶҗ ЩҒШұШІЩҶШҜ ${personName(ap.id)} вҶҗ Ш®ЩҲШ§ЩҮШұ/ШЁШұШ§ШҜШұ ${B.fullName}`,'ШЁШ§Щ„Ш§');
    }
  }

  for(const ap of aParents){
    for(const bp of bParents){
      if(relSharedParents(ap.id,bp.id).length){
        const aPar=personById(ap.id), bPar=personById(bp.id);
        const child=A.gender==='female'?'ШҜШ®ШӘШұ':'ЩҫШіШұ';
        let word='';
        if(bp.side==='father') word=aPar.gender==='female'?child+'Ш№Щ…ЩҮ':child+'Ш№Щ…ЩҲ';
        else word=aPar.gender==='female'?child+'Ш®Ш§Щ„ЩҮ':child+'ШҜШ§ЫҢЫҢ';
        return relCard(word,`${A.fullName} ${word} ${B.fullName} Ш§ШіШӘ.`,`${A.fullName} вҶҗ ЩҒШұШІЩҶШҜ ${aPar.fullName} вҶҗ ${bPar.fullName} ЩҲШ§Щ„ШҜ ${B.fullName}`,'ШЁШ§Щ„Ш§');
      }
    }
  }

  const bSpouses=spousesOf(b);
  for(const s of bSpouses){
    if(relIsParent(a,s.id)){
      const word=B.gender==='female'?(A.gender==='female'?'Щ…Ш§ШҜШұШҙЩҲЩҮШұ':'ЩҫШҜШұШҙЩҲЩҮШұ'):(A.gender==='female'?'Щ…Ш§ШҜШұШІЩҶ':'ЩҫШҜШұШІЩҶ');
      return relCard(word,`${A.fullName} ${word} ${B.fullName} Ш§ШіШӘ.`,`${A.fullName} вҶҗ ЩҲШ§Щ„ШҜ ${s.fullName} вҶҗ ЩҮЩ…ШіШұ ${B.fullName}`,'ШЁШ§Щ„Ш§');
    }
  }
  const aSpouses=spousesOf(a);
  for(const s of aSpouses){
    if(relIsParent(b,s.id)){
      const word=A.gender==='female'?'Ш№ШұЩҲШі':'ШҜШ§Щ…Ш§ШҜ';
      return relCard(word,`${A.fullName} ${word} ${B.fullName} Ш§ШіШӘ.`,`${A.fullName} вҶҗ ЩҮЩ…ШіШұ ${s.fullName} вҶҗ ЩҒШұШІЩҶШҜ ${B.fullName}`,'ШЁШ§Щ„Ш§');
    }
    if(spousesOf(b).some(bs=>relSharedParents(s.id,bs.id).length)){
      const word=A.gender==='female'?'Ш¬Ш§ШұЫҢ':'ШЁШ§Ш¬ЩҶШ§ЩӮ';
      return relCard(word,`${A.fullName} ${word} ${B.fullName} Ш§ШіШӘ.`,`${A.fullName} вҶҗ ЩҮЩ…ШіШұ ${s.fullName} вҶҗ Ш®ЩҲШ§ЩҮШұ/ШЁШұШ§ШҜШұ ЩҮЩ…ШіШұ ${B.fullName}`,'Щ…ШӘЩҲШіШ·');
    }
  }

  const commons=[];
  aAnc.forEach(x=>{const hit=bAnc.find(y=>y.id===x.id);if(hit)commons.push({person:x.person,aLevel:x.level,bLevel:hit.level})});
  if(commons.length){
    commons.sort((x,y)=>(x.aLevel+x.bLevel)-(y.aLevel+y.bLevel));
    const c=commons[0];
    const title='Ш®ЩҲЫҢШҙШ§ЩҲЩҶШҜ ШЁШ§ Ш¬ШҜ Щ…ШҙШӘШұЪ©';
    const detail=`Ш¬ШҜ Щ…ШҙШӘШұЪ© ${A.fullName} ЩҲ ${B.fullName}: ${c.person.fullName}`;
    const path=`${A.fullName} вҶҗ ${c.aLevel} ЩҶШіЩ„ ШӘШ§ ${c.person.fullName} вҶҗ ${c.bLevel} ЩҶШіЩ„ ШӘШ§ ${B.fullName}`;
    return relCard(title,detail,path,'Щ…ШӘЩҲШіШ·');
  }

  const p=relShortestPath(a,b,9);
  if(p&&p.length)return relCard('Щ…ШіЫҢШұ Ш®Ш§ЩҶЩҲШ§ШҜЪҜЫҢ ЩҫЫҢШҜШ§ ШҙШҜ','ЩҶШ§Щ… ШұШ§ЫҢШ¬ ШҜЩӮЫҢЩӮ ШЁШұШ§ЫҢ Ш§ЫҢЩҶ Щ…ШіЫҢШұ ЩҫЫҢШҜШ§ ЩҶШҙШҜШҢ Ш§Щ…Ш§ Ш§ШұШӘШЁШ§Ш· ШҜШұ ШҜШ§ШҜЩҮвҖҢЩҮШ§ ЩҲШ¬ЩҲШҜ ШҜШ§ШұШҜ.',`${A.fullName} вҶҗ ${p.map(x=>x.label+' '+x.name).join(' вҶҗ ')} вҶҗ ${B.fullName}`,'Щ…ШӘЩҲШіШ·');

  return relCard('ЩҶШіШЁШӘ ЩҫЫҢШҜШ§ ЩҶШҙШҜ','ШЁШұШ§ЫҢ ШӘШҙШ®ЫҢШө ШҜЩӮЫҢЩӮвҖҢШӘШұШҢ ЩҫШҜШұШҢ Щ…Ш§ШҜШұ ЩҲ ЩҮЩ…ШіШұШ§ЩҶ ШҜЩҲ ЩҶЩҒШұ ШұШ§ Ъ©Ш§Щ…Щ„вҖҢШӘШұ Ш«ШЁШӘ Ъ©ЩҶ.','', 'ЩҶШ§Щ…ШҙШ®Шө');
}

function relationStepIcon(label){label=String(label||'');if(label.includes('ЩҫШҜШұ'))return 'рҹ‘Ё';if(label.includes('Щ…Ш§ШҜШұ'))return 'рҹ‘©';if(label.includes('ЩҒШұШІЩҶШҜ'))return 'рҹ‘¶';if(label.includes('ЩҮЩ…ШіШұ'))return 'рҹ’Қ';return 'рҹ”—'}
function relationPersonNode(p,cls=''){
  if(!p)return `<div class="rel-node ${cls}"><b>ЩҶШ§Щ…ШҙШ®Шө</b><small>Ш§Ш·Щ„Ш§Ш№Ш§ШӘ ЩҶШ§ЩӮШө</small></div>`;
  const sub=[p.gender==='female'?'ШІЩҶ':'Щ…ШұШҜ',p.lifeStatus==='dead'?'ЩҒЩҲШӘвҖҢШҙШҜЩҮ':'ШІЩҶШҜЩҮ'].filter(Boolean).join(' вҖў ');
  return `<button class="rel-node ${p.gender==='female'?'female':''} ${p.lifeStatus==='dead'?'dead':''} ${cls}" data-id="${esc(p.id)}" type="button"><b>${esc(p.fullName||'ШЁШҜЩҲЩҶ ЩҶШ§Щ…')}</b><small>${esc(sub)}</small></button>`;
}
function relationDirectPath(a,b){
  const A=personById(a),B=personById(b); if(!A||!B)return [];
  if(a===b)return [{id:a,label:'Ш®ЩҲШҜ ЩҒШұШҜ'}];
  if(spousesOf(a).some(x=>String(x.id)===String(b)))return [{id:a,label:''},{id:b,label:'ЩҮЩ…ШіШұ'}];
  if(relIsParent(a,b))return [{id:a,label:''},{id:b,label:relChildWord(B)}];
  if(relIsParent(b,a))return [{id:a,label:''},{id:b,label:relPersonWord(B)}];
  const sp=relShortestPath(a,b,10);
  if(sp&&sp.length)return [{id:a,label:''},...sp.map(x=>({id:x.id,label:x.label}))];
  return [];
}
function relationMapHtml(a,b){
  const path=relationDirectPath(a,b);
  if(!path.length)return `<div class="relation-map-wrap"><div class="search-empty">Щ…ШіЫҢШұ ШӘШөЩҲЫҢШұЫҢ ЩҫЫҢШҜШ§ ЩҶШҙШҜ. Ш§Ш·Щ„Ш§Ш№Ш§ШӘ ЩҫШҜШұШҢ Щ…Ш§ШҜШұ ЫҢШ§ ЩҮЩ…ШіШұШ§ЩҶ ШұШ§ Ъ©Ш§Щ…Щ„вҖҢШӘШұ Ъ©ЩҶ.</div></div>`;
  let html=`<div class="relation-map-wrap" id="relationPrintArea"><div class="relation-map-title">рҹ§¬ ЩҶЩӮШҙЩҮ Щ…ШіЫҢШұ Ш®ЩҲЫҢШҙШ§ЩҲЩҶШҜЫҢ</div><div class="relation-map">`;
  path.forEach((step,i)=>{
    const p=personById(step.id);
    html+=relationPersonNode(p,i===0?'start':(i===path.length-1?'end':''));
    if(i<path.length-1){const next=path[i+1];html+=`<div class="rel-arrow"><span>${relationStepIcon(next.label)} ${esc(next.label||'ШұШ§ШЁШ·ЩҮ')}</span> вҶҗ</div>`;}
  });
  html+=`</div><div class="relation-actions"><button class="btn small ghost" onclick="window.print()">ЪҶШ§Щҫ ЩҶЩӮШҙЩҮ</button></div></div>`;
  return html;
}

function runRelationSmart(){const a=val('relationA'),b=val('relationB');$('relationResult').innerHTML=relationSmart(a,b)+relationMapHtml(a,b);document.querySelectorAll('.rel-node').forEach(n=>n.onclick=()=>goProfile(n.dataset.id));}


function parseNum(v){const n=parseInt(String(v||'').replace(/[Ы°-Ы№]/g,d=>'Ы°ЫұЫІЫіЫҙЫөЫ¶Ы·ЫёЫ№'.indexOf(d)).replace(/[Щ -Щ©]/g,d=>'Щ ЩЎЩўЩЈЩӨЩҘЩҰЩ§ЩЁЩ©'.indexOf(d)),10);return isNaN(n)?0:n}
function personDateKey(p,prefix){const y=parseNum(p[prefix+'Year']),m=parseNum(p[prefix+'Month']),d=parseNum(p[prefix+'Day']);if(!y)return null;return {y,m:m||0,d:d||0,text:[p[prefix+'Year'],p[prefix+'Month'],p[prefix+'Day']].filter(Boolean).join('/')}}

function printPreviewHtml(){const type=$('printContent')?.value||'tree';if(type==='timeline')return `<div class="timeline-print-target">${timelineListHtml(timelineEvents())}</div>`;if(type==='people')return printPeopleTableHtml();if(type==='stats')return printStatsHtml();return printFullTreeHtml()}
function printFullTreeHtml(){if(!peopleCache.length)return '<div class="empty">ЩҒШұШҜЫҢ ШЁШұШ§ЫҢ ЪҶШ§Щҫ ЩҲШ¬ЩҲШҜ ЩҶШҜШ§ШұШҜ.</div>';const roots=peopleCache.filter(p=>!p.fatherId&&!p.motherId);const blocks=(roots.length?roots:peopleCache.slice(0,1)).map(r=>`<div class="full-tree-block"><div class="full-tree-block-title">${esc(r.fullName||'ШұЫҢШҙЩҮ')}</div>${classicTreeHtml(r.id,new Set())}</div>`).join('');return `<div class="classic-tree-wrap"><div class="tree-board-title">ШҙШ¬ШұЩҮ Ъ©Ш§Щ…Щ„ Ш®Ш§ЩҶЩҲШ§ШҜЩҮ</div><div class="full-tree-forest">${blocks}</div></div>`}
function printPeopleTableHtml(){const rows=peopleCache.map((p,i)=>`<tr><td>${i+1}</td><td>${esc(p.fullName||'ШЁШҜЩҲЩҶ ЩҶШ§Щ…')}</td><td>${p.gender==='female'?'ШІЩҶ':'Щ…ШұШҜ'}</td><td>${esc(personName(p.fatherId))}</td><td>${esc(personName(p.motherId))}</td><td>${esc(spousesOf(p.id).map(s=>s.fullName).join('ШҢ ')||'-')}</td><td>${childrenOf(p.id).length}</td><td>${p.lifeStatus==='dead'?'ЩҒЩҲШӘвҖҢШҙШҜЩҮ':'ШІЩҶШҜЩҮ'}</td></tr>`).join('');return `<table class="print-preview-table"><thead><tr><th>#</th><th>ЩҶШ§Щ…</th><th>Ш¬ЩҶШіЫҢШӘ</th><th>ЩҫШҜШұ</th><th>Щ…Ш§ШҜШұ</th><th>ЩҮЩ…ШіШұ</th><th>ЩҒШұШІЩҶШҜ</th><th>ЩҲШ¶Ш№ЫҢШӘ</th></tr></thead><tbody>${rows||'<tr><td colspan="8">Щ…ЩҲШұШҜЫҢ ЩҶЫҢШіШӘ</td></tr>'}</tbody></table>`}
function printStatsHtml(){const male=peopleCache.filter(p=>p.gender==='male').length,female=peopleCache.filter(p=>p.gender==='female').length,dead=peopleCache.filter(p=>p.lifeStatus==='dead').length,births=timelineEvents().filter(e=>e.type==='birth').length,deaths=timelineEvents().filter(e=>e.type==='death').length;return `<div class="tree-report"><h2>ЪҜШІШ§ШұШҙ Ш®Щ„Ш§ШөЩҮ Ш®Ш§ЩҶЩҲШ§ШҜЩҮ</h2><table class="print-preview-table"><tbody><tr><th>Ъ©Щ„ Ш§ЩҒШұШ§ШҜ</th><td>${peopleCache.length}</td></tr><tr><th>Щ…ШұШҜШ§ЩҶ</th><td>${male}</td></tr><tr><th>ШІЩҶШ§ЩҶ</th><td>${female}</td></tr><tr><th>ЩҒЩҲШӘвҖҢШҙШҜЩҮвҖҢЩҮШ§</th><td>${dead}</td></tr><tr><th>ЩҶШіЩ„вҖҢЩҮШ§</th><td>${countGenerations()}</td></tr><tr><th>ШӘЩҲЩ„ШҜЩҮШ§ЫҢ Ш«ШЁШӘвҖҢШҙШҜЩҮ</th><td>${births}</td></tr><tr><th>ЩҒЩҲШӘвҖҢЩҮШ§ЫҢ Ш«ШЁШӘвҖҢШҙШҜЩҮ</th><td>${deaths}</td></tr></tbody></table></div>`}
function updatePrintPreview(){const target=$('printPreviewTarget');if(!target)return;target.innerHTML=printPreviewHtml();const size=val('printSize')||'a4',density=val('printDensity')||'compact',color=val('printColor')||'color';target.className=`print-target print-${size} ${density==='compact'?'compact-print':''} ${density==='large'?'large-print':''} ${color==='simple'?'simple-lines-print':''} ${$('printPhotos')&&!$('printPhotos').checked?'no-photo-print':''}`;$('printDocTitle')&&($('printDocTitle').textContent=val('printTitle')||'ШҙШ¬ШұЩҮвҖҢЩҶШ§Щ…ЩҮ Ш®Ш§ЩҶЩҲШ§ШҜЩҮ');$('printDocSub')&&($('printDocSub').textContent=`FamilyTreePro V248 | ${new Date().toLocaleDateString('fa-IR')}`);const header=$('printDocTitle')?.closest('.print-only-header');if(header)header.style.display=($('printHeader')?.checked?'':'none');const wm=document.querySelector('.print-watermark');if(wm)wm.style.display=($('printWatermark')?.checked?'':'none')}
function printCenterNow(){updatePrintPreview();setTimeout(()=>window.print(),80)}

function timelineEvents(){const out=[];peopleCache.forEach(p=>{const b=personDateKey(p,'birth');if(b)out.push({type:'birth',icon:'рҹҺӮ',label:'ШӘЩҲЩ„ШҜ',person:p,year:b.y,month:b.m,day:b.d,date:b.text,sort:b.y*10000+b.m*100+b.d});const de=personDateKey(p,'death');if(de)out.push({type:'death',icon:'рҹӘҰ',label:'ЩҒЩҲШӘ',person:p,year:de.y,month:de.m,day:de.d,date:de.text,sort:de.y*10000+de.m*100+de.d});(Array.isArray(p.events)?p.events:[]).forEach((ev,i)=>{const y=parseNum(ev.year||ev.y),m=parseNum(ev.month||ev.m),d=parseNum(ev.day||ev.d);if(y)out.push({type:'other',icon:ev.icon||'вӯҗ',label:ev.title||ev.name||'ШұЩҲЫҢШҜШ§ШҜ',person:p,year:y,month:m||0,day:d||0,date:[ev.year||ev.y,ev.month||ev.m,ev.day||ev.d].filter(Boolean).join('/'),note:ev.note||ev.description||'',sort:y*10000+(m||0)*100+(d||0)})})});return out.sort((a,b)=>a.sort-b.sort)}
function timelineView(){const evs=timelineEvents();const births=evs.filter(e=>e.type==='birth').length,deaths=evs.filter(e=>e.type==='death').length,years=[...new Set(evs.map(e=>e.year))];return`<div class="hero"><h2>ШӘШ§ЫҢЩ…вҖҢЩ„Ш§ЫҢЩҶ Ш®Ш§ЩҶЩҲШ§ШҜЪҜЫҢ</h2><p><b>V244</b> | ЩҶЩ…Ш§ЫҢШҙ ШӘЩҲЩ„ШҜШҢ ЩҒЩҲШӘ ЩҲ ШұЩҲЫҢШҜШ§ШҜЩҮШ§ЫҢ Ш®Ш§ЩҶЩҲШ§ШҜЪҜЫҢ ШЁЩҮ ШӘШұШӘЫҢШЁ ШІЩ…Ш§ЩҶЫҢ</p></div><div class="timeline-stat-grid"><div class="timeline-stat"><small>Ъ©Щ„ ШұЩҲЫҢШҜШ§ШҜЩҮШ§</small><b>${evs.length}</b></div><div class="timeline-stat"><small>ШӘЩҲЩ„ШҜЩҮШ§</small><b>${births}</b></div><div class="timeline-stat"><small>ЩҒЩҲШӘвҖҢЩҮШ§</small><b>${deaths}</b></div><div class="timeline-stat"><small>ШіШ§Щ„вҖҢЩҮШ§ЫҢ Ш«ШЁШӘвҖҢШҙШҜЩҮ</small><b>${years.length}</b></div></div><div class="card"><div class="timeline-tools"><input id="timelineSearch" class="field" placeholder="Ш¬ШіШӘШ¬ЩҲ ШҜШұ ЩҶШ§Щ…ШҢ ЩҫШҜШұШҢ Щ…Ш§ШҜШұШҢ ЩҮЩ…ШіШұШҢ ЩҶЩҲШ№ ШұЩҲЫҢШҜШ§ШҜ"><select id="timelineType" class="field"><option value="">ЩҮЩ…ЩҮ ШұЩҲЫҢШҜШ§ШҜЩҮШ§</option><option value="birth">рҹҺӮ ШӘЩҲЩ„ШҜЩҮШ§</option><option value="death">рҹӘҰ ЩҒЩҲШӘвҖҢЩҮШ§</option><option value="other">вӯҗ ШұЩҲЫҢШҜШ§ШҜЩҮШ§</option></select><select id="timelineOrder" class="field"><option value="asc">ЩӮШҜЫҢЩ…ЫҢ ШЁЩҮ Ш¬ШҜЫҢШҜ</option><option value="desc">Ш¬ШҜЫҢШҜ ШЁЩҮ ЩӮШҜЫҢЩ…ЫҢ</option></select><button id="timelinePrint" class="btn warn">рҹ–ЁпёҸ ЪҶШ§Щҫ ШӘШ§ЫҢЩ…вҖҢЩ„Ш§ЫҢЩҶ</button></div><div id="timelineList">${timelineListHtml(evs)}</div></div>`}
function timelineListHtml(list){if(!list.length)return'<div class="timeline-empty">ЩҮЩҶЩҲШІ ШӘШ§ШұЫҢШ® ШӘЩҲЩ„ШҜШҢ ЩҒЩҲШӘ ЫҢШ§ ШұЩҲЫҢШҜШ§ШҜЫҢ Ш«ШЁШӘ ЩҶШҙШҜЩҮ Ш§ШіШӘ.</div>';let last=null;return`<div class="timeline-wrap">${list.map(e=>{const p=e.person;const yearHead=e.year!==last?(last=e.year,`<div class="timeline-year-head"><span>${e.year}</span></div>`):'';const cls=e.type==='birth'?'birth':(e.type==='death'?'death':'other');const rel=`ЩҫШҜШұ: ${personName(p.fatherId)} | Щ…Ш§ШҜШұ: ${personName(p.motherId)} | ЩҮЩ…ШіШұ: ${spousesOf(p.id).map(s=>s.fullName).join('ШҢ ')||'Ш«ШЁШӘ ЩҶШҙШҜЩҮ'}`;return`${yearHead}<div class="timeline-item"><div class="timeline-dot">${e.icon}</div><div class="timeline-card ${cls}"><div><div class="timeline-title">${e.icon} ${esc(e.label)} ${esc(p.fullName||'ШЁШҜЩҲЩҶ ЩҶШ§Щ…')}</div><span class="timeline-date">рҹ“… ${esc(e.date||e.year)}</span><div class="timeline-sub">${esc(rel)}${e.note?'<br>'+esc(e.note):''}</div></div><div class="actions"><button class="btn small blue openProfile" data-id="${esc(p.id)}">ЩҫШұЩҲЩҒШ§ЫҢЩ„</button></div></div></div>`}).join('')}</div>`}
function filterTimeline(){const q=val('timelineSearch').toLowerCase(),t=val('timelineType'),order=val('timelineOrder');let list=timelineEvents().filter(e=>{const p=e.person;const hay=[p.fullName,e.label,e.date,e.note,personName(p.fatherId),personName(p.motherId),...spousesOf(p.id).map(s=>s.fullName)].join(' ').toLowerCase();return(!t||e.type===t)&&(!q||hay.includes(q))});if(order==='desc')list=list.reverse();$('timelineList').innerHTML=timelineListHtml(list);document.querySelectorAll('.openProfile').forEach(b=>b.onclick=()=>goProfile(b.dataset.id))}



function personPhotoSrc(p){return p?.photo||p?.photoUrl||p?.image||p?.avatar||((Array.isArray(p?.gallery)&&p.gallery[0])?p.gallery[0]:'')}
function photoInitials(p){return personCaricatureHtml(p)}
function personCaricatureIcon(p){const dead=p?.lifeStatus==='dead'||p?.isDead===true;if(dead)return 'рҹ§“';if(p?.gender==='female')return 'рҹ‘©';return 'рҹ‘Ё'}
function personCaricatureHtml(p){return `<span class="caricature-avatar ${p?.gender==='female'?'female':''} ${(p?.lifeStatus==='dead'||p?.isDead===true)?'dead':''}" title="ШӘШөЩҲЫҢШұ ЩҫЫҢШҙвҖҢЩҒШұШ¶">${personCaricatureIcon(p)}</span>`}
function photoThumbHtml(p,cls=''){const src=personPhotoSrc(p);return `<div class="photo-thumb ${p?.gender==='female'?'female':''} ${cls}">${src?`<img loading="lazy" src="${esc(src)}" alt="${esc(p.fullName||'Ш№Ъ©Ші')}">`:photoInitials(p)}</div>`}
function photoStats(){const total=peopleCache.length,withPhoto=peopleCache.filter(personHasPhoto).length,noPhoto=total-withPhoto,gallery=peopleCache.filter(p=>Array.isArray(p.gallery)&&p.gallery.length).length;return{total,withPhoto,noPhoto,gallery,percent:total?Math.round(withPhoto*100/total):0}}
function photoEngineView(){const st=photoStats();return`<div class="hero"><h2>Щ…ЩҲШӘЩҲШұ Ш№Ъ©Ші</h2><p><b>V248</b> | Ш·ШұШӯ ШҙШ¬ШұЩҮ ШӘШәЫҢЫҢШұ ЩҶЪ©ШұШҜЩҮШӣ ЩҒЩӮШ· Щ…ШҜЫҢШұЫҢШӘШҢ ЩҒШҙШұШҜЩҮвҖҢШіШ§ШІЫҢ ЩҲ Ъ©ЩҶШӘШұЩ„ Ш№Ъ©ШівҖҢЩҮШ§ Ш§Ш¶Ш§ЩҒЩҮ ШҙШҜ.</p></div><div class="grid stats"><div class="card stat photo-stat-ok"><div><small>Ъ©Щ„ Ш§ЩҒШұШ§ШҜ</small><div class="num">${st.total}</div></div><div class="icon">рҹ‘Ҙ</div></div><div class="card stat photo-stat-ok"><div><small>ШҜШ§ШұШ§ЫҢ Ш№Ъ©Ші</small><div class="num">${st.withPhoto}</div></div><div class="icon">рҹ“·</div></div><div class="card stat ${st.noPhoto?'photo-stat-warn':'photo-stat-ok'}"><div><small>ШЁШҜЩҲЩҶ Ш№Ъ©Ші</small><div class="num">${st.noPhoto}</div></div><div class="icon">рҹ–јпёҸ</div></div><div class="card stat"><div><small>ЩҫЩҲШҙШҙ Ш№Ъ©Ші</small><div class="num">${st.percent}%</div></div><div class="icon">вң…</div></div><div class="card stat"><div><small>ЪҜШ§Щ„ШұЫҢвҖҢШҜШ§Шұ</small><div class="num">${st.gallery}</div></div><div class="icon">рҹ—ӮпёҸ</div></div></div><div class="card"><div class="photo-drop">рҹ“Ң Ш§ШІ Ш§ЫҢЩҶ ШөЩҒШӯЩҮ ШЁШұШ§ЫҢ Ш§Ш¶Ш§ЩҒЩҮвҖҢЪ©ШұШҜЩҶ Ш№Ъ©Ші Ш§ШөЩ„ЫҢ ЩҮШұ ШҙШ®Шө Ш§ШіШӘЩҒШ§ШҜЩҮ Ъ©ЩҶ. Ш№Ъ©Ші ЩӮШЁЩ„ Ш§ШІ Ш°Ш®ЫҢШұЩҮ Ш®ЩҲШҜЪ©Ш§Шұ Ъ©ЩҲЪҶЪ© ЩҲ ШіШЁЪ© Щ…ЫҢвҖҢШҙЩҲШҜ ШӘШ§ ШұЩҲЫҢ Щ…ЩҲШЁШ§ЫҢЩ„ ШЁЩҮШӘШұ ШЁШ§Щ„Ш§ ШЁЫҢШ§ЫҢШҜ.</div><div class="photo-tools"><button id="photoRefreshBtn" class="btn gray">рҹ”„ ШЁШұЩҲШІШұШіШ§ЩҶЫҢ</button><button id="photoReportBtn" class="btn purple">рҹ“Ӣ ЪҜШІШ§ШұШҙ Ш№Ъ©ШівҖҢЩҮШ§</button><button id="photoNoPicBtn" class="btn warn">ЩҶЩ…Ш§ЫҢШҙ ШЁШҜЩҲЩҶ Ш№Ъ©ШівҖҢЩҮШ§</button><button id="photoAllBtn" class="btn">ЩҶЩ…Ш§ЫҢШҙ ЩҮЩ…ЩҮ</button></div><div class="photo-progress hidden" id="photoProgress"><span></span></div></div><div class="card"><div class="photo-filter"><input id="photoSearch" class="field" placeholder="Ш¬ШіШӘШ¬ЩҲЫҢ ЩҶШ§Щ…ШҢ ЩҫШҜШұШҢ Щ…Ш§ШҜШұШҢ ЩҮЩ…ШіШұ"><select id="photoStatus" class="field"><option value="">ЩҮЩ…ЩҮ</option><option value="with">ШҜШ§ШұШ§ЫҢ Ш№Ъ©Ші</option><option value="without">ШЁШҜЩҲЩҶ Ш№Ъ©Ші</option></select><select id="photoGender" class="field"><option value="">ЩҮЩ…ЩҮ Ш¬ЩҶШіЫҢШӘвҖҢЩҮШ§</option><option value="male">Щ…ШұШҜ</option><option value="female">ШІЩҶ</option></select></div><div id="photoList">${photoListHtml(peopleCache)}</div></div>`}
function photoListHtml(list){if(!list.length)return'<div class="empty">Щ…ЩҲШұШҜЫҢ ЩҫЫҢШҜШ§ ЩҶШҙШҜ.</div>';return`<div class="photo-grid">${list.map(p=>{const src=personPhotoSrc(p),parents=parentsOf(p),sp=spousesOf(p).map(x=>x.fullName).join('ШҢ ');return`<div class="photo-card" data-id="${esc(p.id)}">${photoThumbHtml(p)}<div class="photo-main"><b>${esc(p.fullName||'ШЁШҜЩҲЩҶ ЩҶШ§Щ…')}</b><small>ЩҫШҜШұ: ${esc(parents.father?.fullName||'-')} | Щ…Ш§ШҜШұ: ${esc(parents.mother?.fullName||'-')}</small><small>${src?'вң… Ш№Ъ©Ші ШҜШ§ШұШҜ':'вҡ пёҸ Ш№Ъ©Ші ЩҶШҜШ§ШұШҜ'} ${sp?`| ЩҮЩ…ШіШұ: ${esc(sp)}`:''}</small><div class="photo-actions"><button class="btn small blue openProfile" data-id="${esc(p.id)}">ЩҫШұЩҲЩҒШ§ЫҢЩ„</button><button class="btn small green pickPhotoBtn" data-id="${esc(p.id)}">Ш§ЩҒШІЩҲШҜЩҶ/ШӘШ№ЩҲЫҢШ¶ Ш№Ъ©Ші</button>${src?`<button class="btn small red removePhotoBtn" data-id="${esc(p.id)}">ШӯШ°ЩҒ Ш№Ъ©Ші</button>`:''}<input class="photo-file" id="photoFile_${esc(p.id)}" data-id="${esc(p.id)}" type="file" accept="image/*"></div></div></div>`}).join('')}</div>`}
function filteredPhotos(forceStatus=''){const q=val('photoSearch').toLowerCase(),status=forceStatus||val('photoStatus'),gender=val('photoGender');return peopleCache.filter(p=>{const parents=parentsOf(p),sp=spousesOf(p).map(x=>x.fullName).join(' '),hay=[p.fullName,parents.father?.fullName,parents.mother?.fullName,sp,p.phone,p.job].join(' ').toLowerCase();const has=personHasPhoto(p);return(!q||hay.includes(q))&&(!gender||p.gender===gender)&&(!status||(status==='with'?has:!has))})}
function refreshPhotoList(forceStatus=''){if(!$('photoList'))return;$('photoList').innerHTML=photoListHtml(filteredPhotos(forceStatus));bindPhotoButtons();document.querySelectorAll('.openProfile').forEach(b=>b.onclick=()=>goProfile(b.dataset.id));document.querySelectorAll('.bioPerson').forEach(b=>b.onclick=(e)=>{e.preventDefault();e.stopPropagation();showBiography(b.dataset.id)})}
function setPhotoProgress(v){const box=$('photoProgress');if(!box)return;box.classList.toggle('hidden',v<=0||v>=100);const bar=box.querySelector('span');if(bar)bar.style.width=Math.max(0,Math.min(100,v))+'%'}
function compressImageFile(file,maxSide=900,quality=.72){return new Promise((resolve,reject)=>{if(!file||!file.type.startsWith('image/'))return reject(new Error('ЩҒШ§ЫҢЩ„ Ш№Ъ©Ші ЩҶЫҢШіШӘ'));const reader=new FileReader();reader.onerror=()=>reject(new Error('Ш®ЩҲШ§ЩҶШҜЩҶ ЩҒШ§ЫҢЩ„ ЩҶШ§Щ…ЩҲЩҒЩӮ ШЁЩҲШҜ'));reader.onload=()=>{const img=new Image();img.onerror=()=>reject(new Error('ШЁШ§ШІ Ъ©ШұШҜЩҶ Ш№Ъ©Ші ЩҶШ§Щ…ЩҲЩҒЩӮ ШЁЩҲШҜ'));img.onload=()=>{let w=img.width,h=img.height;const scale=Math.min(1,maxSide/Math.max(w,h));w=Math.max(1,Math.round(w*scale));h=Math.max(1,Math.round(h*scale));const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;const ctx=canvas.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);let data=canvas.toDataURL('image/jpeg',quality);if(data.length>180000)data=canvas.toDataURL('image/jpeg',.58);if(data.length>140000)data=canvas.toDataURL('image/jpeg',.46);resolve(data)};img.src=reader.result};reader.readAsDataURL(file)})}
async function savePersonPhoto(id,file){const p=personById(id);if(!p)return;try{setPhotoProgress(20);const data=await compressImageFile(file);setPhotoProgress(65);await updateDoc(doc(db,'people',id),{photo:data,photoUpdatedAt:serverTimestamp(),updatedAt:serverTimestamp()});setPhotoProgress(90);await loadPeople();if(currentRoute==='profile'){selectedPersonId=id;render()}else refreshPhotoList();setPhotoProgress(100);setTimeout(()=>setPhotoProgress(0),400)}catch(e){setPhotoProgress(0);alert('Ш®Ш·Ш§ЫҢ Ш№Ъ©Ші: '+e.message)}}
async function removePersonPhoto(id){if(!confirm('Ш№Ъ©Ші Ш§ЫҢЩҶ ШҙШ®Шө ШӯШ°ЩҒ ШҙЩҲШҜШҹ'))return;await updateDoc(doc(db,'people',id),{photo:'',photoUpdatedAt:serverTimestamp(),updatedAt:serverTimestamp()});await loadPeople();if(currentRoute==='profile'){selectedPersonId=id;render()}else refreshPhotoList()}
function photoReportText(){const st=photoStats();const no=peopleCache.filter(p=>!personHasPhoto(p)).map(p=>`- ${p.fullName||'ШЁШҜЩҲЩҶ ЩҶШ§Щ…'} | ЩҫШҜШұ: ${personName(p.fatherId)}`).join('\n');return `FamilyTreePro V248 Bio Photo\nШӘШ§ШұЫҢШ®: ${new Date().toLocaleString('fa-IR')}\nЪ©Щ„ Ш§ЩҒШұШ§ШҜ: ${st.total}\nШҜШ§ШұШ§ЫҢ Ш№Ъ©Ші: ${st.withPhoto}\nШЁШҜЩҲЩҶ Ш№Ъ©Ші: ${st.noPhoto}\nЩҫЩҲШҙШҙ Ш№Ъ©Ші: ${st.percent}%\n\nШ§ЩҒШұШ§ШҜ ШЁШҜЩҲЩҶ Ш№Ъ©Ші:\n${no||'ЩҮЫҢЪҶ Щ…ЩҲШұШҜЫҢ ЩҶЫҢШіШӘ'}`}
function bindPhotoButtons(){document.querySelectorAll('.pickPhotoBtn').forEach(b=>b.onclick=()=>{const f=$('photoFile_'+b.dataset.id);if(f)f.click()});document.querySelectorAll('.photo-file').forEach(inp=>inp.onchange=()=>{const file=inp.files&&inp.files[0];if(file)savePersonPhoto(inp.dataset.id,file);inp.value=''});document.querySelectorAll('.removePhotoBtn').forEach(b=>b.onclick=()=>removePersonPhoto(b.dataset.id))}

function personHasPhoto(p){return !!(p?.photo||p?.photoUrl||p?.image||p?.avatar||(Array.isArray(p?.gallery)&&p.gallery.length))}
function dataQualityIssues(){const issues=[];const byNameFather=new Map();peopleCache.forEach(p=>{const key=(normalizeName(p.fullName)+'|'+String(p.fatherId||''));if(!byNameFather.has(key))byNameFather.set(key,[]);byNameFather.get(key).push(p)});byNameFather.forEach(list=>{if(list.length>1&&normalizeName(list[0].fullName))issues.push({type:'duplicate',level:'warn',icon:'рҹ‘Ҙ',title:'Ш§ШӯШӘЩ…Ш§Щ„ ЩҒШұШҜ ШӘЪ©ШұШ§ШұЫҢ',sub:list.map(p=>p.fullName||'ШЁШҜЩҲЩҶ ЩҶШ§Щ…').join('ШҢ '),ids:list.map(p=>p.id)})});peopleCache.forEach(p=>{if(p.fatherId&&!personById(p.fatherId))issues.push({type:'broken',level:'bad',icon:'рҹ‘Ё',title:'ЩҫШҜШұ ЩҫЫҢШҜШ§ ЩҶШҙШҜ',sub:`${p.fullName||'ШЁШҜЩҲЩҶ ЩҶШ§Щ…'} ШЁЩҮ ЩҫШҜШұЫҢ ЩҲШөЩ„ Ш§ШіШӘ Ъ©ЩҮ ШҜШұ Щ„ЫҢШіШӘ Ш§ЩҒШұШ§ШҜ ЩҶЫҢШіШӘ.`,ids:[p.id]});if(p.motherId&&!personById(p.motherId))issues.push({type:'broken',level:'bad',icon:'рҹ‘©',title:'Щ…Ш§ШҜШұ ЩҫЫҢШҜШ§ ЩҶШҙШҜ',sub:`${p.fullName||'ШЁШҜЩҲЩҶ ЩҶШ§Щ…'} ШЁЩҮ Щ…Ш§ШҜШұЫҢ ЩҲШөЩ„ Ш§ШіШӘ Ъ©ЩҮ ШҜШұ Щ„ЫҢШіШӘ Ш§ЩҒШұШ§ШҜ ЩҶЫҢШіШӘ.`,ids:[p.id]});if(p.spouseId&&!personById(p.spouseId))issues.push({type:'broken',level:'bad',icon:'рҹ’Қ',title:'ЩҮЩ…ШіШұ ЩҫЫҢШҜШ§ ЩҶШҙШҜ',sub:`${p.fullName||'ШЁШҜЩҲЩҶ ЩҶШ§Щ…'} ШЁЩҮ ЩҮЩ…ШіШұЫҢ ЩҲШөЩ„ Ш§ШіШӘ Ъ©ЩҮ ШҜШұ Щ„ЫҢШіШӘ Ш§ЩҒШұШ§ШҜ ЩҶЫҢШіШӘ.`,ids:[p.id]});if(p.fatherId===p.id||p.motherId===p.id||p.spouseId===p.id)issues.push({type:'self',level:'bad',icon:'вӣ”',title:'ШұШ§ШЁШ·ЩҮ Ш§ШҙШӘШЁШ§ЩҮ ШЁШ§ Ш®ЩҲШҜ ЩҒШұШҜ',sub:`${p.fullName||'ШЁШҜЩҲЩҶ ЩҶШ§Щ…'} ШҜШұ ЫҢЪ©ЫҢ Ш§ШІ ШұЩҲШ§ШЁШ· ШЁЩҮ Ш®ЩҲШҜШҙ ЩҲШөЩ„ ШҙШҜЩҮ Ш§ШіШӘ.`,ids:[p.id]});if(!p.birthYear&&!p.birthMonth&&!p.birthDay)issues.push({type:'date',level:'warn',icon:'рҹҺӮ',title:'ШӘШ§ШұЫҢШ® ШӘЩҲЩ„ШҜ ЩҶШ§ЩӮШө',sub:`ШЁШұШ§ЫҢ ${p.fullName||'ШЁШҜЩҲЩҶ ЩҶШ§Щ…'} ШӘШ§ШұЫҢШ® ШӘЩҲЩ„ШҜ Ш«ШЁШӘ ЩҶШҙШҜЩҮ Ш§ШіШӘ.`,ids:[p.id]});if(p.lifeStatus==='dead'&&!p.deathYear&&!p.deathMonth&&!p.deathDay)issues.push({type:'death',level:'warn',icon:'рҹӘҰ',title:'ШӘШ§ШұЫҢШ® ЩҒЩҲШӘ ЩҶШ§ЩӮШө',sub:`${p.fullName||'ШЁШҜЩҲЩҶ ЩҶШ§Щ…'} ЩҒЩҲШӘвҖҢШҙШҜЩҮ Ш§ШіШӘ ЩҲЩ„ЫҢ ШӘШ§ШұЫҢШ® ЩҒЩҲШӘ ЩҶШҜШ§ШұШҜ.`,ids:[p.id]});if(!personHasPhoto(p))issues.push({type:'photo',level:'info',icon:'рҹ“·',title:'Ш№Ъ©Ші ЩҶШҜШ§ШұШҜ',sub:`ШЁШұШ§ЫҢ ${p.fullName||'ШЁШҜЩҲЩҶ ЩҶШ§Щ…'} Ш№Ъ©Ші Ш«ШЁШӘ ЩҶШҙШҜЩҮ Ш§ШіШӘ.`,ids:[p.id]})});return issues}
function qualityStats(){const issues=dataQualityIssues();return{total:peopleCache.length,issues:issues.length,bad:issues.filter(i=>i.level==='bad').length,warn:issues.filter(i=>i.level==='warn').length,photos:peopleCache.filter(personHasPhoto).length,dates:peopleCache.filter(p=>p.birthYear||p.birthMonth||p.birthDay).length}}

value="photo">ШЁШҜЩҲЩҶ Ш№Ъ©Ші</option><option value="date">ШӘШ§ШұЫҢШ® ШӘЩҲЩ„ШҜ ЩҶШ§ЩӮШө</option></select></div><div id="qualityList">${qualityListHtml(issues)}</div></div>`}
function qualityListHtml(list){if(!list.length)return'<div class="empty">ЩҒШ№Щ„Ш§ЩӢ Ш®Ш·Ш§ ЫҢШ§ ЩҮШҙШҜШ§Шұ Щ…ЩҮЩ…ЫҢ ЩҫЫҢШҜШ§ ЩҶШҙШҜ.</div>';return`<div class="guard-list">${list.map(i=>`<div class="guard-issue"><div><b>${i.icon||'вҡ пёҸ'} ${esc(i.title)}</b><small>${esc(i.sub)}</small><div>${(i.ids||[]).slice(0,4).map(id=>personById(id)?`<button class="link-person openProfile" data-id="${esc(id)}">${esc(personName(id))}</button>`:'').join(' ')}</div></div><span class="pill ${i.level==='bad'?'bad':(i.level==='warn'?'purple':'blue')}">${i.level==='bad'?'Щ…ЩҮЩ…':(i.level==='warn'?'ЩҮШҙШҜШ§Шұ':'Ш§Ш·Щ„Ш§Ш№Ш§ШӘ')}</span></div>`).join('')}</div>`}

async function syncSpouse(personId,spouseId){personId=String(personId||'');spouseId=String(spouseId||'');if(!personId||!spouseId||personId===spouseId)return;const p=personById(personId),sp=personById(spouseId);const pIds=new Set(getSpouseIds(p));pIds.add(spouseId);await updateDoc(doc(db,'people',personId),{spouseId:[...pIds][0]||'',spouseIds:[...pIds],updatedAt:serverTimestamp()}).catch(()=>{});if(sp){const sIds=new Set(getSpouseIds(sp));sIds.add(personId);await updateDoc(doc(db,'people',spouseId),{spouseId:[...sIds][0]||'',spouseIds:[...sIds],updatedAt:serverTimestamp()}).catch(()=>{})}}let childRowsState=[{name:'',gender:'male',fatherId:'',motherId:''}],backupData=null,backupStats=null;
function readChildRowsUI(){

{icon:'рҹӣЎпёҸ',title:'ШіЩ„Ш§Щ…ШӘ ЩҲ ШЁЪ©Ш§Щҫ',sub:'ЪҜШІШ§ШұШҙ Ъ©ЫҢЩҒЫҢШӘ ШҜШ§ШҜЩҮШҢ ШЁЪ©Ш§Щҫ Ъ©Ш§Щ…Щ„ ЩҲ ШЁШұШұШіЫҢ Ш®Ш·Ш§ЩҮШ§ЫҢ ШұЩҲШ§ШЁШ·',route:'quality',keys:'ШіЩ„Ш§Щ…ШӘ ШЁЪ©Ш§Щҫ backup ЩҫШҙШӘЫҢШЁШ§ЩҶ Ш®Ш·Ш§ Ъ©ЫҢЩҒЫҢШӘ ШҜШ§ШҜЩҮ ШұЩҲШ§ШЁШ· ШӘЪ©ШұШ§ШұЫҢ Ш№Ъ©Ші ШӘШ§ШұЫҢШ®'},
{icon:'рҹ“·',title:'Щ…ЩҲШӘЩҲШұ Ш№Ъ©Ші',sub:'Щ…ШҜЫҢШұЫҢШӘ Ш№Ъ©Ші Ш§ЩҒШұШ§ШҜШҢ ЩҒШҙШұШҜЩҮвҖҢШіШ§ШІЫҢШҢ Ш§ЩҒШұШ§ШҜ ШЁШҜЩҲЩҶ Ш№Ъ©Ші ЩҲ ЪҜШІШ§ШұШҙ Ш№Ъ©ШівҖҢЩҮШ§',route:'photos',keys:'Ш№Ъ©Ші ШӘШөЩҲЫҢШұ photo upload ШўЩҫЩ„ЩҲШҜ ЩҒШҙШұШҜЩҮ ШіШ§ШІЫҢ ШЁШҜЩҲЩҶ Ш№Ъ©Ші ЪҜШ§Щ„ШұЫҢ'},
{icon:'рҹ“Ҙ',title:'ЩҲШұЩҲШҜ ШЁЪ©Ш§Щҫ',sub:'ЩҲШ§ШұШҜ Ъ©ШұШҜЩҶ ЩҒШ§ЫҢЩ„ ЩҫШҙШӘЫҢШЁШ§ЩҶ',route:'import',keys:'ШЁЪ©Ш§Щҫ ЩҲШұЩҲШҜ backup import json'}];return pages}
function globalSearchBuild(q=''){const term=String(q||'').trim().toLowerCase();const out=[];const add=(item,hay,score=1)=>{if(!term||String(hay||'').toLowerCase().includes(term))out.push({...item,score})};globalSearchPages().forEach(p=>add({type:'route',...p},`${p.title} ${p.sub} ${p.keys}`,6));peopleCache.forEach(p=>{const father=personName(p.fatherId),mother=personName(p.motherId),sp=spousesOf(p.id).map(x=>x.fullName).join(' '),ch=childrenOf(p.id).map(x=>x.fullName).join(' ');const hay=[p.fullName,father,mother,sp,ch,p.gender==='female'?'ШІЩҶ':'Щ…ШұШҜ',p.lifeStatus==='dead'?'ЩҒЩҲШӘ ЩҒЩҲШӘ ШҙШҜЩҮ Щ…ШұШҜЩҮ':'ШІЩҶШҜЩҮ',p.birthYear,p.birthMonth,p.birthDay,p.phone,p.job,p.notes].join(' ');add({type:'person',icon:p.lifeStatus==='dead'?'рҹӘҰ':(p.gender==='female'?'рҹ‘©':'рҹ‘Ө'),title:p.fullName||'ШЁШҜЩҲЩҶ ЩҶШ§Щ…',sub:`ЩҫШҜШұ: ${father} | Щ…Ш§ШҜШұ: ${mother} | ЩҮЩ…ШіШұ: ${sp||'Ш«ШЁШӘ ЩҶШҙШҜЩҮ'} | ЩҒШұШІЩҶШҜ: ${childrenOf(p.id).length}`,id:p.id},hay,10)});if(isAdmin())usersCache.forEach(u=>add({type:'route',icon:'рҹ”җ',title:u.email||'Ъ©Ш§ШұШЁШұ ШЁШҜЩҲЩҶ Ш§ЫҢЩ…ЫҢЩ„',sub:`Ъ©Ш§ШұШЁШұ | ЩҶЩӮШҙ: ${u.role||'-'} | ${u.approved?'ШӘШ§ЫҢЫҢШҜ ШҙШҜЩҮ':'ШҜШұ Ш§ЩҶШӘШёШ§Шұ'}`,route:'users'},`${u.email} ${u.displayName} ${u.role} ${u.approved?'ШӘШ§ЫҢЫҢШҜ ШҙШҜЩҮ approved':'ШҜШұ Ш§ЩҶШӘШёШ§Шұ pending'}`,4));notificationsCache.forEach(n=>add({type:'notif',icon:'вңүпёҸ',title:n.title||'Ш§Ш№Щ„Ш§ЩҶ',sub:n.message||'',id:n.id},`${n.title} ${n.message} ${n.type}`,3));return out.sort((a,b)=>b.score-a.score).slice(0,70)}
function globalSearchHighlight(text,q){text=esc(text||'');q=String(q||'').trim();if(!q)return text;try{const safe=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return text.replace(new RegExp(safe,'gi'),m=>`<span class="search-highlight">${m}</span>`)}catch{return text}}
function globalSearchRender(){const input=$('globalSearchInput'),box=$('globalSearchResults');if(!input||!box)return;const q=input.value;const list=globalSearchBuild(q);if(!q.trim()){box.innerHTML='<div class="search-empty">ШЁШұШ§ЫҢ Ш¬ШіШӘШ¬ЩҲ ШӘШ§ЫҢЩҫ Ъ©ЩҶ...<br>Щ…Ш«Щ„Ш§ЩӢ ЩҶШ§Щ… ШҙШ®ШөШҢ ЩҫШҜШұШҢ Щ…Ш§ШҜШұШҢ ЩҮЩ…ШіШұШҢ ЩҒШұШІЩҶШҜ ЫҢШ§ ЩҶШ§Щ… ШөЩҒШӯЩҮ ШұШ§ ШЁЩҶЩҲЫҢШі.</div>';return}if(!list.length){box.innerHTML='<div class="search-empty">ЩҶШӘЫҢШ¬ЩҮвҖҢШ§ЫҢ ЩҫЫҢШҜШ§ ЩҶШҙШҜ.</div>';return}box.innerHTML=list.map((r,i)=>`<button class="search-result globalSearchItem" data-i="${i}" type="button"><span class="search-result-icon">${r.icon||'рҹ”Һ'}</span><span class="search-result-body"><span class="search-result-title">${globalSearchHighlight(r.title,q)}</span><span class="search-result-sub">${globalSearchHighlight(r.sub,q)}</span></span></button>`).join('');box.querySelectorAll('.globalSearchItem').forEach(b=>b.onclick=()=>globalSearchOpen(list[Number(b.dataset.i)]))}
function globalSearchOpen(item){closeGlobalSearch();if(!item)return;if(item.type==='person'){goProfile(item.id);return}if(item.type==='notif'){setRoute('notifications');setTimeout(()=>openNotif(item.id),50);return}if(item.route)setRoute(item.route)}
function openGlobalSearch(){const ov=$('globalSearchOverlay'),inp=$('globalSearchInput');if(!ov||!inp)return;ov.classList.add('open');inp.value='';globalSearchRender();setTimeout(()=>inp.focus(),80)}
function closeGlobalSearch(){$('globalSearchOverlay')&&$('globalSearchOverlay').classList.remove('open')}
function openModal(title,body){$('modalTitle').textContent=title;$('modalBody').innerHTML=body;$('modalBack').classList.add('open')}function closeModal(){$('modalBack').classList.remove('open')}function openNotif(id){const n=notificationsCache.find(x=>x.id===id);if(!n)return;openModal(n.title||'Ш§Ш№Щ„Ш§ЩҶ',`<p>${esc(n.message||'')}</p><p><span class="pill blue">${esc(n.type||'-')}</span><span class="pill">${stamp(n.createdAt)||'-'}</span></p>`)}$('modalClose').onclick=closeModal;$('modalBack').onclick=e=>{if(e.target===$('modalBack'))closeModal()};
function openDrawer(){$('dashboardDrawer').classList.add('open');$('drawerBack').classList.add('open')}function closeDrawer(){$('dashboardDrawer').classList.remove('open');$('drawerBack').classList.remove('open')}$('openDrawerBtn').onclick=openDrawer;$('closeDrawerBtn').onclick=closeDrawer;$('drawerBack').onclick=closeDrawer;$('mainNav').onclick=e=>{const b=e.target.closest('button[data-route]');if(b)setRoute(b.dataset.route)};$('homeBtn').onclick=()=>setRoute('dashboard');$('notifTopBtn').onclick=()=>setRoute('notifications');$('globalSearchBtn').onclick=openGlobalSearch;$('quickRefreshBtn')&&($('quickRefreshBtn').onclick=quickRefreshAll);$('quickHealthBtn')&&($('quickHealthBtn').onclick=openHealthCheck);$('globalSearchClose').onclick=closeGlobalSearch;$('globalSearchInput').oninput=globalSearchRender;$('globalSearchOverlay').onclick=e=>{if(e.target===$('globalSearchOverlay'))closeGlobalSearch()};document.addEventListener('keydown',e=>{if(e.key==='Escape')closeGlobalSearch();if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){e.preventDefault();openGlobalSearch()}});$('logoutBtn').onclick=()=>signOut(auth);
$('showRegisterBtn').onclick=()=>$('registerBox').classList.toggle('hidden');$('resetBtn').onclick=async()=>{const email=val('loginEmail');if(!email)return msg('Ш§ЫҢЩ…ЫҢЩ„ ШұШ§ ЩҲШ§ШұШҜ Ъ©ЩҶ');await sendPasswordResetEmail(auth,email).then(()=>msg('Ш§ЫҢЩ…ЫҢЩ„ ШЁШ§ШІЫҢШ§ШЁЫҢ Ш§ШұШіШ§Щ„ ШҙШҜ',true)).catch(e=>msg(e.message))};$('loginBtn').onclick=async()=>{msg('');await signInWithEmailAndPassword(auth,val('loginEmail'),val('loginPass')).catch(e=>msg('Ш®Ш·Ш§: '+e.message))};$('registerBtn').onclick=async()=>{msg('');await createUserWithEmailAndPassword(auth,val('regEmail'),val('regPass')).then(async cred=>{await ensureUserDoc(cred.user);msg('Ш«ШЁШӘвҖҢЩҶШ§Щ… Ш§ЩҶШ¬Ш§Щ… ШҙШҜ. Щ…ЩҶШӘШёШұ ШӘШ§ЫҢЫҢШҜ Щ…ШҜЫҢШұ ШЁШ§ШҙЫҢШҜ.',true)}).catch(e=>msg('Ш®Ш·Ш§: '+e.message))};
onAuthStateChanged(auth,async user=>{currentUser=user;if(!user){showLogin(true);return}try{currentProfile=await ensureUserDoc(user);if(currentProfile.disabled){msg('ШӯШіШ§ШЁ ШәЫҢШұЩҒШ№Ш§Щ„ Ш§ШіШӘ');await signOut(auth);return}if(!currentProfile.approved){showLogin(true);msg('ШӯШіШ§ШЁ ШҙЩ…Ш§ ШҜШұ Ш§ЩҶШӘШёШ§Шұ ШӘШ§ЫҢЫҢШҜ Щ…ШҜЫҢШұ Ш§ШіШӘ.');return}showLogin(false);await loadAll();setRoute(currentRoute||'dashboard')}catch(e){showLogin(true);msg('Ш®Ш·Ш§ЫҢ Firebase: '+e.message)}});
if('serviceWorker'in navigator){navigator.serviceWorker.register('./service-worker.js?v=245-data-guard').catch(()=>{})}
</script>
