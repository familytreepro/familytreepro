<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شجره‌نامه پرو</title>

<style>
*{box-sizing:border-box}
body{margin:0;background:#0f172a;color:white;font-family:tahoma;text-align:center}
.header{padding:35px 15px;background:linear-gradient(135deg,#064e3b,#0f172a)}
.box{max-width:1100px;margin:auto;padding:15px}
.card{background:#1e293b;margin-top:18px;padding:18px;border-radius:18px}
input,select,textarea,button{padding:10px;margin:5px;border-radius:10px;border:0;font-family:tahoma;font-size:15px}
input,select,textarea{background:#020617;color:white;border:1px solid #334155}
textarea{width:90%;min-height:65px}
button{background:#22c55e;color:white;cursor:pointer}
.edit{background:#3b82f6}
.delete{background:#ef4444}
.backup{background:#f59e0b}
.print{background:#8b5cf6}
.person{background:#0f172a;margin:8px 0;padding:12px;border-radius:14px;text-align:right}
.info{font-size:13px;color:#cbd5e1;line-height:1.8}
.tree-area{background:#020617;border-radius:18px;padding:25px;overflow:auto}
.tree-node{display:inline-block;min-width:160px;margin:10px;padding:14px;border-radius:16px;color:white}
.male{background:#2563eb}
.female{background:#db2777}
.unknown{background:#475569}
.line{width:3px;height:22px;background:#94a3b8;margin:auto}
.tree-children{border-top:2px dashed #64748b;margin-top:18px;padding-top:18px;display:flex;justify-content:center;gap:18px;flex-wrap:wrap}
.stats-box{display:flex;flex-wrap:wrap;justify-content:center;gap:12px}
.stat-item{background:#020617;padding:14px;border-radius:14px;min-width:130px}
.stat-item strong{font-size:23px;color:#22c55e}
.result{background:#020617;margin:8px;padding:12px;border-radius:12px;text-align:right}

@media(max-width:700px){
input,select,textarea{width:92%}
.header h1{font-size:28px}
.tree-node{min-width:130px}
}

@media print{
.no-print{display:none!important}
body{background:white;color:black}
.card,.tree-area{background:white;color:black}
button,input,select,textarea{display:none}
}
</style>
</head>

<body>

<div class="header">
<h1>🌳 شجره‌نامه پرو</h1>
<p>نسخه پایدار: خانواده، فرزندان، آمار، جستجو، پشتیبان‌گیری و چاپ</p>
</div>

<div class="box">

<div class="card no-print">
<h2>➕ افزودن فرد اصلی</h2>
<input id="name" placeholder="نام فرد">
<select id="gender">
<option value="male">آقا</option>
<option value="female">خانم</option>
</select>
<input id="father" placeholder="نام پدر">
<input id="mother" placeholder="نام مادر">
<input id="spouse" placeholder="نام همسر">
<br>
<input id="birthDate" placeholder="تاریخ تولد">
<input id="birthPlace" placeholder="شهر / محل تولد">
<input id="phone" placeholder="شماره تماس">
<br>
<textarea id="notes" placeholder="توضیحات"></textarea>
<br>
<button onclick="addPerson()">افزودن فرد</button>
</div>

<div class="card no-print">
<h2>👶 افزودن فرزند</h2>
<select id="parentSelect"></select>
<input id="childName" placeholder="نام فرزند">
<select id="childGender">
<option value="male">👦 پسر</option>
<option value="female">👧 دختر</option>
</select>
<input id="childFather" placeholder="نام پدر">
<input id="childMother" placeholder="نام مادر">
<input id="childSpouse" placeholder="نام همسر">
<br>
<input id="childBirthDate" placeholder="تاریخ تولد">
<input id="childBirthPlace" placeholder="شهر / محل تولد">
<input id="childPhone" placeholder="شماره تماس">
<br>
<textarea id="childNotes" placeholder="توضیحات"></textarea>
<br>
<button onclick="addChild()">افزودن فرزند</button>
</div>

<div class="card no-print">
<h2>🔎 جستجو</h2>
<input id="searchInput" placeholder="جستجو نام، پدر، مادر، همسر یا شهر" oninput="searchPeople()">
<button onclick="clearSearch()">پاک کردن</button>
<div id="searchResults"></div>
</div>

<div class="card no-print">
<h2>💾 پشتیبان‌گیری</h2>
<button class="backup" onclick="exportBackup()">📤 خروجی</button>
<button class="backup" onclick="document.getElementById('backupFile').click()">📥 ورود اطلاعات</button>
<input type="file" id="backupFile" accept=".json" style="display:none" onchange="importBackup(event)">
<button class="delete" onclick="clearAllData()">🧹 حذف همه</button>
</div>

<div class="card no-print">
<h2>🖨 چاپ / PDF</h2>
<button class="print" onclick="window.print()">چاپ / ذخیره PDF</button>
</div>

<div class="card">
<h2>📊 آمار خانواده</h2>
<div id="stats"></div>
</div>

<div class="card no-print">
<h2>📋 مدیریت افراد</h2>
<div id="list"></div>
</div>

<div class="card">
<h2>🌳 نمایش شجره</h2>
<div id="tree" class="tree-area"></div>
</div>

</div>

<script>
var people = JSON.parse(localStorage.getItem("people") || "[]");

function save(){
  localStorage.setItem("people", JSON.stringify(people));
  render();
}

function icon(g){
  return g === "male" ? "👦" : "👧";
}

function getValue(id){
  return document.getElementById(id).value.trim();
}

function clearFields(ids){
  ids.forEach(function(id){
    document.getElementById(id).value = "";
  });
}

function newId(){
  return Date.now() + Math.floor(Math.random() * 10000);
}

function addPerson(){
  var name = getValue("name");
  if(!name){ alert("نام را وارد کنید"); return; }

  people.push({
    id:newId(),
    name:name,
    gender:getValue("gender"),
    father:getValue("father"),
    mother:getValue("mother"),
    spouse:getValue("spouse"),
    birthDate:getValue("birthDate"),
    birthPlace:getValue("birthPlace"),
    phone:getValue("phone"),
    notes:getValue("notes"),
    children:[]
  });

  clearFields(["name","father","mother","spouse","birthDate","birthPlace","phone","notes"]);
  save();
}

function addChild(){
  var parentId = document.getElementById("parentSelect").value;
  var name = getValue("childName");
  if(!name){ alert("نام فرزند را وارد کنید"); return; }

  var parent = findPerson(people, parentId);
  if(!parent){ alert("ابتدا یک فرد اصلی اضافه کنید"); return; }

  parent.children.push({
    id:newId(),
    name:name,
    gender:getValue("childGender"),
    father:getValue("childFather"),
    mother:getValue("childMother"),
    spouse:getValue("childSpouse"),
    birthDate:getValue("childBirthDate"),
    birthPlace:getValue("childBirthPlace"),
    phone:getValue("childPhone"),
    notes:getValue("childNotes"),
    children:[]
  });

  clearFields(["childName","childFather","childMother","childSpouse","childBirthDate","childBirthPlace","childPhone","childNotes"]);
  save();
}

function findPerson(list,id){
  for(var i=0;i<list.length;i++){
    if(String(list[i].id) === String(id)) return list[i];

    var found = findPerson(list[i].children || [], id);
    if(found) return found;
  }
  return null;
}

function editName(id){
  var p = findPerson(people,id);
  if(!p) return;

  var n = prompt("نام جدید:", p.name);
  if(n && n.trim()){
    p.name = n.trim();
    save();
  }
}

function editInfo(id){
  var p = findPerson(people,id);
  if(!p) return;

  p.father = prompt("نام پدر:", p.father || "") || "";
  p.mother = prompt("نام مادر:", p.mother || "") || "";
  p.spouse = prompt("نام همسر:", p.spouse || "") || "";
  p.birthDate = prompt("تاریخ تولد:", p.birthDate || "") || "";
  p.birthPlace = prompt("شهر / محل تولد:", p.birthPlace || "") || "";
  p.phone = prompt("شماره تماس:", p.phone || "") || "";
  p.notes = prompt("توضیحات:", p.notes || "") || "";

  save();
}

function deletePerson(id){
  if(!confirm("حذف شود؟")) return;
  people = removePerson(people,id);
  save();
}

function removePerson(list,id){
  var result = [];

  list.forEach(function(p){
    if(String(p.id) !== String(id)){
      p.children = removePerson(p.children || [], id);
      result.push(p);
    }
  });

  return result;
}

function renderOptions(list){
  var html = "";
  list.forEach(function(p){
    html += '<option value="'+p.id+'">'+p.name+'</option>';
    html += renderOptions(p.children || []);
  });
  return html;
}

function renderList(list){
  var html = "";

  list.forEach(function(p){
    html += '<div class="person">';
    html += '<strong>'+icon(p.gender)+' '+p.name+'</strong>';
    html += '<div class="info">';
    html += 'پدر: '+(p.father || "-")+' | مادر: '+(p.mother || "-")+' | همسر: '+(p.spouse || "-")+'<br>';
    html += 'تولد: '+(p.birthDate || "-")+' | شهر: '+(p.birthPlace || "-")+' | تماس: '+(p.phone || "-")+'<br>';
    html += 'توضیحات: '+(p.notes || "-");
    html += '</div>';
    html += '<button class="edit" onclick="editName('+p.id+')">ویرایش نام</button>';
    html += '<button class="edit" onclick="editInfo('+p.id+')">ویرایش مشخصات</button>';
    html += '<button class="delete" onclick="deletePerson('+p.id+')">حذف</button>';
    html += '<div style="margin-right:25px">'+renderList(p.children || [])+'</div>';
    html += '</div>';
  });

  return html;
}

function renderTreeNode(p){
  var cls = p.gender === "male" ? "male" : "female";
  var children = p.children || [];

  var html = '<div>';
  html += '<div class="tree-node '+cls+'">';
  html += '<div style="font-size:20px">'+icon(p.gender)+' '+p.name+'</div>';
  html += '<div class="info">پدر: '+(p.father || "-")+'</div>';
  html += '<div class="info">مادر: '+(p.mother || "-")+'</div>';
  html += '<div class="info">همسر: '+(p.spouse || "-")+'</div>';
  html += '<div class="info">تولد: '+(p.birthDate || "-")+'</div>';
  html += '<div class="info">شهر: '+(p.birthPlace || "-")+'</div>';
  html += '</div>';

  if(children.length){
    html += '<div class="line"></div><div class="tree-children">';
    children.forEach(function(c){
      html += renderTreeNode(c);
    });
    html += '</div>';
  }

  html += '</div>';
  return html;
}

function renderTree(){
  if(!people.length) return "<p>هنوز فردی ثبت نشده است.</p>";

  var html = "";
  people.forEach(function(p){
    html += renderTreeNode(p);
  });
  return html;
}

function getAll(list){
  var all = [];
  list.forEach(function(p){
    all.push(p);
    all = all.concat(getAll(p.children || []));
  });
  return all;
}

function generationCount(list){
  if(!list.length) return 0;

  var max = 0;
  list.forEach(function(p){
    var d = generationCount(p.children || []);
    if(d > max) max = d;
  });

  return max + 1;
}

function renderStats(){
  var all = getAll(people);

  var males = all.filter(function(p){ return p.gender === "male"; }).length;
  var females = all.filter(function(p){ return p.gender === "female"; }).length;
  var married = all.filter(function(p){ return p.spouse && p.spouse.trim() !== ""; }).length;

  document.getElementById("stats").innerHTML =
    '<div class="stats-box">'+
    '<div class="stat-item">👥 کل افراد<br><strong>'+all.length+'</strong></div>'+
    '<div class="stat-item">👦 پسرها<br><strong>'+males+'</strong></div>'+
    '<div class="stat-item">👧 دخترها<br><strong>'+females+'</strong></div>'+
    '<div class="stat-item">💍 دارای همسر<br><strong>'+married+'</strong></div>'+
    '<div class="stat-item">🌳 نسل‌ها<br><strong>'+generationCount(people)+'</strong></div>'+
    '</div>';
}

function flatten(list,path){
  var all = [];
  list.forEach(function(p){
    var current = path ? path + " ← " + p.name : p.name;
    p.path = current;
    all.push(p);
    all = all.concat(flatten(p.children || [], current));
  });
  return all;
}

function searchPeople(){
  var s = getValue("searchInput").toLowerCase();
  var box = document.getElementById("searchResults");

  if(!s){ box.innerHTML = ""; return; }

  var results = flatten(people,"").filter(function(p){
    return (p.name || "").toLowerCase().includes(s) ||
           (p.father || "").toLowerCase().includes(s) ||
           (p.mother || "").toLowerCase().includes(s) ||
           (p.spouse || "").toLowerCase().includes(s) ||
           (p.birthPlace || "").toLowerCase().includes(s);
  });

  if(!results.length){
    box.innerHTML = "<p>نتیجه‌ای پیدا نشد.</p>";
    return;
  }

  box.innerHTML = results.map(function(p){
    return '<div class="result"><strong>'+icon(p.gender)+' '+p.name+'</strong><br><small>'+p.path+'</small></div>';
  }).join("");
}

function clearSearch(){
  document.getElementById("searchInput").value = "";
  document.getElementById("searchResults").innerHTML = "";
}

function exportBackup(){
  var blob = new Blob([JSON.stringify({people:people},null,2)], {type:"application/json"});
  var link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "shajare-backup.json";
  link.click();
}

function importBackup(event){
  var file = event.target.files[0];
  if(!file) return;

  var reader = new FileReader();

  reader.onload = function(e){
    try{
      var data = JSON.parse(e.target.result);
      people = data.people || [];
      save();
      alert("اطلاعات وارد شد");
    }catch(err){
      alert("فایل معتبر نیست");
    }
  };

  reader.readAsText(file);
}

function clearAllData(){
  if(confirm("همه اطلاعات حذف شود؟")){
    people = [];
    localStorage.removeItem("people");
    render();
  }
}

function render(){
  document.getElementById("parentSelect").innerHTML = renderOptions(people);
  document.getElementById("list").innerHTML = renderList(people);
  document.getElementById("tree").innerHTML = renderTree();
  renderStats();
}

render();
</script>

</body>
</html>
