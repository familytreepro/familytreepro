<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شجره نامه پرو</title>

<style>
body{
  margin:0;
  background:#0f172a;
  font-family:tahoma;
  color:white;
  text-align:center;
}
.header{
  padding:50px 20px;
  background:linear-gradient(135deg,#14532d,#0f172a);
}
h1{font-size:42px}
.box{
  max-width:1000px;
  margin:auto;
  padding:25px;
}
.card{
  background:#1e293b;
  padding:25px;
  border-radius:18px;
  margin-top:20px;
}
input,select,button{
  padding:12px;
  margin:6px;
  border-radius:10px;
  border:none;
  font-size:16px;
}
button{
  background:#22c55e;
  color:white;
  cursor:pointer;
}
.edit{background:#3b82f6}
.delete{background:#ef4444}
.person{
  background:#0f172a;
  padding:15px;
  border-radius:12px;
  margin:10px 0;
  text-align:right;
}
.child{
  margin-right:25px;
  color:#cbd5e1;
}
</style>
</head>

<body>

<div class="header">
  <h1>🌳 شجره نامه پرو</h1>
  <p>ثبت افراد، فرزندان و ویرایش نام</p>
</div>

<div class="box">

  <div class="card">
    <h2>➕ افزودن فرد</h2>
    <input id="name" placeholder="نام فرد">
    <button onclick="addPerson()">افزودن</button>
  </div>

  <div class="card">
    <h2>👶 افزودن فرزند</h2>
    <select id="parentSelect"></select>
    <input id="childName" placeholder="نام فرزند">
    <button onclick="addChild()">افزودن فرزند</button>
  </div>

  <div class="card">
    <h2>📋 لیست شجره</h2>
    <div id="list"></div>
  </div>

</div>

<script>
let people = JSON.parse(localStorage.getItem("people")) || [];

function save(){
  localStorage.setItem("people", JSON.stringify(people));
  render();
}

function addPerson(){
  let name = document.getElementById("name").value.trim();

  if(!name){
    alert("نام را وارد کنید");
    return;
  }

  people.push({
    id: Date.now(),
    name: name,
    children: []
  });

  document.getElementById("name").value = "";
  save();
}

function addChild(){
  let parentId = document.getElementById("parentSelect").value;
  let childName = document.getElementById("childName").value.trim();

  if(!childName){
    alert("نام فرزند را وارد کنید");
    return;
  }

  let parent = people.find(p => p.id == parentId);

  if(parent){
    parent.children.push({
      id: Date.now(),
      name: childName
    });
  }

  document.getElementById("childName").value = "";
  save();
}

function editPerson(id){
  let person = people.find(p => p.id == id);
  let newName = prompt("نام جدید را وارد کنید:", person.name);

  if(newName && newName.trim()){
    person.name = newName.trim();
    save();
  }
}

function editChild(parentId, childId){
  let parent = people.find(p => p.id == parentId);
  let child = parent.children.find(c => c.id == childId);

  let newName = prompt("نام جدید فرزند را وارد کنید:", child.name);

  if(newName && newName.trim()){
    child.name = newName.trim();
    save();
  }
}

function deletePerson(id){
  if(confirm("این فرد حذف شود؟")){
    people = people.filter(p => p.id != id);
    save();
  }
}

function deleteChild(parentId, childId){
  let parent = people.find(p => p.id == parentId);

  if(confirm("این فرزند حذف شود؟")){
    parent.children = parent.children.filter(c => c.id != childId);
    save();
  }
}

function render(){
  let list = document.getElementById("list");
  let select = document.getElementById("parentSelect");

  list.innerHTML = "";
  select.innerHTML = "";

  people.forEach(person => {
    select.innerHTML += `<option value="${person.id}">${person.name}</option>`;

    let childrenHtml = "";

    person.children.forEach(child => {
      childrenHtml += `
        <div class="child">
          👶 ${child.name}
          <button class="edit" onclick="editChild(${person.id}, ${child.id})">ویرایش</button>
          <button class="delete" onclick="deleteChild(${person.id}, ${child.id})">حذف</button>
        </div>
      `;
    });

    list.innerHTML += `
      <div class="person">
        <strong>👤 ${person.name}</strong>
        <button class="edit" onclick="editPerson(${person.id})">ویرایش نام</button>
        <button class="delete" onclick="deletePerson(${person.id})">حذف</button>
        <div>${childrenHtml}</div>
      </div>
    `;
  });
}

render();
</script>

</body>
</html>
