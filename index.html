const VERSION='V218 Final Home UI',ADMIN_EMAIL='alibahripor33@gmail.com';const firebaseConfig={apiKey:"AIzaSyDNpNOpFSmJvkyBwpoJnkMEcZBj7tknKB8",authDomain:"family-tree-pro-a661d.firebaseapp.com",projectId:"family-tree-pro-a661d",storageBucket:"family-tree-pro-a661d.firebasestorage.app",messagingSenderId:"634237399841",appId:"1:634237399841:web:7ad2813dbbc3697ab6c460"};const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);await setPersistence(auth,browserLocalPersistence);
let currentUser=null,currentProfile=null,currentRoute='dashboard',usersCache=[],peopleCache=[],notificationsCache=[];const $=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m])),val=id=>String($(id)?.value||'').trim(),isAdmin=()=>currentProfile?.role==='admin',stamp=v=>v?.toDate?v.toDate().toLocaleString('fa-IR'):'';

async function ensureUserDoc(user){const ref=doc(db,'users',user.uid),snap=await getDoc(ref),email=(user.email||'').toLowerCase(),admin=email===ADMIN_EMAIL.toLowerCase();if(!snap.exists())await setDoc(ref,{uid:user.uid,email:user.email||'',displayName:user.displayName||'',role:admin?'admin':'viewer',approved:admin,disabled:false,createdAt:serverTimestamp(),lastLogin:serverTimestamp(),source:'v218-login-autosync'});else await updateDoc(ref,{lastLogin:serverTimestamp(),email:user.email||snap.data().email||''}).catch(()=>{});const fresh=await getDoc(ref);return{id:fresh.id,...fresh.data()}}
async function loadUsers(){const s=await getDocs(collection(db,'users'));usersCache=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>String(a.email||'').localeCompare(String(b.email||'')))}async function loadPeople(){const s=await getDocs(collection(db,'people'));peopleCache=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>String(a.fullName||'').localeCompare(String(b.fullName||''),'fa'))}async function loadNotifications(){const qy=query(collection(db,'notifications'),orderBy('createdAt','desc'));const s=await getDocs(qy).catch(()=>({docs:[]}));notificationsCache=s.docs.map(d=>({id:d.id,...d.data()})).filter(n=>isAdmin()||!n.userId||n.userId===currentUser?.uid).slice(0,80)}async function loadAll(){await Promise.all([loadUsers(),loadPeople(),loadNotifications()])}
function updateHeaderActions(){const isHome=currentRoute==='dashboard';$('homeBtn').classList.toggle('hidden',isHome);$('notifTopBtn').classList.toggle('hidden',!isHome);$('logoutBtn').classList.toggle('hidden',!isHome)}function setRoute(route){currentRoute=route;document.querySelectorAll('#mainNav button').forEach(b=>b.classList.toggle('active',b.dataset.route===route));updateHeaderActions();closeDrawer();render()}window.setRoute=setRoute;function render(){const main=$('mainView');main.replaceChildren();const box=document.createElement('div');main.appendChild(box);box.innerHTML=currentRoute==='users'?usersView():currentRoute==='people'?peopleView():currentRoute==='notifications'?notificationsView():dashboardView();bindRouteEvents()}
function countGenerations(){if(!peopleCache.length)return 0;const byId=new Map(peopleCache.map(p=>[p.id,p])),memo=new Map();function gen(id,seen=new Set()){if(!id||!byId.has(id)||seen.has(id))return 0;if(memo.has(id))return memo.get(id);seen.add(id);const p=byId.get(id),g=Math.max(gen(p.fatherId,seen),gen(p.motherId,seen))+1;memo.set(id,g);return g}return Math.max(1,...peopleCache.map(p=>gen(p.id,new Set())))}

function usersView(){if(!isAdmin())return`<div class="card empty">فقط مدیر به احراز کاربران دسترسی دارد.</div>`;const admins=usersCache.filter(u=>u.role==='admin').length,editors=usersCache.filter(u=>u.role==='editor').length,pending=usersCache.filter(u=>!u.approved).length;return`<div class="hero"><h2>احراز و کاربران</h2><p>مدیریت کاربران و نقش‌ها</p></div><div class="grid stats"><div class="card stat"><div><small>کل</small><div class="num">${usersCache.length}</div></div><div class="icon">👥</div></div><div class="card stat"><div><small>مدیر</small><div class="num">${admins}</div></div><div class="icon">🛡️</div></div><div class="card stat"><div><small>ویرایشگر</small><div class="num">${editors}</div></div><div class="icon">✏️</div></div><div class="card stat"><div><small>در انتظار</small><div class="num">${pending}</div></div><div class="icon">⏳</div></div></div><div class="card"><div class="toolbar"><input id="userSearch" class="field" placeholder="جستجوی ایمیل"><select id="roleFilter" class="field"><option value="">همه نقش‌ها</option><option value="admin">admin</option><option value="editor">editor</option><option value="viewer">viewer</option></select><select id="approveFilter" class="field"><option value="">همه وضعیت‌ها</option><option value="approved">تایید شده</option><option value="pending">در انتظار</option></select><button id="reloadUsersBtn" class="btn">بروزرسانی</button></div><div id="usersTable">${usersTable(usersCache)}</div></div>`}

function peopleView(){const male=peopleCache.filter(p=>p.gender==='male').length,female=peopleCache.filter(p=>p.gender==='female').length,dead=peopleCache.filter(p=>p.lifeStatus==='dead').length;return`<div class="hero"><h2>افراد</h2><p>افزودن و مدیریت افراد خانواده</p></div><div class="grid stats"><div class="card stat"><div><small>کل افراد</small><div class="num">${peopleCache.length}</div></div><div class="icon">🌳</div></div><div class="card stat"><div><small>مردان</small><div class="num">${male}</div></div><div class="icon">👨</div></div><div class="card stat"><div><small>زنان</small><div class="num">${female}</div></div><div class="icon">👩</div></div><div class="card stat"><div><small>فوت‌شده</small><div class="num">${dead}</div></div><div class="icon">🪦</div></div></div><div class="card"><b>افزودن فرد</b><div class="form-grid" style="margin-top:10px"><input id="personName" class="field name" placeholder="نام کامل"><select id="personGender" class="field"><option value="male">مرد</option><option value="female">زن</option></select><select id="personLife" class="field"><option value="alive">زنده</option><option value="dead">فوت شده</option></select><input id="birthYear" class="field" placeholder="سال"><input id="birthMonth" class="field" placeholder="ماه"><input id="birthDay" class="field" placeholder="روز"></div><div class="form-grid" style="grid-template-columns:repeat(3,1fr);margin-top:8px"><select id="fatherId" class="field"><option value="">پدر</option>${personOptions('male')}</select><select id="motherId" class="field"><option value="">مادر</option>${personOptions('female')}</select><select id="spouseId" class="field"><option value="">همسر</option>${personOptions('')}</select></div><input id="editingPersonId" type="hidden"><div class="toolbar"><button id="savePersonBtn" class="btn green">ذخیره فرد</button><button id="clearPersonBtn" class="btn gray">پاک‌کردن فرم</button></div><div id="peopleMsg" class="msg"></div></div><div class="card"><div class="toolbar">< romise.all(notificationsCache.map(n=>updateDoc(doc(db,'notifications',n.id),{read:true}).catch(()=>{})));await loadNotifications();render()})}
function filterUsers(){const q=val('userSearch').toLowerCase(),r=val('roleFilter'),a=val('approveFilter');let list=usersCache.filter(u=>(!q||String(u.email||'').toLowerCase().includes(q))&&(!r||u.role===r)&&(!a||(a==='approved'?u.approved:!u.approved)));$('usersTable').innerHTML=usersTable(list);bindRouteEvents()}function filterPeople(){const q=val('peopleSearch').toLowerCase();$('peopleList').innerHTML=peopleList(peopleCache.filter(p=>String(p.fullName||'').toLowerCase().includes(q)));bindRouteEvents()}
async function savePerson(){const id=val('editingPersonId'),data={fullName:val('personName'),gender:val('personGender'),lifeStatus:val('personLife'),birthYear:val('birthYear'),birthMonth:val('birthMonth'),birthDay:val('birthDay'),fatherId:val('fatherId'),motherId:val('motherId'),spouseId:val('spouseId'),updatedAt:serverTimestamp()};if(!data.fullName){$('peopleMsg').textContent='نام را وارد کن';return}if(id)await updateDoc(doc(db,'people',id),data);else await addDoc(collection(db,'people'),{...data,createdAt:serverTimestamp()});clearPersonForm();await loadPeople();render()}function clearPersonForm(){['editingPersonId','personName','birthYear','birthMonth','birthDay','fatherId','motherId','spouseId'].forEach(id=>$(id)&&($(id).value=''));$('personGender')&&($('personGender').value='male');$('personLife')&&($('personLife').value='alive')}function fillPerson(id){const p=peopleCache.find(x=>x.id===id);if(!p)return;$('editingPersonId').value=p.id;$('personName').value=p.fullName||'';$('personGender').value=p.gender||'male';$('personLife').value=p.lifeStatus||'alive';$('birthYear').value=p.birthYear||'';$('birthMonth').value=p.birthMonth||'';$('birthDay').value=p.birthDay||'';$('fatherId').value=p.fatherId||'';$('motherId').value=p.motherId||'';$('spouseId').value=p.spouseId||'';window.scrollTo({top:0,behavior:'smooth'})}
function openNotif(id){const n=notificationsCache.find(x=>x.id===id);if(!n)return;$('modalTitle').textContent=n.title||'اعلان';$('modalBody').innerHTML=`<p>${esc(n.message||'')}</p><p><span class="pill blue">${esc(n.type||'-')}</span><span class="pill">${stamp(n.createdAt)||'-'}</span></p>`;$('modalBack').classList.add('open')}$('modalClose').onclick=()=>$('modalBack').classList.remove('open');$('modalBack').onclick=e=>{if(e.target===$('modalBack'))$('modalBack').classList.remove('open')};function openDrawer(){$('dashboardDrawer').classList.add('open');$('drawerBack').classList.add('open')}function closeDrawer(){$('dashboardDrawer').classList.remove('open');$('drawerBack').classList.remove('open')}$('openDrawerBtn').onclick=openDrawer;$('closeDrawerBtn').onclick=closeDrawer;$('drawerBack').onclick=closeDrawer;$('mainNav').onclick=e=>{const b=e.target.closest('button[data-route]');if(b)setRoute(b.dataset.route)};$('homeBtn').onclick=()=>setRoute('dashboard');$('notifTopBtn').onclick=()=>setRoute('notifications');$('logoutBtn').onclick=()=>signOut(auth);
$('showRegisterBtn').onclick=()=>$('registerBox').classList.toggle('hidden');$('resetBtn').onclick=async()=>{const email=val('loginEmail');if(!email)return msg('ایمیل را وارد کن');await sendPasswordResetEmail(auth,email).then(()=>msg('ایمیل بازیابی ارسال شد',true)).catch(e=>msg(e.message))};$('loginBtn').onclick=async()=>{msg('');await signInWithEmailAndPassword(auth,val('loginEmail'),val('loginPass')).catch(e=>msg('خطا: '+e.message))};$('registerBtn').onclick=async()=>{msg('');await createUserWithEmailAndPassword(auth,val('regEmail'),val('regPass')).then(async cred=>{await ensureUserDoc(cred.user);msg('ثبت‌نام انجام شد. منتظر تایید مدیر باشید.',true)}).catch(e=>msg('خطا: '+e.message))};
onAuthStateChanged(auth,async user=>{currentUser=user;if(!user){showLogin(true);return}try{currentProfile=await ensureUserDoc(user);if(currentProfile.disabled){msg('حساب غیرفعال است');await signOut(auth);return}if(!currentProfile.approved){showLogin(true);msg('حساب شما در انتظار تایید مدیر است.');return}showLogin(false);await loadAll();setRoute(currentRoute||'dashboard')}catch(e){showLogin(true);msg('خطای Firebase: '+e.message)}});
if('serviceWorker'in navigator){navigator.serviceWorker.register('./service-worker.js?v=218-final-home-ui').catch(()=>{})}
