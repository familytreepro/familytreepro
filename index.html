<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";import{getAuth,setPersistence,browserLocalPersistence,onAuthStateChanged,signInWithEmailAndPassword,createUserWithEmailAndPassword,sendPasswordResetEmail,signOut}from"https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";import{getFirestore,doc,getDoc,setDoc,updateDoc,deleteDoc,collection,getDocs,addDoc,serverTimestamp,query,orderBy}from"https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
const VERSION='V234 Classic Tree Single Engine',ADMIN_EMAIL='alibahripor33@gmail.com';const firebaseConfig={apiKey:"AIzaSyDNpNOpFSmJvkyBwpoJnkMEcZBj7tknKB8",authDomain:"family-tree-pro-a661d.firebaseapp.com",projectId:"family-tree-pro-a661d",storageBucket:"family-tree-pro-a661d.firebasestorage.app",messagingSenderId:"634237399841",appId:"1:634237399841:web:7ad2813dbbc3697ab6c460"};const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);await setPersistence(auth,browserLocalPersistence);
let currentUser=null,currentProfile=null,currentRoute='dashboard',selectedPersonId='',usersCache=[],peopleCache=[],notificationsCache=[];const $=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m])),val=id=>String($(id)?.value||'').trim(),isAdmin=()=>currentProfile?.role==='admin',stamp=v=>v?.toDate?v.toDate().toLocaleString('fa-IR'):'';
function msg(t,ok=false){$('loginMsg').textContent=t||'';$('loginMsg').className=ok?'msg ok':'msg'}function showLogin(show){$('login').classList.toggle('hidden',!show);$('app').classList.toggle('hidden',show)}
async function ensureUserDoc(user){const ref=doc(db,'users',user.uid),snap=await getDoc(ref),email=(user.email||'').toLowerCase(),admin=email===ADMIN_EMAIL.toLowerCase();if(!snap.exists())await setDoc(ref,{uid:user.uid,email:user.email||'',displayName:user.displayName||'',role:admin?'admin':'viewer',approved:admin,disabled:false,createdAt:serverTimestamp(),lastLogin:serverTimestamp(),source:'v225-login-autosync'});else await updateDoc(ref,{lastLogin:serverTimestamp(),email:user.email||snap.data().email||''}).catch(()=>{});const fresh=await getDoc(ref);return{id:fresh.id,...fresh.data()}}
async function loadUsers(){const s=await getDocs(collection(db,'users'));usersCache=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>String(a.email||'').localeCompare(String(b.email||'')))}async function loadPeople(){const s=await getDocs(collection(db,'people'));peopleCache=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>String(a.fullName||'').localeCompare(String(b.fullName||''),'fa'))}async function loadNotifications(){const qy=query(collection(db,'notifications'),orderBy('createdAt','desc'));const s=await getDocs(qy).catch(()=>({docs:[]}));notificationsCache=s.docs.map(d=>({id:d.id,...d.data()})).filter(n=>isAdmin()||!n.userId||n.userId===currentUser?.uid).slice(0,80)}async function loadAll(){await Promise.all([loadUsers(),loadPeople(),loadNotifications()])}
function updateHeaderActions(){const isHome=currentRoute==='dashboard';$('homeBtn').classList.toggle('hidden',isHome);$('notifTopBtn').classList.toggle('hidden',!isHome);$('logoutBtn').classList.toggle('hidden',!isHome)}function setRoute(route){currentRoute=route;document.querySelectorAll('#mainNav button').forEach(b=>b.classList.toggle('active',b.dataset.route===route));updateHeaderActions();closeDrawer();render()}window.setRoute=setRoute;function render(){const main=$('mainView');main.replaceChildren();const box=document.createElement('div');main.appendChild(box);box.innerHTML=currentRoute==='users'?usersView():currentRoute==='people'?peopleView():currentRoute==='profile'?personProfileView():currentRoute==='notifications'?notificationsView():currentRoute==='tree'?treeView():currentRoute==='relations'?relationView():currentRoute==='import'?backupImportView():dashboardView();bindRouteEvents()}
function personById(id){id=String(id||'');return peopleCache.find(p=>String(p.id)===id)||null}function personName(id){const p=personById(id);return p?.fullName||'ثبت نشده'}function childrenOf(id){id=String(id||'');return peopleCache.filter(p=>String(p.fatherId||'')===id||String(p.motherId||'')===id)}function getSpouseIds(p){const ids=new Set();if(p?.spouseId)ids.add(String(p.spouseId));(Array.isArray(p?.spouseIds)?p.spouseIds:[]).forEach(x=>x&&ids.add(String(x)));return [...ids]}function spousesOf(id){id=String(id||'');const ids=new Set();peopleCache.forEach(p=>{if(String(p.id)===id)getSpouseIds(p).forEach(x=>ids.add(String(x)));if(getSpouseIds(p).includes(id))ids.add(String(p.id));});return [...ids].map(personById).filter(Boolean)}function goProfile(id){if(!id||!personById(id))return;selectedPersonId=String(id);setRoute('profile')}window.goProfile=goProfile;
function generationOf(id,seen=new Set()){if(!id||seen.has(id)||!personById(id))return 0;seen.add(id);const p=personById(id);return Math.max(generationOf(p.fatherId,new Set(seen)),generationOf(p.motherId,new Set(seen)))+1}function countGenerations(){if(!peopleCache.length)return 0;return Math.max(1,...peopleCache.map(p=>generationOf(p.id)))}
function dependencyInfo(id){const ch=childrenOf(id),sp=spousesOf(id);return{children:ch,spouses:sp,count:ch.length+sp.length}}function parentsOf(id){const p=personById(id);return{father:personById(p?.fatherId),mother:personById(p?.motherId)}}function normalizeName(s){return String(s||'').trim().replace(/\s+/g,' ').toLowerCase()}function duplicatePerson(name,fatherId,exceptId=''){const n=normalizeName(name);return peopleCache.find(p=>p.id!==exceptId&&normalizeName(p.fullName)===n&&String(p.fatherId||'')===String(fatherId||''))}
function dashboardView(){const male=peopleCache.filter(p=>p.gender==='male').length,female=peopleCache.filter(p=>p.gender==='female').length,dead=peopleCache.filter(p=>p.lifeStatus==='dead').length,g=countGenerations();return`<div class="hero"><h2>سلام، خوش آمدید</h2><p><b>V234</b></p></div><div class="grid stats"><div class="card stat"><div><small>کل افراد ثبت‌شده</small><div class="num">${peopleCache.length}</div></div><div class="icon">🌳</div></div><div class="card stat"><div><small>مردان</small><div class="num">${male}</div></div><div class="icon">👨</div></div><div class="card stat"><div><small>زنان</small><div class="num">${female}</div></div><div class="icon">👩</div></div><div class="card stat"><div><small>فوت‌شده‌ها</small><div class="num">${dead}</div></div><div class="icon">🪦</div></div><div class="card stat"><div><small>نسل‌ها</small><div class="num">${g}</div></div><div class="icon">🧬</div></div></div>`}
function usersView(){if(!isAdmin())return`<div class="card empty">فقط مدیر به احراز کاربران دسترسی دارد.</div>`;const admins=usersCache.filter(u=>u.role==='admin').length,editors=usersCache.filter(u=>u.role==='editor').length,pending=usersCache.filter(u=>!u.approved).length;return`<div class="hero"><h2>احراز و کاربران</h2><p>مدیریت کاربران و نقش‌ها</p></div><div class="grid stats"><div class="card stat"><div><small>کل</small><div class="num">${usersCache.length}</div></div><div class="icon">👥</div></div><div class="card stat"><div><small>مدیر</small><div class="num">${admins}</div></div><div class="icon">🛡️</div></div><div class="card stat"><div><small>ویرایشگر</small><div class="num">${editors}</div></div><div class="icon">✏️</div></div><div class="card stat"><div><small>در انتظار</small><div class="num">${pending}</div></div><div class="icon">⏳</div></div></div><div class="card"><div class="toolbar"><input id="userSearch" class="field" placeholder="جستجوی ایمیل"><select id="roleFilter" class="field"><option value="">همه نقش‌ها</option><option value="admin">admin</option><option value="editor">editor</option><option value="viewer">viewer</option></select><select id="approveFilter" class="field"><option value="">همه وضعیت‌ها</option><option value="approved">تایید شده</option><option value="pending">در انتظار</option></select><button id="reloadUsersBtn" class="btn">بروزرسانی</button></div><div id="usersTable">${usersTable(usersCache)}</div></div>`}
function usersTable(list){return`<div class="table-wrap"><table class="table"><thead><tr><th>ایمیل</th><th>نقش</th><th>وضعیت</th><th>آخرین ورود</th><th>عملیات</th></tr></thead><tbody>${list.map(u=>`<tr><td>${esc(u.email||'-')}</td><td><select class="field roleChange" data-uid="${esc(u.id)}"><option value="viewer" ${u.role==='viewer'?'selected':''}>viewer</option><option value="editor" ${u.role==='editor'?'selected':''}>editor</option><option value="admin" ${u.role==='admin'?'selected':''}>admin</option></select></td><td>${u.approved?'<span class="pill ok">تایید شده</span>':'<span class="pill bad">در انتظار</span>'}${u.disabled?'<span class="pill bad">غیرفعال</span>':''}</td><td>${stamp(u.lastLogin)||'-'}</td><td><div class="actions"><button class="btn small green approveUser" data-uid="${esc(u.id)}">تایید</button><button class="btn small warn disableUser" data-uid="${esc(u.id)}">تغییر فعال</button><button class="btn small gray resetUser" data-email="${esc(u.email||'')}">رمز</button><button class="btn small red deleteUser" data-uid="${esc(u.id)}">حذف users</button></div></td></tr>`).join('')||`<tr><td colspan="5" class="empty">کاربری نیست</td></tr>`}</tbody></table></div>`}
function peopleView(){const male=peopleCache.filter(p=>p.gender==='male').length,female=peopleCache.filter(p=>p.gender==='female').length,dead=peopleCache.filter(p=>p.lifeStatus==='dead').length,noFather=peopleCache.filter(p=>!p.fatherId).length,noMother=peopleCache.filter(p=>!p.motherId).length,hasChild=peopleCache.filter(p=>childrenOf(p.id).length>0).length,hasSpouse=peopleCache.filter(p=>spousesOf(p.id).length>0||p.spouseId).length;return`<div class="hero"><h2>افراد</h2><p>مدیریت فرزندان، پدر، مادر و همسر — <b>V234</b></p></div><div class="grid stats six"><div class="card stat"><div><small>کل افراد</small><div class="num">${peopleCache.length}</div></div><div class="icon">🌳</div></div><div class="card stat"><div><small>مردان</small><div class="num">${male}</div></div><div class="icon">👨</div></div><div class="card stat"><div><small>زنان</small><div class="num">${female}</div></div><div class="icon">👩</div></div><div class="card stat"><div><small>فوت‌شده</small><div class="num">${dead}</div></div><div class="icon">🪦</div></div><div class="card stat"><div><small>دارای فرزند</small><div class="num">${hasChild}</div></div><div class="icon">👶</div></div><div class="card stat"><div><small>دارای همسر</small><div class="num">${hasSpouse}</div></div><div class="icon">💍</div></div></div><div class="card"><b id="personFormTitle">افزودن / ویرایش فرد</b><div class="form-grid" style="margin-top:10px"><input id="personName" class="field name" placeholder="نام کامل"><select id="personGender" class="field"><option value="male">مرد</option><option value="female">زن</option></select><select id="personLife" class="field"><option value="alive">زنده</option><option value="dead">فوت شده</option></select><input id="birthYear" class="field" placeholder="سال"><input id="birthMonth" class="field" placeholder="ماه"><input id="birthDay" class="field" placeholder="روز"></div><div class="form-grid" style="grid-template-columns:repeat(3,1fr);margin-top:8px"><select id="fatherId" class="field"><option value="">پدر</option>${personOptions('male')}</select><select id="motherId" class="field"><option value="">مادر</option>${personOptions('female')}</select><select id="spouseId" class="field"><option value="">همسر</option>${personOptions('')}</select></div><input id="editingPersonId" type="hidden"><div class="toolbar"><button id="savePersonBtn" class="btn green">ذخیره فرد</button><button id="clearPersonBtn" class="btn gray">پاک‌کردن فرم</button></div><div id="peopleMsg" class="msg"></div></div><div class="card"><b>افزودن چند فرزند ردیفی</b><div class="hint">هر ردیف یک فرزند است؛ برای هر فرزند می‌توانی پدر و مادر جدا انتخاب کنی.</div><div class="children-table-wrap"><table class="children-table"><thead><tr><th>ردیف</th><th>نام فرزند</th><th>جنسیت</th><th>پدر</th><th>مادر</th><th>حذف</th></tr></thead><tbody id="childRows"></tbody></table></div><div class="toolbar"><button id="addChildRowBtn" class="btn">+ افزودن ردیف</button><button id="saveChildRowsBtn" class="btn green">ثبت همه فرزندان</button><button id="clearChildRowsBtn" class="btn gray">پاک کردن</button></div><div id="batchMsg" class="msg"></div></div><div class="card"><div class="toolbar"><input id="peopleSearch" class="field" placeholder="جستجو: نام، پدر، مادر، همسر"><button id="reloadPeopleBtn" class="btn">بروزرسانی</button></div><div id="peopleList">${peopleList(peopleCache)}</div></div>`}
function personOptions(g){return peopleCache.filter(p=>!g||p.gender===g).map(p=>`<option value="${esc(p.id)}">${esc(p.fullName||'بدون نام')}</option>`).join('')}
function peopleList(list,open=false){const openAttr=open?' open':'';return`<details class="family-accordion"${openAttr}><summary><span>👥 افراد خانواده</span><span class="family-count">${list.length} نفر</span><span class="family-arrow">⌄</span></summary><div class="family-body"><div class="list">${list.map(p=>{const children=childrenOf(p.id),sp=spousesOf(p.id),gen=generationOf(p.id)||'-';const title=esc(p.fullName||'بدون نام');const fatherTxt=p.fatherId?`<button class="link-person openProfile" data-id="${esc(p.fatherId)}">${esc(personName(p.fatherId))}</button>`:'ثبت نشده';const motherTxt=p.motherId?`<button class="link-person openProfile" data-id="${esc(p.motherId)}">${esc(personName(p.motherId))}</button>`:'ثبت نشده';const spouseTxt=sp.length?sp.map(x=>`<button class="link-person openProfile" data-id="${esc(x.id)}">${esc(x.fullName)}</button>`).join(' '):(p.spouseId?`<button class="link-person openProfile" data-id="${esc(p.spouseId)}">${esc(personName(p.spouseId))}</button>`:'ثبت نشده');return`<div class="person-accordion" data-id="${esc(p.id)}"><button class="person-summary togglePerson" data-id="${esc(p.id)}" type="button"><span class="person-summary-main"><span class="person-title">👤 ${title}</span><span class="compact-badges"><span class="mini-pill">${p.gender==='female'?'زن':'مرد'}</span><span class="mini-pill">فرزند: ${children.length}</span><span class="mini-pill">نسل ${gen}</span></span></span><span class="person-arrow">⌄</span></button><div class="person-details"><div class="person-card-main"><small>پدر: ${fatherTxt} | مادر: ${motherTxt} | همسر: ${spouseTxt}</small><div class="person-meta"><span class="pill ${p.gender==='female'?'pink':'blue'}">${p.gender==='female'?'زن':'مرد'}</span><span class="pill ${p.lifeStatus==='dead'?'bad':'ok'}">${p.lifeStatus==='dead'?'فوت‌شده':'زنده'}</span><span class="pill purple">نسل ${gen}</span><span class="pill">تولد: ${esc([p.birthYear,p.birthMonth,p.birthDay].filter(Boolean).join('/')||'-')}</span></div><div class="children-line"><span class="pill blue">فرزندان: ${children.length} نفر</span><button class="btn small purple showChildren" data-id="${esc(p.id)}">نمایش فرزندان</button><button class="btn small green addChildForParent" data-id="${esc(p.id)}">افزودن فرزند</button></div></div><div class="actions"><button class="btn small blue openProfile" data-id="${esc(p.id)}">پروفایل</button><button class="btn small editPerson" data-id="${esc(p.id)}">ویرایش سریع</button><button class="btn small red deletePerson" data-id="${esc(p.id)}">حذف</button></div></div></div>`}).join('')||'<div class="empty">هنوز فردی ثبت نشده است.</div>'}</div></div></details>`}

function parseLegacyDateParts(v){const s=String(v||'').trim();if(!s)return{year:'',month:'',day:''};const parts=s.split(/[\/\-\.]/).map(x=>x.trim()).filter(Boolean);return{year:parts[0]||s,month:parts[1]||'',day:parts[2]||''}}
function normalizeLegacyPerson(raw){const id=String(raw.id||raw.uid||Date.now()+Math.random());const birth=parseLegacyDateParts(raw.birth||raw.birthDate||raw.birthYear);const death=parseLegacyDateParts(raw.deathDate||raw.death||'');const spouseIds=[...(Array.isArray(raw.spouses)?raw.spouses:[]),...(Array.isArray(raw.spouseIds)?raw.spouseIds:[])].filter(Boolean).map(String);const fatherId=String(raw.fatherId||raw.parentId||'');const motherId=String(raw.motherId||'');return{legacyId:id,fullName:raw.fullName||raw.name||'بدون نام',gender:raw.gender==='female'?'female':'male',lifeStatus:(raw.lifeStatus==='dead'||raw.isDead===true)?'dead':'alive',birthYear:raw.birthYear||birth.year||'',birthMonth:raw.birthMonth||birth.month||'',birthDay:raw.birthDay||birth.day||'',deathYear:raw.deathYear||death.year||'',deathMonth:raw.deathMonth||death.month||'',deathDay:raw.deathDay||death.day||'',fatherId:fatherId,motherId:motherId,spouseId:spouseIds[0]||'',spouseIds:spouseIds,job:raw.job||'',phone:raw.phone||'',notes:raw.notes||raw.memory||'',burialPlace:raw.burialPlace||raw.gravePlace||'',deathNote:raw.deathNote||'',photo:raw.photo||'',gallery:Array.isArray(raw.gallery)?raw.gallery:[],docs:Array.isArray(raw.docs)?raw.docs:[],voices:Array.isArray(raw.voices)?raw.voices:[],events:Array.isArray(raw.events)?raw.events:[],manualSpouses:Array.isArray(raw.manualSpouses)?raw.manualSpouses:[],updatedAt:serverTimestamp(),source:'v225-backup-import'}}
function calcRawStats(list){const byId=new Map(list.map(r=>[String(r.id),r]));function gen(id,seen=new Set()){id=String(id||'');if(!id||seen.has(id)||!byId.has(id))return 0;seen.add(id);const r=byId.get(id);return gen(r.parentId||r.fatherId,new Set(seen))+1}return{total:list.length,male:list.filter(p=>p.gender!=='female').length,female:list.filter(p=>p.gender==='female').length,dead:list.filter(p=>p.isDead===true||p.lifeStatus==='dead').length,generations:list.length?Math.max(1,...list.map(p=>gen(p.id))):0}}
function backupImportView(){return`<div class="hero"><h2>ورود بکاپ</h2><p><b>V234</b> | وارد کردن بکاپ قدیمی 303 نفره به Firebase</p></div><div class="card"><b>انتخاب فایل JSON بکاپ</b><input id="backupFile" class="field" type="file" accept=".json,application/json"><div id="backupPreview" class="empty">فایل بکاپ را انتخاب کن تا پیش‌نمایش نمایش داده شود.</div><div class="toolbar"><button id="importBackupBtn" class="btn green" disabled>وارد کردن به Firebase</button><button id="reloadAfterImportBtn" class="btn gray">بروزرسانی افراد</button></div><div id="importMsg" class="msg"></div></div>`}
async function handleBackupFile(e){const file=e.target.files?.[0];if(!file)return;try{const text=await file.text();const data=JSON.parse(text);const list=Array.isArray(data.people)?data.people:[];backupData=list;backupStats=calcRawStats(list);$('backupPreview').innerHTML=`<div class="grid stats"><div class="card stat"><div><small>کل افراد</small><div class="num">${backupStats.total}</div></div><div class="icon">🌳</div></div><div class="card stat"><div><small>مردان</small><div class="num">${backupStats.male}</div></div><div class="icon">👨</div></div><div class="card stat"><div><small>زنان</small><div class="num">${backupStats.female}</div></div><div class="icon">👩</div></div><div class="card stat"><div><small>فوت‌شده</small><div class="num">${backupStats.dead}</div></div><div class="icon">🪦</div></div><div class="card stat"><div><small>نسل‌ها</small><div class="num">${backupStats.generations}</div></div><div class="icon">🧬</div></div></div><p class="hint">نام فایل: ${esc(file.name)}</p>`;$('importBackupBtn').disabled=!list.length;$('importMsg').textContent=list.length?'آماده ورود به Firebase است.':''}catch(err){backupData=null;$('backupPreview').innerHTML='<div class="empty">فایل JSON معتبر نیست.</div>';$('importBackupBtn').disabled=true;$('importMsg').textContent=err.message}}
async function importBackupToFirebase(){if(!backupData?.length){$('importMsg').textContent='اول فایل بکاپ را انتخاب کن.';return}if(!confirm(`${backupData.length} نفر به کالکشن people وارد/به‌روزرسانی شود؟`))return;$('importBackupBtn').disabled=true;let ok=0,fail=0;$('importMsg').textContent='در حال وارد کردن...';for(const raw of backupData){try{const id=String(raw.id||Date.now()+Math.random());await setDoc(doc(db,'people',id),normalizeLegacyPerson(raw),{merge:true});ok++;if(ok%25===0)$('importMsg').textContent=`در حال وارد کردن: ${ok}/${backupData.length}`}catch(e){fail++}}await loadPeople();$('importMsg').className='msg ok';$('importMsg').textContent=`ورود تمام شد: ${ok} نفر موفق${fail?' | خطا: '+fail:''}`;setTimeout(()=>setRoute('dashboard'),800)}

function ancestorLevels(rootId){const root=personById(rootId)||peopleCache[0];const levels=[];let seen=new Set();function walk(p,level){if(!p||seen.has(String(p.id)))return;seen.add(String(p.id));if(!levels[level])levels[level]=[];levels[level].push(p);walk(personById(p.fatherId),level+1);walk(personById(p.motherId),level+1)}walk(root,0);return levels;}
function renderAncestorsTree(rootId){
  const root=personById(rootId)||peopleCache[0];
  if(!root){$('treeCanvas').innerHTML='<div class="empty">فردی برای نمایش وجود ندارد.</div>';return}
  lastTreeMode='ancestors';lastTreeRoot=root.id;treeSetActive('treeAncestorsBtn');
  const levels=ancestorLevels(root.id);
  const rows=[];
  for(let li=levels.length-1;li>=0;li--){
    const arr=levels[li]||[];
    rows.push({title:li===0?'فرد انتخابی':'اجداد دورتر',people:arr.map(p=>({person:p,sub:li===0?'فرد انتخابی':'جد / جده',root:li===0}))})
  }
  drawTreeBoard('اجداد کامل: '+(root.fullName||'بدون نام'),rows,levels.some(a=>(a||[]).length>8));
}
function descendantList(rootId){const root=personById(rootId)||peopleCache[0],levels=[];let seen=new Set();function walk(p,level){if(!p||seen.has(String(p.id)))return;seen.add(String(p.id));if(!levels[level])levels[level]=[];levels[level].push(p);childrenOf(p.id).forEach(c=>walk(c,level+1))}walk(root,0);return levels;}
function renderDescendantsTree(rootId){
  const root=personById(rootId)||peopleCache[0];
  if(!root){$('treeCanvas').innerHTML='<div class="empty">فردی برای نمایش وجود ندارد.</div>';return}

  const levels=descendantList(root.id);
  const rows=levels.map((arr,li)=>({title:li===0?'فرد انتخابی':'فرزندان و نوادگان',people:(arr||[]).map(p=>({person:p,sub:li===0?'فرد انتخابی':'فرزند / نواده',root:li===0}))}));
  drawTreeBoard('نوادگان: '+(root.fullName||'بدون نام'),rows,levels.some(a=>(a||[]).length>8));

function renderAllFamilyCards(){
  lastTreeMode='all'; treeSetActive('treeFullBtn');
  if(!peopleCache.length){$('treeCanvas').innerHTML='<div class="empty">داده‌ای وجود ندارد.</div>';return}
  const roots=peopleCache.filter(p=>!p.fatherId&&!p.motherId);
  const ordered=[]; const seen=new Set();
  function addBranch(p,depth=0){
    if(!p||seen.has(String(p.id)))return;
    seen.add(String(p.id)); ordered.push({person:p,sub:depth===0?'ریشه خانواده':'شاخه خانواده',root:depth===0});
    childrenOf(p.id).forEach(c=>addBranch(c,depth+1));
  }
  (roots.length?roots:peopleCache.slice(0,1)).forEach(r=>addBranch(r,0));
  peopleCache.forEach(p=>{if(!seen.has(String(p.id)))ordered.push({person:p,sub:'بدون اتصال کامل'});});
  const chunks=[]; for(let i=0;i<ordered.length;i+=60)chunks.push(ordered.slice(i,i+60));
  const rows=chunks.map((chunk,i)=>({title:i===0?'همه افراد خانواده':'ادامه افراد خانواده',people:chunk}));
  drawTreeBoard('نمایش همه افراد خانواده',rows,peopleCache.length>300);
}

function ancestorChain(rootId){
  const root=personById(rootId); const arr=[]; let p=root; const seen=new Set();
  while(p&&!seen.has(String(p.id))){arr.push(p);seen.add(String(p.id));p=personById(p.fatherId)||personById(p.motherId)}
  return arr.reverse();
}
function classicChildrenHtml(p,depth,maxDepth,seen){
  if(!p||depth>maxDepth||seen.has(String(p.id)))return '';
  seen.add(String(p.id));
  const kids=childrenOf(p.id);
  const childHtml=kids.map(c=>classicChildrenHtml(c,depth+1,maxDepth,new Set(seen))).join('');
  const node=classicNodeHtml(p,depth===0?'فرد انتخابی':'فرزند / نواده',depth===0);
  return `<li>${node}${kids.length&&depth<maxDepth?`<ul>${childHtml}</ul>`:''}</li>`;
}

function relName(id){return esc(personName(id))}
function relPersonWord(p){return p?.gender==='female'?'مادر':'پدر'}
function relChildWord(p){return p?.gender==='female'?'دختر':'پسر'}
function relSiblingWord(p){return p?.gender==='female'?'خواهر':'برادر'}
function relGrandWord(level,p,isAncestor){
  if(isAncestor){
    if(level===2)return p?.gender==='female'?'مادربزرگ':'پدربزرگ';
    if(level===3)return p?.gender==='female'?'جده':'جد';
    return `جد نسل ${level-1}`;
  }
  if(level===2)return 'نوه';
  if(level===3)return 'نتیجه';
  return `نواده نسل ${level-1}`;
}
function relParentEdges(id){
  const p=personById(id); if(!p)return [];
  const out=[];
  if(p.fatherId&&personById(p.fatherId))out.push({id:String(p.fatherId),side:'father',label:'پدر'});
  if(p.motherId&&personById(p.motherId))out.push({id:String(p.motherId),side:'mother',label:'مادر'});
  return out;
}
function relAncestors(id){
  const out=[], q=relParentEdges(id).map(e=>({...e,level:1,path:[e]})), seen=new Set();
  while(q.length){
    const cur=q.shift();
    if(seen.has(cur.id))continue;
    seen.add(cur.id);
    const person=personById(cur.id);
    if(person)out.push({id:cur.id,person,level:cur.level,path:cur.path,side:cur.side});
    relParentEdges(cur.id).forEach(e=>q.push({...e,level:cur.level+1,path:cur.path.concat([e])}));
  }

}
function relIsParent(parentId,childId){const c=personById(childId);return c&&(String(c.fatherId||'')===String(parentId)||String(c.motherId||'')===String(parentId))}
function relSharedParents(a,b){

}
function relParentSideOfChild(parentId,childId){const c=personById(childId);if(!c)return '';if(String(c.fatherId||'')===String(parentId))return 'father';if(String(c.motherId||'')===String(parentId))return 'mother';return ''}
function relUncleAuntWord(person,side){

  return person.gender==='female'?'عمه':'عمو';
}
function relNephewNieceWord(person,throughSibling){

  return throughSibling?.gender==='female'?child+'خواهر':child+'برادر';
}
function relCousinWord(person,aParent,bParent){

  const side=relParentSideOfChild(bParent.id, personById(bParent.id)?.id); // unused safe
  const bParentSide=relParentSideOfChild(bParent.id, personById(bParent.id)?.id);

function relCard(title,detail,path,confidence='بالا'){

function relPathNames(path){

function relBuildGraph(){
  const graph={};
  peopleCache.forEach(p=>{graph[String(p.id)]=[]});
  peopleCache.forEach(p=>{
    const id=String(p.id);
    if(p.fatherId&&personById(p.fatherId)){
      graph[id].push({to:String(p.fatherId),label:'پدر'});
      graph[String(p.fatherId)].push({to:id,label:p.gender==='female'?'دختر':'پسر'});
    }
    if(p.motherId&&personById(p.motherId)){
      graph[id].push({to:String(p.motherId),label:'مادر'});
      graph[String(p.motherId)].push({to:id,label:p.gender==='female'?'دختر':'پسر'});
    }
    spousesOf(id).forEach(s=>{
      graph[id].push({to:String(s.id),label:'همسر'});
    });
  });
  return graph;
}
function relShortestPath(a,b,maxDepth=9){
  const graph=relBuildGraph(), start=String(a), target=String(b);
  const q=[{id:start,path:[]}], seen=new Set([start]);
  while(q.length){
    const cur=q.shift();
    if(cur.id===target)return cur.path;
    if(cur.path.length>=maxDepth)continue;
    (graph[cur.id]||[]).forEach(e=>{
      if(seen.has(e.to))return;
      seen.add(e.to);
      q.push({id:e.to,path:cur.path.concat([{id:e.to,label:e.label,name:personName(e.to)}])});
    });
  }
  return null;
}
function relationSmart(a,b){
  a=String(a||''); b=String(b||'');
  if(!a||!b)return relCard('انتخاب ناقص','هر دو نفر را انتخاب کن.','', 'نامشخص');
  if(a===b)return relCard('خود فرد','هر دو انتخاب یک نفر هستند.','', 'قطعی');
  const A=personById(a), B=personById(b);
  if(!A||!B)return relCard('نامشخص','یکی از افراد پیدا نشد.','', 'نامشخص');

  if(spousesOf(a).some(x=>String(x.id)===b)) return relCard('همسر',`${A.fullName} همسر ${B.fullName} است.`,`${A.fullName} ← همسر ← ${B.fullName}`,'قطعی');

  if(relIsParent(a,b)) return relCard(relPersonWord(A),`${A.fullName} ${relPersonWord(A)} ${B.fullName} است.`,`${A.fullName} ← ${relChildWord(B)} ← ${B.fullName}`,'قطعی');
  if(relIsParent(b,a)) return relCard(relChildWord(A),`${A.fullName} ${relChildWord(A)} ${B.fullName} است.`,`${A.fullName} ← ${relPersonWord(B)} ← ${B.fullName}`,'قطعی');

  const aAnc=relAncestors(a), bAnc=relAncestors(b);
  const AisAnc=bAnc.find(x=>x.id===a);
  if(AisAnc)return relCard(relGrandWord(AisAnc.level,A,true),`${A.fullName} ${relGrandWord(AisAnc.level,A,true)} ${B.fullName} است.`,`${A.fullName} ← ${AisAnc.level} نسل پایین‌تر ← ${B.fullName}`,'قطعی');
  const BisAnc=aAnc.find(x=>x.id===b);
  if(BisAnc)return relCard(relGrandWord(BisAnc.level,A,false),`${A.fullName} ${relGrandWord(BisAnc.level,A,false)} ${B.fullName} است.`,`${A.fullName} ← ${BisAnc.level} نسل بالاتر ← ${B.fullName}`,'قطعی');

  const shared=relSharedParents(a,b);
  if(shared.length){
    const parent=personById(shared[0]);
    return relCard(relSiblingWord(A),`${A.fullName} ${relSiblingWord(A)} ${B.fullName} است.`,`${A.fullName} ← والد مشترک: ${parent?.fullName||'نامشخص'} ← ${B.fullName}`,'بالا');
  }

  const bParents=relParentEdges(b);
  for(const bp of bParents){
    if(relSharedParents(a,bp.id).length){
      return relCard(relUncleAuntWord(A,bp.side),`${A.fullName} ${relUncleAuntWord(A,bp.side)} ${B.fullName} است.`,`${A.fullName} ← خواهر/برادر ${personName(bp.id)} ← ${bp.label} ${B.fullName}`,'بالا');
    }
  }
  const aParents=relParentEdges(a);
  for(const ap of aParents){
    if(relSharedParents(b,ap.id).length){
      const through=personById(ap.id);
      return relCard(relNephewNieceWord(A,through),`${A.fullName} ${relNephewNieceWord(A,through)} ${B.fullName} است.`,`${A.fullName} ← فرزند ${personName(ap.id)} ← خواهر/برادر ${B.fullName}`,'بالا');
    }
  }

  for(const ap of aParents){
    for(const bp of bParents){
      if(relSharedParents(ap.id,bp.id).length){
        const aPar=personById(ap.id), bPar=personById(bp.id);
        const child=A.gender==='female'?'دختر':'پسر';
        let word='';
        if(bp.side==='father') word=aPar.gender==='female'?child+'عمه':child+'عمو';
        else word=aPar.gender==='female'?child+'خاله':child+'دایی';
        return relCard(word,`${A.fullName} ${word} ${B.fullName} است.`,`${A.fullName} ← فرزند ${aPar.fullName} ← ${bPar.fullName} والد ${B.fullName}`,'بالا');
      }
    }
  }

  const bSpouses=spousesOf(b);
  for(const s of bSpouses){
    if(relIsParent(a,s.id)){
      const word=B.gender==='female'?(A.gender==='female'?'مادرشوهر':'پدرشوهر'):(A.gender==='female'?'مادرزن':'پدرزن');
      return relCard(word,`${A.fullName} ${word} ${B.fullName} است.`,`${A.fullName} ← والد ${s.fullName} ← همسر ${B.fullName}`,'بالا');
    }
  }
  const aSpouses=spousesOf(a);
  for(const s of aSpouses){
    if(relIsParent(b,s.id)){
      const word=A.gender==='female'?'عروس':'داماد';
      return relCard(word,`${A.fullName} ${word} ${B.fullName} است.`,`${A.fullName} ← همسر ${s.fullName} ← فرزند ${B.fullName}`,'بالا');
    }
    if(spousesOf(b).some(bs=>relSharedParents(s.id,bs.id).length)){
      const word=A.gender==='female'?'جاری':'باجناق';
      return relCard(word,`${A.fullName} ${word} ${B.fullName} است.`,`${A.fullName} ← همسر ${s.fullName} ← خواهر/برادر همسر ${B.fullName}`,'متوسط');
    }
  }

  const commons=[];
  aAnc.forEach(x=>{const hit=bAnc.find(y=>y.id===x.id);if(hit)commons.push({person:x.person,aLevel:x.level,bLevel:hit.level})});
  if(commons.length){

    const c=commons[0];
    const title='خویشاوند با جد مشترک';

    const path=`${A.fullName} ← ${c.aLevel} نسل تا ${c.person.fullName} ← ${c.bLevel} نسل تا ${B.fullName}`;

  return relCard('نسبت پیدا نشد','برای تشخیص دقیق‌تر، پدر، مادر و همسران دو نفر را کامل‌تر ثبت کن.','', 'نامشخص');
}

===b.dataset.uid);await updateDoc(doc(db,'users',b.dataset.uid),{disabled:!u?.disabled});await loadUsers();render()});document.querySelectorAll('.deleteUser').forEach(b=>b.onclick=async()=>{if(confirm('فقط سند users حذف شود؟')){await deleteDoc(doc(db,'users',b.dataset.uid));await loadUsers();render()}});document.querySelectorAll('.roleChange').forEach(s=>s.onchange=async()=>{await updateDoc(doc(db,'users',s.dataset.uid),{role:s.value});await loadUsers();render()});document.querySelectorAll('.resetUser').forEach(b=>b.onclick=async()=>{if(b.dataset.email)await sendPasswordResetEmail(auth,b.dataset.email).then(()=>alert('ارسال شد')).catch(e=>alert(e.message))});document.querySelectorAll('.editPerson').forEach(b=>b.onclick=()=>fillPerson(b.dataset.id));document.querySelectorAll('.deletePerson').forEach(b=>b.onclick=()=>safeDeletePerson(b.dataset.id));document.querySelectorAll('.showChildren').forEach(b=>b.onclick=()=>showChildrenModal(b.dataset.id));document.querySelectorAll('.addChildForParent').forEach(b=>b.onclick=()=>prepareChildForParent(b.dataset.id));document.querySelectorAll('.gotoPerson').forEach(b=>b.onclick=()=>{closeModal();goProfile(b.dataset.id)});document.querySelectorAll('.notifOpen').forEach(b=>b.onclick=()=>openNotif(b.dataset.id));$('markAllReadBtn')&&($('markAllReadBtn').onclick=async()=>{await Promise.all(notificationsCache.map(n=>updateDoc(doc(db,'notifications',n.id),{read:true}).catch(()=>{})));await loadNotifications();render()})}
function filterUsers(){const q=val('userSearch').toLowerCase(),r=val('roleFilter'),a=val('approveFilter');let list=usersCache.filter(u=>(!q||String(u.email||'').toLowerCase().includes(q))&&(!r||u.role===r)&&(!a||(a==='approved'?u.approved:!u.approved)));$('usersTable').innerHTML=usersTable(list);bindRouteEvents()}function filterPeople(){const q=val('peopleSearch').toLowerCase();const list=peopleCache.filter(p=>{const hay=[p.fullName,personName(p.fatherId),personName(p.motherId),...spousesOf(p.id).map(s=>s.fullName)].join(' ').toLowerCase();return !q||hay.includes(q)});$('peopleList').innerHTML=peopleList(list,true);bindRouteEvents()}
async function savePerson(){const id=val('editingPersonId'),data={fullName:val('personName'),gender:val('personGender'),lifeStatus:val('personLife'),birthYear:val('birthYear'),birthMonth:val('birthMonth'),birthDay:val('birthDay'),fatherId:val('fatherId'),motherId:val('motherId'),spouseId:val('spouseId'),updatedAt:serverTimestamp()};if(!data.fullName){$('peopleMsg').textContent='نام را وارد کن';return}if(duplicatePerson(data.fullName,data.fatherId,id)){$('peopleMsg').textContent='این فرد با همین نام و پدر قبلاً ثبت شده است.';return}if(id&&(data.fatherId===id||data.motherId===id||data.spouseId===id)){$('peopleMsg').textContent='فرد نمی‌تواند پدر، مادر یا همسر خودش باشد.';return}let savedId=id;if(id)await updateDoc(doc(db,'people',id),data);else{const ref=await addDoc(collection(db,'people'),{...data,createdAt:serverTimestamp()});savedId=ref.id}await syncSpouse(savedId,data.spouseId);clearPersonForm();await loadPeople();render()}
async function syncSpouse(personId,spouseId){personId=String(personId||'');spouseId=String(spouseId||'');if(!personId||!spouseId||personId===spouseId)return;const p=personById(personId),sp=personById(spouseId);const pIds=new Set(getSpouseIds(p));pIds.add(spouseId);await updateDoc(doc(db,'people',personId),{spouseId:[...pIds][0]||'',spouseIds:[...pIds],updatedAt:serverTimestamp()}).catch(()=>{});if(sp){const sIds=new Set(getSpouseIds(sp));sIds.add(personId);await updateDoc(doc(db,'people',spouseId),{spouseId:[...sIds][0]||'',spouseIds:[...sIds],updatedAt:serverTimestamp()}).catch(()=>{})}}let childRowsState=[{name:'',gender:'male',fatherId:'',motherId:''}],backupData=null,backupStats=null;
function readChildRowsUI(){
  const rows=[...document.querySelectorAll('#childRows tr')];
  if(!rows.length)return childRowsState;
  return rows.map(tr=>({
    name:tr.querySelector('.childName')?.value.trim()||'',
    gender:tr.querySelector('.childGender')?.value||'male',
    fatherId:tr.querySelector('.childFather')?.value||'',
    motherId:tr.querySelector('.childMother')?.value||''
  }));
}
function refreshChildRowsUI(){
  const body=$('childRows'); if(!body)return;
  if(!childRowsState.length)childRowsState=[{name:'',gender:'male',fatherId:'',motherId:''}];
  body.innerHTML=childRowsState.map((r,i)=>`<tr><td class="row-number">${i+1}</td><td><input class="field childName" value="${esc(r.name||'')}" placeholder="نام فرزند"></td><td><select class="field childGender"><option value="male" ${r.gender==='male'?'selected':''}>پسر</option><option value="female" ${r.gender==='female'?'selected':''}>دختر</option></select></td><td><select class="field childFather"><option value="">پدر</option>${personOptions('male').replace(`value="${esc(r.fatherId||'')}"`,`value="${esc(r.fatherId||'')}" selected`)}</select></td><td><select class="field childMother"><option value="">مادر</option>${personOptions('female').replace(`value="${esc(r.motherId||'')}"`,`value="${esc(r.motherId||'')}" selected`)}</select></td><td><button class="btn small red removeChildRow" data-i="${i}">حذف</button></td></tr>`).join('');
  document.querySelectorAll('.removeChildRow').forEach(b=>b.onclick=()=>removeChildRow(Number(b.dataset.i)));
}
function addChildRow(pref={}){childRowsState=readChildRowsUI();childRowsState.push({name:'',gender:'male',fatherId:'',motherId:'',...pref});refreshChildRowsUI();}
function removeChildRow(i){childRowsState=readChildRowsUI();childRowsState.splice(i,1);if(!childRowsState.length)childRowsState=[{name:'',gender:'male',fatherId:'',motherId:''}];refreshChildRowsUI();}
function clearChildRows(){childRowsState=[{name:'',gender:'male',fatherId:'',motherId:''}];refreshChildRowsUI();$('batchMsg')&&($('batchMsg').textContent='')}
async function saveChildRows(){
  const rows=readChildRowsUI().filter(r=>r.name);
  if(!rows.length){$('batchMsg').textContent='حداقل یک ردیف نام فرزند وارد کن.';return}
  let added=0,skipped=[];
  for(const r of rows){
    if(!r.fatherId&&!r.motherId){skipped.push(r.name+' (بدون پدر/مادر)');continue}
    if(duplicatePerson(r.name,r.fatherId,'')){skipped.push(r.name+' (تکراری)');continue}
    await addDoc(collection(db,'people'),{fullName:r.name,gender:r.gender||'male',lifeStatus:'alive',birthYear:'',birthMonth:'',birthDay:'',fatherId:r.fatherId||'',motherId:r.motherId||'',spouseId:'',createdAt:serverTimestamp(),updatedAt:serverTimestamp(),source:'v225-children-rows'});added++;
  }
  $('batchMsg').textContent=`${added} فرزند ثبت شد${skipped.length?' | رد شد: '+skipped.join('، '):''}`;
  childRowsState=[{name:'',gender:'male',fatherId:'',motherId:''}];
  await loadPeople();render();
}
function prepareChildForParent(id){const p=personById(id);if(!p)return;setRoute('people');setTimeout(()=>{const pref={name:'',gender:'male',fatherId:'',motherId:''};if(p.gender==='female')pref.motherId=id;else pref.fatherId=id;childRowsState=[pref];refreshChildRowsUI();setTimeout(()=>document.querySelector('.childName')?.focus(),50);window.scrollTo({top:document.body.scrollHeight/2,behavior:'smooth'})},80)}
function clearPersonForm(){['editingPersonId','personName','birthYear','birthMonth','birthDay','fatherId','motherId','spouseId'].forEach(id=>$(id)&&($(id).value=''));$('personGender')&&($('personGender').value='male');$('personLife')&&($('personLife').value='alive');$('peopleMsg')&&($('peopleMsg').textContent='')}function fillPerson(id){const p=peopleCache.find(x=>x.id===id);if(!p)return;$('editingPersonId').value=p.id;$('personName').value=p.fullName||'';$('personGender').value=p.gender||'male';$('personLife').value=p.lifeStatus||'alive';$('birthYear').value=p.birthYear||'';$('birthMonth').value=p.birthMonth||'';$('birthDay').value=p.birthDay||'';$('fatherId').value=p.fatherId||'';$('motherId').value=p.motherId||'';$('spouseId').value=p.spouseId||'';$('personFormTitle').textContent='ویرایش فرد';window.scrollTo({top:0,behavior:'smooth'})}
async function safeDeletePerson(id){const dep=dependencyInfo(id),p=personById(id);if(dep.count>0){openModal('حذف امن',`<p>امکان حذف مستقیم <b>${esc(p?.fullName||'این فرد')}</b> وجود ندارد.</p><p>این فرد ${dep.children.length} فرزند و ${dep.spouses.length} رابطه همسر دارد. اول وابستگی‌ها را اصلاح کن.</p>`);return}if(confirm('حذف فرد؟')){await deleteDoc(doc(db,'people',id));await loadPeople();render()}}
function showChildrenModal(id){const p=personById(id),children=childrenOf(id);openModal('فرزندان '+(p?.fullName||''),children.length?children.map((c,i)=>`<div class="child-row"><b>${i+1}- ${esc(c.fullName||'بدون نام')}</b><button class="btn small blue gotoPerson" data-id="${esc(c.id)}">رفتن به صفحه</button></div>`).join(''):'<div class="empty">فرزندی ثبت نشده است.</div>');bindRouteEvents()}
function openModal(title,body){$('modalTitle').textContent=title;$('modalBody').innerHTML=body;$('modalBack').classList.add('open')}function closeModal(){$('modalBack').classList.remove('open')}function openNotif(id){const n=notificationsCache.find(x=>x.id===id);if(!n)return;openModal(n.title||'اعلان',`<p>${esc(n.message||'')}</p><p><span class="pill blue">${esc(n.type||'-')}</span><span class="pill">${stamp(n.createdAt)||'-'}</span></p>`)}$('modalClose').onclick=closeModal;$('modalBack').onclick=e=>{if(e.target===$('modalBack'))closeModal()};
function openDrawer(){$('dashboardDrawer').classList.add('open');$('drawerBack').classList.add('open')}function closeDrawer(){$('dashboardDrawer').classList.remove('open');$('drawerBack').classList.remove('open')}$('openDrawerBtn').onclick=openDrawer;$('closeDrawerBtn').onclick=closeDrawer;$('drawerBack').onclick=closeDrawer;$('mainNav').onclick=e=>{const b=e.target.closest('button[data-route]');if(b)setRoute(b.dataset.route)};$('homeBtn').onclick=()=>setRoute('dashboard');$('notifTopBtn').onclick=()=>setRoute('notifications');$('logoutBtn').onclick=()=>signOut(auth);
$('showRegisterBtn').onclick=()=>$('registerBox').classList.toggle('hidden');$('resetBtn').onclick=async()=>{const email=val('loginEmail');if(!email)return msg('ایمیل را وارد کن');await sendPasswordResetEmail(auth,email).then(()=>msg('ایمیل بازیابی ارسال شد',true)).catch(e=>msg(e.message))};$('loginBtn').onclick=async()=>{msg('');await signInWithEmailAndPassword(auth,val('loginEmail'),val('loginPass')).catch(e=>msg('خطا: '+e.message))};$('registerBtn').onclick=async()=>{msg('');await createUserWithEmailAndPassword(auth,val('regEmail'),val('regPass')).then(async cred=>{await ensureUserDoc(cred.user);msg('ثبت‌نام انجام شد. منتظر تایید مدیر باشید.',true)}).catch(e=>msg('خطا: '+e.message))};
onAuthStateChanged(auth,async user=>{currentUser=user;if(!user){showLogin(true);return}try{currentProfile=await ensureUserDoc(user);if(currentProfile.disabled){msg('حساب غیرفعال است');await signOut(auth);return}if(!currentProfile.approved){showLogin(true);msg('حساب شما در انتظار تایید مدیر است.');return}showLogin(false);await loadAll();setRoute(currentRoute||'dashboard')}catch(e){showLogin(true);msg('خطای Firebase: '+e.message)}});
if('serviceWorker'in navigator){navigator.serviceWorker.register('./service-worker.js?v=234-classic-tree-single-engine').catch(()=>{})}
</script>
