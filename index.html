<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>شجره نامه پرو</title>

<style>

body{
margin:0;
background:#0f172a;
font-family:tahoma;
color:white;
text-align:center;
}

.header{
padding:80px 20px;
background:linear-gradient(135deg,#14532d,#0f172a);
}

h1{
font-size:50px;
margin-bottom:20px;
}

p{
font-size:22px;
color:#cbd5e1;
}

button{
padding:15px 35px;
font-size:20px;
border:none;
border-radius:12px;
background:#22c55e;
color:white;
cursor:pointer;
margin-top:30px;
}

.box{
max-width:900px;
margin:auto;
padding:40px;
}

.card{
background:#1e293b;
padding:30px;
border-radius:20px;
margin-top:30px;
}

</style>
</head>

<body>

<div class="header">

<h1>🌳 شجره نامه پرو</h1>

<p>
سیستم حرفه‌ای مدیریت شجره خانوادگی
</p>

<button>
ورود به سیستم
</button>

</div>

<div class="box">

<div class="card">
<h2>ثبت اعضای خانواده</h2>
<p>
مدیریت کامل نسل‌ها و افراد خانواده
</p>
</div>

<div class="card">
<h2>نمایش گرافیکی شجره</h2>
<p>
مشاهده درخت خانوادگی به صورت حرفه‌ای
</p>
</div>

</div>

</body>
</html>
