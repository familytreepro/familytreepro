let currentUser=null,currentProfile=null,currentRoute='dashboard',selectedPersonId='',usersCache=[],peopleCache=[],notificationsCache=[],changeLogsCache=[];const $=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m])),val=id=>String($(id)?.value||'').trim(),isAdmin=()=>currentProfile?.role==='admin',stamp=v=>v?.toDate?v.toDate().toLocaleString('fa-IR'):'';

function personById(id){id=String(id||'');return peopleCache.find(p=>String(p.id)===id)||null}function personName(id){const p=personById(id);return p?.fullName||'ثبت نشده'}function childrenOf(id){id=String(id||'');return peopleCache.filter(p=>String(p.fatherId||'')===id||String(p.motherId||'')===id)}function getSpouseIds(p){const ids=new Set();if(p?.spouseId)ids.add(String(p.spouseId));(Array.isArray(p?.spouseIds)?p.spouseIds:[]).forEach(x=>x&&ids.add(String(x)));return [...ids]}function spousesOf(id){id=String(id||'');const ids=new Set();peopleCache.forEach(p=>{if(String(p.id)===id)getSpouseIds(p).forEach(x=>ids.add(String(x)));if(getSpouseIds(p).includes(id))ids.add(String(p.id));});return [...ids].map(personById).filter(Boolean)}function goProfile(id){if(!id||!personById(id))return;selectedPersonId=String(id);setRoute('profile')}window.goProfile=goProfile;
function generationOf(id,seen=new Set()){if(!id||seen.has(id)||!personById(id))return 0;seen.add(id);const p=personById(id);return Math.max(generationOf(p.fatherId,new Set(seen)),generationOf(p.motherId,new Set(seen)))+1}function countGenerations(){if(!peopleCache.length)return 0;return Math.max(1,...peopleCache.map(p=>generationOf(p.id)))}
function dependencyInfo(id){const ch=childrenOf(id),sp=spousesOf(id);return{children:ch,spouses:sp,count:ch.length+sp.length}}function parentsOf(id){const p=personById(id);return{father:personById(p?.fatherId),mother:personById(p?.motherId)}}function normalizeName(s){return String(s||'').trim().replace(/\s+/g,' ').toLowerCase()}function duplicatePerson(name,fatherId,exceptId=''){const n=normalizeName(name);return peopleCache.find(p=>p.id!==exceptId&&normalizeName(p.fullName)===n&&String(p.fatherId||'')===String(fatherId||''))}

function peopleList(list,open=false){const openAttr=open?' open':'';return`<details class="family-accordion"${openAttr}><summary><span>👥 افراد خانواده</span><span class="family-count">${list.length} نفر</span><span class="family-arrow">⌄</span></summary><div class="family-body"><div class="list">${list.map(p=>{const children=childrenOf(p.id),sp=spousesOf(p.id),gen=generationOf(p.id)||'-';const title=esc(p.fullName||'بدون نام');const fatherTxt=p.fatherId?`<button class="link-person openProfile" data-id="${esc(p.fatherId)}">${esc(personName(p.fatherId))}</button>`:'ثبت نشده';const motherTxt=p.motherId?`<button class="link-person openProfile" data-id="${esc(p.motherId)}">${esc(personName(p.motherId))}</button>`:'ثبت نشده';const spouseTxt=sp.length?sp.map(x=>`<button class="link-person openProfile" data-id="${esc(x.id)}">${esc(x.fullName)}</button>`).join(' '):(p.spouseId?`<button class="link-person openProfile" data-id="${esc(p.spouseId)}">${esc(personName(p.spouseId))}</button>`:'ثبت نشده');return`<div class="person-accordion" data-id="${esc(p.id)}"><button class="person-summary togglePerson" data-id="${esc(p.id)}" type="button"><span class="person-summary-main">${personListAvatarHtml(p)}<span class="person-title">👤 ${title}</span><span class="compact-badges"><span class="mini-pill">${p.gender==='female'?'زن':'مرد'}</span><span class="mini-pill">فرزند: ${children.length}</span><span class="mini-pill">نسل ${gen}</span></span></span><span class="person-arrow">⌄</span></button><div class="person-details"><div class="person-card-main"><small>پدر: ${fatherTxt} | مادر: ${motherTxt} | همسر: ${spouseTxt}</small><div class="person-meta"><span class="pill ${p.gender==='female'?'pink':'blue'}">${p.gender==='female'?'زن':'مرد'}</span><span class="pill ${p.lifeStatus==='dead'?'bad':'ok'}">${p.lifeStatus==='dead'?'فوت‌شده':'زنده'}</span><span class="pill purple">نسل ${gen}</span><span class="pill">تولد: ${esc([p.birthYear,p.birthMonth,p.birthDay].filter(Boolean).join('/')||'-')}</s function renderAllFamilyTree(){

  const canvas=$('treeCanvas');

  const all=[...peopleCache];
  if(!all.length){canvas.innerHTML='<div class="empty">فردی برای نمایش وجود ندارد.</div>';return}
  const used=new Set();
  const rootCandidates=all.filter(p=>!personById(p.fatherId)&&!personById(p.motherId))
    .sort((a,b)=>String(a.fullName||'').localeCompare(String(b.fullName||''),'fa'));
  function nodeTree(p,depth,seen){
    if(!p||seen.has(String(p.id)))return '';

    const kids=childrenOf(p.id).filter(c=>!seen.has(String(c.id))).sort((a,b)=>String(a.fullName||'').localeCompare(String(b.fullName||''),'fa'));
    const collapsed=collapsedTreeNodes.has(String(p.id))&&kids.length>0;
    const sub=depth===0?'ریشه خانواده':`نسل پایین ${depth}`;
    const childHtml=kids.map(c=>nodeTree(c,depth+1,new Set(seen))).join('');
    return `<li class="${collapsed?'branch-collapsed':''}">${classicNodeHtml(p,sub,depth===0)}${childHtml&&!collapsed?`<ul>${childHtml}</ul>`:''}</li>`;
  }

function rerenderLastTree(){const root=val('treeRoot')||lastTreeRoot||peopleCache[0]?.id;if(lastTreeMode==='all')renderAllFamilyTree();else renderClassicTree(root)}

function relParentEdges(id){
  const p=personById(id); if(!p)return [];
  const out=[];
  if(p.fatherId&&personById(p.fatherId))out.push({id:String(p.fatherId),side:'father',label:'پدر'});
  if(p.motherId&&personById(p.motherId))out.push({id:String(p.motherId),side:'mother',label:'مادر'});
  return out;
}
function relAncestors(id){
  const out=[], q=relParentEdges(id).map(e=>({...e,level:1,path:[e]})), seen=new Set();
  while(q.length){
    const cur=q.shift();
    if(seen.has(cur.id))continue;
    seen.add(cur.id);
    const person=personById(cur.id);
    if(person)out.push({id:cur.id,person,level:cur.level,path:cur.path,side:cur.side});
    relParentEdges(cur.id).forEach(e=>q.push({...e,level:cur.level+1,path:cur.path.concat([e])}));
  }
  return out;
}
function relIsParent(parentId,childId){const c=personById(childId);return c&&(String(c.fatherId||'')===String(parentId)||String(c.motherId||'')===String(parentId))}
function relSharedParents(a,b){
  const pa=relParentEdges(a).map(x=>x.id), pb=relParentEdges(b).map(x=>x.id);
  return pa.filter(x=>pb.includes(x));
}
function relParentSideOfChild(parentId,childId){const c=personById(childId);if(!c)return '';if(String(c.fatherId||'')===String(parentId))return 'father';if(String(c.motherId||'')===String(parentId))return 'mother';return ''}
function relUncleAuntWord(person,side){
  if(side==='mother')return person.gender==='female'?'خاله':'دایی';
  return person.gender==='female'?'عمه':'عمو';
}
function relNephewNieceWord(person,throughSibling){
  const child=person.gender==='female'?'دختر':'پسر';
  return throughSibling?.gender==='female'?child+'خواهر':child+'برادر';
}
function relCousinWord(person,aParent,bParent){
  const child=person.gender==='female'?'دختر':'پسر';
  const side=relParentSideOfChild(bParent.id, personById(bParent.id)?.id); // unused safe
  const bParentSide=relParentSideOfChild(bParent.id, personById(bParent.id)?.id);
  const sideOfBParentToB = window.__relSideOfBParent || '';
  if(sideOfBParentToB==='mother')return aParent.gender==='female'?child+'خاله':child+'دایی';
  return aParent.gender==='female'?child+'عمه':child+'عمو';
}
function relCard(title,detail,path,confidence='بالا'){
  return `<div class="profile-row"><h3>${esc(title)}</h3><p>${esc(detail||'')}</p>${path?`<p><b>مسیر:</b> ${esc(path)}</p>`:''}<span class="pill ok">دقت: ${esc(confidence)}</span></div>`;
}
function relPathNames(path){
  return path.map(x=>`${x.label}: ${personName(x.id)}`).join(' ← ');
}
function relBuildGraph(){
  const graph={};
  peopleCache.forEach(p=>{graph[String(p.id)]=[]});
  peopleCache.forEach(p=>{
    const id=String(p.id);
    if(p.fatherId&&personById(p.fatherId)){
      graph[id].push({to:String(p.fatherId),label:'پدر'});
      graph[String(p.fatherId)].push({to:id,label:p.gender==='female'?'دختر':'پسر'});
    }
    if(p.motherId&&personById(p.motherId)){
      graph[id].push({to:String(p.motherId),label:'مادر'});
      graph[String(p.motherId)].push({to:id,label:p.gender==='female'?'دختر':'پسر'});
    }
    spousesOf(id).forEach(s=>{
      graph[id].push({to:String(s.id),label:'همسر'});
    });
  });
  return graph;
}
function relShortestPath(a,b,maxDepth=9){
  const graph=relBuildGraph(), start=String(a), target=String(b);
  const q=[{id:start,path:[]}], seen=new Set([start]);
  while(q.length){
    const cur=q.shift();
    if(cur.id===target)return cur.path;
    if(cur.path.length>=maxDepth)continue;
    (graph[cur.id]||[]).forEach(e=>{
      if(seen.has(e.to))return;
      seen.add(e.to);
      q.push({id:e.to,path:cur.path.concat([{id:e.to,label:e.label,name:personName(e.to)}])});
    });
  }
  return null;
}
function relationSmart(a,b){
  a=String(a||''); b=String(b||'');
  if(!a||!b)return relCard('انتخاب ناقص','هر دو نفر را انتخاب کن.','', 'نامشخص');
  if(a===b)return relCard('خود فرد','هر دو انتخاب یک نفر هستند.','', 'قطعی');
  const A=personById(a), B=personById(b);
  if(!A||!B)return relCard('نامشخص','یکی از افراد پیدا نشد.','', 'نامشخص');

  if(spousesOf(a).some(x=>String(x.id)===b)) return relCard('همسر',`${A.fullName} همسر ${B.fullName} است.`,`${A.fullName} ← همسر ← ${B.fullName}`,'قطعی');

  if(relIsParent(a,b)) return relCard(relPersonWord(A),`${A.fullName} ${relPersonWord(A)} ${B.fullName} است.`,`${A.fullName} ← ${relChildWord(B)} ← ${B.fullName}`,'قطعی');
  if(relIsParent(b,a)) return relCard(relChildWord(A),`${A.fullName} ${relChildWord(A)} ${B.fullName} است.`,`${A.fullName} ← ${relPersonWord(B)} ← ${B.fullName}`,'قطعی');

  const aAnc=relAncestors(a), bAnc=relAncestors(b);
  const AisAnc=bAnc.find(x=>x.id===a);
  if(AisAnc)return relCard(relGrandWord(AisAnc.level,A,true),`${A.fullName} ${relGrandWord(AisAnc.level,A,true)} ${B.fullName} است.`,`${A.fullName} ← ${AisAnc.level} نسل پایین‌تر ← ${B.fullName}`,'قطعی');
  const BisAnc=aAnc.find(x=>x.id===b);
  if(BisAnc)return relCard(relGrandWord(BisAnc.level,A,false),`${A.fullName} ${relGrandWord(BisAnc.level,A,false)} ${B.fullName} است.`,`${A.fullName} ← ${BisAnc.level} نسل بالاتر ← ${B.fullName}`,'قطعی');

  const shared=relSharedParents(a,b);
  if(shared.length){
    const parent=personById(shared[0]);
    return relCard(relSiblingWord(A),`${A.fullName} ${relSiblingWord(A)} ${B.fullName} است.`,`${A.fullName} ← والد مشترک: ${parent?.fullName||'نامشخص'} ← ${B.fullName}`,'بالا');
  }

  const bParents=relParentEdges(b);
  for(const bp of bParents){
    if(relSharedParents(a,bp.id).length){
      return relCard(relUncleAuntWord(A,bp.side),`${A.fullName} ${relUncleAuntWord(A,bp.side)} ${B.fullName} است.`,`${A.fullName} ← خواهر/برادر ${personName(bp.id)} ← ${bp.label} ${B.fullName}`,'بالا');
    }
  }
  const aParents=relParentEdges(a);
  for(const ap of aParents){
    if(relSharedParents(b,ap.id).length){
      const through=personById(ap.id);
      return relCard(relNephewNieceWord(A,through),`${A.fullName} ${relNephewNieceWord(A,through)} ${B.fullName} است.`,`${A.fullName} ← فرزند ${personName(ap.id)} ← خواهر/برادر ${B.fullName}`,'بالا');
    }
  }

  for(const ap of aParents){
    for(const bp of bParents){
      if(relSharedParents(ap.id,bp.id).length){
        const aPar=personById(ap.id), bPar=personById(bp.id);
        const child=A.gender==='female'?'دختر':'پسر';
        let word='';
        if(bp.side==='father') word=aPar.gender==='female'?child+'عمه':child+'عمو';
        else word=aPar.gender==='female'?child+'خاله':child+'دایی';
        return relCard(word,`${A.fullName} ${word} ${B.fullName} است.`,`${A.fullName} ← فرزند ${aPar.fullName} ← ${bPar.fullName} والد ${B.fullName}`,'بالا');
      }
    }
  }

  const bSpouses=spousesOf(b);
  for(const s of bSpouses){
    if(relIsParent(a,s.id)){
      const word=B.gender==='female'?(A.gender==='female'?'مادرشوهر':'پدرشوهر'):(A.gender==='female'?'مادرزن':'پدرزن');
      return relCard(word,`${A.fullName} ${word} ${B.fullName} است.`,`${A.fullName} ← والد ${s.fullName} ← همسر ${B.fullName}`,'بالا');
    }
  }
  const aSpouses=spousesOf(a);
  for(const s of aSpouses){
    if(relIsParent(b,s.id)){
      const word=A.gender==='female'?'عروس':'داماد';
      return relCard(word,`${A.fullName} ${word} ${B.fullName} است.`,`${A.fullName} ← همسر ${s.fullName} ← فرزند ${B.fullName}`,'بالا');
    }
    if(spousesOf(b).some(bs=>relSharedParents(s.id,bs.id).length)){
      const word=A.gender==='female'?'جاری':'باجناق';
      return relCard(word,`${A.fullName} ${word} ${B.fullName} است.`,`${A.fullName} ← همسر ${s.fullName} ← خواهر/برادر همسر ${B.fullName}`,'متوسط');
    }
  }

  const commons=[];
  aAnc.forEach(x=>{const hit=bAnc.find(y=>y.id===x.id);if(hit)commons.push({person:x.person,aLevel:x.level,bLevel:hit.level})});
  if(commons.length){
    commons.sort((x,y)=>(x.aLevel+x.bLevel)-(y.aLevel+y.bLevel));
    const c=commons[0];
    const title='خویشاوند با جد مشترک';
    const detail=`جد مشترک ${A.fullName} و ${B.fullName}: ${c.person.fullName}`;
    const path=`${A.fullName} ← ${c.aLevel} نسل تا ${c.person.fullName} ← ${c.bLevel} نسل تا ${B.fullName}`;
    return relCard(title,detail,path,'متوسط');
  }

  const p=relShortestPath(a,b,9);
  if(p&&p.length)return relCard('مسیر خانوادگی پیدا شد','نام رایج دقیق برای این مسیر پیدا نشد، اما ارتباط در داده‌ها وجود دارد.',`${A.fullName} ← ${p.map(x=>x.label+' '+x.name).join(' ← ')} ← ${B.fullName}`,'متوسط');

  return relCard('نسبت پیدا نشد','برای تشخیص دقیق‌تر، پدر، مادر و همسران دو نفر را کامل‌تر ثبت کن.','', 'نامشخص');
}

function relationStepIcon(label){label=String(label||'');if(label.includes('پدر'))return '👨';if(label.includes('مادر'))return '👩';if(label.includes('فرزند'))return '👶';if(label.includes('همسر'))return '💍';return '🔗'}
function relationPersonNode(p,cls=''){
  if(!p)return `<div class="rel-node ${cls}"><b>نامشخص</b><small>اطلاعات ناقص</small></div>`;
  const sub=[p.gender==='female'?'زن':'مرد',p.lifeStatus==='dead'?'فوت‌شده':'زنده'].filter(Boolean).join(' • ');
  return `<button class="rel-node ${p.gender==='female'?'female':''} ${p.lifeStatus==='dead'?'dead':''} ${cls}" data-id="${esc(p.id)}" type="button"><b>${esc(p.fullName||'بدون نام')}</b><small>${esc(sub)}</small></button>`;
}
function relationDirectPath(a,b){
  const A=personById(a),B=personById(b); if(!A||!B)return [];
  if(a===b)return [{id:a,label:'خود فرد'}];
  if(spousesOf(a).some(x=>String(x.id)===String(b)))return [{id:a,label:''},{id:b,label:'همسر'}];
  if(relIsParent(a,b))return [{id:a,label:''},{id:b,label:relChildWord(B)}];
  if(relIsParent(b,a))return [{id:a,label:''},{id:b,label:relPersonWord(B)}];
  const sp=relShortestPath(a,b,10);
  if(sp&&sp.length)return [{id:a,label:''},...sp.map(x=>({id:x.id,label:x.label}))];
  return [];
}
function relationMapHtml(a,b){
  const path=relationDirectPath(a,b);
  if(!path.length)return `<div class="relation-map-wrap"><div class="search-empty">مسیر تصویری پیدا نشد. اطلاعات پدر، مادر یا همسران را کامل‌تر کن.</div></div>`;
  let html=`<div class="relation-map-wrap" id="relationPrintArea"><div class="relation-map-title">🧬 نقشه مسیر خویشاوندی</div><div class="relation-map">`;
  path.forEach((step,i)=>{
    const p=personById(step.id);
    html+=relationPersonNode(p,i===0?'start':(i===path.length-1?'end':''));
    if(i<path.length-1){const next=path[i+1];html+=`<div class="rel-arrow"><span>${relationStepIcon(next.label)} ${esc(next.label||'رابطه')}</span> ←</div>`;}
  });
  html+=`</div><div class="relation-actions"><button class="btn small ghost" onclick="window.print()">چاپ نقشه</button></div></div>`;
  return html;
}

function runRelationSmart(){const a=val('relationA'),b=val('relationB');$('relationResult').innerHTML=relationSmart(a,b)+relationMapHtml(a,b);document.querySelectorAll('.rel-node').forEach(n=>n.onclick=()=>goProfile(n.dataset.id));}

function parseNum(v){const n=parseInt(String(v||'').replace(/[۰-۹]/g,d=>'۰۱۲۳۴۵۶۷۸۹'.indexOf(d)).replace(/[٠-٩]/g,d=>'٠١٢٣٤٥٦٧٨٩'.indexOf(d)),10);return isNaN(n)?0:n}

function ftpTodayPersianMonthDay(){try{const parts=new Intl.DateTimeFormat('fa-IR-u-ca-persian',{month:'numeric',day:'numeric'}).formatToParts(new Date());return{m:parseNum(parts.find(x=>x.type==='month')?.value),d:parseNum(parts.find(x=>x.type==='day')?.value)}}catch(e){const n=new Date();return{m:n.getMonth()+1,d:n.getDate()}}}
function occasionDayOfYear(m,d){const days=[0,31,31,31,31,31,31,30,30,30,30,30,29];m=parseNum(m);d=parseNum(d);let sum=0;for(let i=1;i<m;i++)sum+=days[i]||30;return sum+(d||0)}
function occasionFullDate(p,type){const pre=type==='birth'?'birth':'death';return [p[pre+'Year'],p[pre+'Month'],p[pre+'Day']].filter(Boolean).join('/')||'-'}
function personBurialText(p){return p.burialPlace||p.gravePlace||p.cemetery||p.burial||p.deathPlace||''}
function occasionItems(){const today=ftpTodayPersianMonthDay(),todayKey=occasionDayOfYear(today.m,today.d),items=[];peopleCache.forEach(p=>{[['birth','🎂','تولد',p.birthMonth,p.birthDay],['death','🪦','سالگرد فوت',p.deathMonth,p.deathDay]].forEach(a=>{const type=a[0],icon=a[1],label=a[2],m=parseNum(a[3]),d=parseNum(a[4]);if(!m||!d)return;let key=occasionDayOfYear(m,d),left=key-todayKey;if(left<0)left+=365;items.push({type,icon,label,person:p,left,date:`${m}/${d}`,fullDate:occasionFullDate(p,type),burial:personBurialText(p)})})});return items.sort((a,b)=>a.left-b.left||String(a.person.fullName||'').localeCompare(String(b.person.fullName||''),'fa'))}
function occasionStats(){const all=occasionItems();return{all:all.length,today:all.filter(x=>x.left===0).length,week:all.filter(x=>x.left>0&&x.left<=7).length,birth:all.filter(x=>x.type==='birth').length,death:all.filter(x=>x.type==='death').length}}
function occasionsView(){const st=occasionStats();return`<div class="hero"><h2>تولدها و فوتی‌ها</h2><p>نسخه سبک؛ فقط نمایش تولدها، سالگرد فوت و محل دفن. ورود و Auth دست نخورده است.</p></div><div class="occasion-grid"><div class="occasion-stat"><div><small>کل مناسبت‌ها</small><b>${st.all}</b></div><div class="icon">📅</div></div><div class="occasion-stat"><div><small>امروز</small><b>${st.today}</b></div><div class="icon">✅</div></div><div class="occasion-stat"><div><small>۷ روز آینده</small><b>${st.week}</b></div><div class="icon">⏳</div></div><div class="occasion-stat"><div><small>تولد / فوت</small><b>${st.birth}/${st.death}</b></div><div class="icon">🎂</div></div></div><div class="card"><div class="occasion-tools"><input id="occasionSearch" class="field" placeholder="جستجو نام، پدر، مادر، همسر، محل دفن"><select id="occasionType" class="field"><option value="">همه</option><option value="birth">🎂 تولدها</option><option value="death">🪦 فوتی‌ها</option></select><select id="occasionRange" class="field"><option value="all">همه سال</option><option value="today">امروز</option><option value="week">۷ روز آینده</option><option value="month">۳۰ روز آینده</option></select><button id="occasionPrint" class="btn warn">🖨️ چاپ</button></div><div id="occasionList">${occasionGroupedHtml(occasionItems())}</div></div>`}
function occasionGroupedHtml(list){const births=list.filter(x=>x.type==='birth'),deaths=list.filter(x=>x.type==='death');return`<div class="occasion-section-title">🎂 تولدها (${births.length})</div>${occasionListHtml(births)}<div class="occasion-section-title">🪦 فوتی‌ها و محل دفن (${deaths.length})</div>${occasionListHtml(deaths)}`}
function occasionListHtml(list){if(!list.length)return'<div class="occasion-empty">موردی برای نمایش نیست.</div>';return`<div class="occasion-list">${list.map(o=>{const p=o.person,cls=o.left===0?'today':(o.left<=7?'week':'later'),txt=o.left===0?'امروز':(o.left===1?'فردا':o.left+' روز دیگر');const rel=`پدر: ${personName(p.fatherId)} | مادر: ${personName(p.motherId)} | همسر: ${spousesOf(p.id).map(s=>s.fullName).join('، ')||'ثبت نشده'}`;const burial=o.type==='death'?` | محل دفن: ${o.burial||'ثبت نشده'}`:'';return`<div class="occasion-item ${o.type}"><div class="occasion-main"><div class="occasion-icon">${o.icon}</div><div><div class="occasion-title">${esc(o.label)} ${esc(p.fullName||'بدون نام')}</div><div class="occasion-sub">تاریخ: ${esc(o.fullDate||o.date)}${esc(burial)}<br>${esc(rel)}</div></div></div><div class="actions"><span class="occasion-badge ${cls}">${txt}</span><button class="btn small blue openProfile" data-id="${esc(p.id)}">پروفایل</button></div></div>`}).join('')}</div>`}
function filterOccasions(){const q=val('occasionSearch').toLowerCase(),t=val('occasionType'),r=val('occasionRange');let list=occasionItems().filter(o=>{const p=o.person;const hay=[p.fullName,personName(p.fatherId),personName(p.motherId),...spousesOf(p.id).map(s=>s.fullName),o.label,o.date,o.fullDate,o.burial].join(' ').toLowerCase();const rangeOk=r==='today'?o.left===0:r==='week'?o.left<=7:r==='month'?o.left<=30:true;return(!t||o.type===t)&&rangeOk&&(!q||hay.includes(q))});$('occasionList').innerHTML=t?occasionListHtml(list):occasionGroupedHtml(list);document.querySelectorAll('.openProfile').forEach(b=>b.onclick=()=>goProfile(b.dataset.id))}

function personDateKey(p,prefix){const y=parseNum(p[prefix+'Year']),m=parseNum(p[prefix+'Month']),d=parseNum(p[prefix+'Day']);if(!y)return null;return {y,m:m||0,d:d||0,text:[p[prefix+'Year'],p[prefix+'Month'],p[prefix+'Day']].filter(Boolean).join('/')}}

function printCenterView(){return`<div class="hero"><h2>چاپ حرفه‌ای</h2><p>خروجی تمیز برای A4، A3، A1 و ذخیره به PDF</p></div><div class="print-center-grid"><div class="print-preview-box"><div class="print-preview-head"><span>پیش‌نمایش چاپ</span><span class="pill blue">برای PDF از گزینه Save as PDF مرورگر استفاده کن</span></div><div id="printSheet" class="print-sheet"><div class="print-only-header"><h1 id="printDocTitle">شجره‌نامه خانواده</h1><small id="printDocSub">FamilyTreePro V251</small></div><div id="printPreviewTarget" class="print-target print-a4 compact-print simple-lines-print">${printPreviewHtml()}</div><div class="print-watermark">FamilyTreePro V251</div></div></div><div class="print-settings-card"><h3>تنظیمات چاپ</h3><input id="printTitle" class="field" value="شجره‌نامه خانواده" placeholder="عنوان چاپ"><div class="print-setting-row"><select id="printContent" class="field"><option value="tree">🌳 شجره کامل</option><option value="timeline">📅 تایم‌لاین</option><option value="people">👥 لیست افراد</option><option value="stats">📊 گزارش خلاصه</option></select><select id="printSize" class="field"><option value="a4">A4 افقی</option><option value="a3">A3 افقی</option><option value="a1">A1 پوستر</option></select></div><div class="print-setting-row"><select id="printDensity" class="field"><option value="compact">فشرده و مناسب چاپ</option><option value="normal">معمولی</option><option value="large">درشت</option></select><select id="printColor" class="field"><option value="color">رنگی</option><option value="simple">خطی ساده</option></select></div><div class="print-checks"><label><input id="printPhotos" type="checkbox" checked> نمایش عکس‌ها</label><label><input id="printHeader" type="checkbox" checked> نمایش سربرگ چاپ</label><label><input id="printWatermark" type="checkbox" checked> نمایش نام نسخه پایین صفحه</label></div><div class="toolbar"><button id="refreshPrintPreview" class="btn purple">🔄 بروزرسانی پیش‌نمایش</button><button id="printNowBtn" class="btn green">🖨️ چاپ / ذخیره PDF</button><button id="printTreeDirectBtn" class="btn warn">🌳 چاپ مستقیم شجره</button></div><div class="hint">برای خروجی PDF: بعد از زدن چاپ، در پنجره چاپ گزینه <b>Save as PDF</b> را انتخاب کن.</div></div></div>`}
function printPreviewHtml(){const type=$('printContent')?.value||'tree';if(type==='timeline')return `<div class="timeline-print-target">${timelineListHtml(timelineEvents())}</div>`;if(type==='people')return printPeopleTableHtml();if(type==='stats')return printStatsHtml();return printFullTreeHtml()}
function printFullTreeHtml(){if(!peopleCache.length)return '<div class="empty">فردی برای چاپ وجود ندارد.</div>';const roots=peopleCache.filter(p=>!p.fatherId&&!p.motherId);const blocks=(roots.length?roots:peopleCache.slice(0,1)).map(r=>`<div class="full-tree-block"><div class="full-tree-block-title">${esc(r.fullName||'ریشه')}</div>${classicTreeHtml(r.id,new Set())}</div>`).join('');return `<div class="classic-tree-wrap"><div class="tree-board-title">شجره کامل خانواده</div><div class="full-tree-forest">${blocks}</div></div>`}
function printPeopleTableHtml(){const rows=peopleCache.map((p,i)=>`<tr><td>${i+1}</td><td>${esc(p.fullName||'بدون نام')}</td><td>${p.gender==='female'?'زن':'مرد'}</td><td>${esc(personName(p.fatherId))}</td><td>${esc(personName(p.motherId))}</td><td>${esc(spousesOf(p.id).map(s=>s.fullName).join('، ')||'-')}</td><td>${childrenOf(p.id).length}</td><td>${p.lifeStatus==='dead'?'فوت‌شده':'زنده'}</td></tr>`).join('');return `<table class="print-preview-table"><thead><tr><th>#</th><th>نام</th><th>جنسیت</th><th>پدر</th><th>مادر</th><th>همسر</th><th>فرزند</th><th>وضعیت</th></tr></thead><tbody>${rows||'<tr><td colspan="8">موردی نیست</td></tr>'}</tbody></table>`}
function printStatsHtml(){const male=peopleCache.filter(p=>p.gender==='male').length,female=peopleCache.filter(p=>p.gender==='female').length,dead=peopleCache.filter(p=>p.lifeStatus==='dead').length,births=timelineEvents().filter(e=>e.type==='birth').length,deaths=timelineEvents().filter(e=>e.type==='death').length;return `<div class="tree-report"><h2>گزارش خلاصه خانواده</h2><table class="print-preview-table"><tbody><tr><th>کل افراد</th><td>${peopleCache.length}</td></tr><tr><th>مردان</th><td>${male}</td></tr><tr><th>زنان</th><td>${female}</td></tr><tr><th>فوت‌شده‌ها</th><td>${dead}</td></tr><tr><th>نسل‌ها</th><td>${countGenerations()}</td></tr><tr><th>تولدهای ثبت‌شده</th><td>${births}</td></tr><tr><th>فوت‌های ثبت‌شده</th><td>${deaths}</td></tr></tbody></table></div>`}
function updatePrintPreview(){const target=$('printPreviewTarget');if(!target)return;target.innerHTML=printPreviewHtml();const size=val('printSize')||'a4',density=val('printDensity')||'compact',color=val('printColor')||'color';target.className=`print-target print-${size} ${density==='compact'?'compact-print':''} ${density==='large'?'large-print':''} ${color==='simple'?'simple-lines-print':''} ${$('printPhotos')&&!$('printPhotos').checked?'no-photo-print':''}`;$('printDocTitle')&&($('printDocTitle').textContent=val('printTitle')||'شجره‌نامه خانواده');$('printDocSub')&&($('printDocSub').textContent=`FamilyTreePro V251 | ${new Date().toLocaleDateString('fa-IR')}`);const header=$('printDocTitle')?.closest('.print-only-header');if(header)header.style.display=($('printHeader')?.checked?'':'none');const wm=document.querySelector('.print-watermark');if(wm)wm.style.display=($('printWatermark')?.checked?'':'none')}
function printCenterNow(){updatePrintPreview();setTimeout(()=>window.print(),80)}

function timelineEvents(){const out=[];peopleCache.forEach(p=>{const b=personDateKey(p,'birth');if(b)out.push({type:'birth',icon:'🎂',label:'تولد',person:p,year:b.y,month:b.m,day:b.d,date:b.text,sort:b.y*10000+b.m*100+b.d});const de=personDateKey(p,'death');if(de)out.push({type:'death',icon:'🪦',label:'فوت',person:p,year:de.y,month:de.m,day:de.d,date:de.text,sort:de.y*10000+de.m*100+de.d});(Array.isArray(p.events)?p.events:[]).forEach((ev,i)=>{const y=parseNum(ev.year||ev.y),m=parseNum(ev.month||ev.m),d=parseNum(ev.day||ev.d);if(y)out.push({type:'other',icon:ev.icon||'⭐',label:ev.title||ev.name||'رویداد',person:p,year:y,month:m||0,day:d||0,date:[ev.year||ev.y,ev.month||ev.m,ev.day||ev.d].filter(Boolean).join('/'),note:ev.note||ev.description||'',sort:y*10000+(m||0)*100+(d||0)})})});return out.sort((a,b)=>a.sort-b.sort)}
function timelineView(){const evs=timelineEvents();const births=evs.filter(e=>e.type==='birth').length,deaths=evs.filter(e=>e.type==='death').length,years=[...new Set(evs.map(e=>e.year))];return`<div class="hero"><h2>تایم‌لاین خانوادگی</h2><p>نمایش تولد، فوت و رویدادهای خانوادگی به ترتیب زمانی</p></div><div class="timeline-stat-grid"><div class="timeline-stat"><small>کل رویدادها</small><b>${evs.length}</b></div><div class="timeline-stat"><small>تولدها</small><b>${births}</b></div><div class="timeline-stat"><small>فوت‌ها</small><b>${deaths}</b></div><div class="timeline-stat"><small>سال‌های ثبت‌شده</small><b>${years.length}</b></div></div><div class="card"><div class="timeline-tools"><input id="timelineSearch" class="field" placeholder="جستجو در نام، پدر، مادر، همسر، نوع رویداد"><select id="timelineType" class="field"><option value="">همه رویدادها</option><option value="birth">🎂 تولدها</option><option value="death">🪦 فوت‌ها</option><option value="other">⭐ رویدادها</option></select><select id="timelineOrder" class="field"><option value="asc">قدیمی به جدید</option><option value="desc">جدید به قدیمی</option></select><button id="timelinePrint" class="btn warn">🖨️ چاپ تایم‌لاین</button></div><div id="timelineList">${timelineListHtml(evs)}</div></div>`}
function timelineListHtml(list){if(!list.length)return'<div class="timeline-empty">هنوز تاریخ تولد، فوت یا رویدادی ثبت نشده است.</div>';let last=null;return`<div class="timeline-wrap">${list.map(e=>{const p=e.person;const yearHead=e.year!==last?(last=e.year,`<div class="timeline-year-head"><span>${e.year}</span></div>`):'';const cls=e.type==='birth'?'birth':(e.type==='death'?'death':'other');const rel=`پدر: ${personName(p.fatherId)} | مادر: ${personName(p.motherId)} | همسر: ${spousesOf(p.id).map(s=>s.fullName).join('، ')||'ثبت نشده'}`;return`${yearHead}<div class="timeline-item"><div class="timeline-dot">${e.icon}</div><div class="timeline-card ${cls}"><div><div class="timeline-title">${e.icon} ${esc(e.label)} ${esc(p.fullName||'بدون نام')}</div><span class="timeline-date">📅 ${esc(e.date||e.year)}</span><div class="timeline-sub">${esc(rel)}${e.note?'<br>'+esc(e.note):''}</div></div><div class="actions"><button class="btn small blue openProfile" data-id="${esc(p.id)}">پروفایل</button></div></div></div>`}).join('')}</div>`}
function filterTimeline(){const q=val('timelineSearch').toLowerCase(),t=val('timelineType'),order=val('timelineOrder');let list=timelineEvents().filter(e=>{const p=e.person;const hay=[p.fullName,e.label,e.date,e.note,personName(p.fatherId),personName(p.motherId),...spousesOf(p.id).map(s=>s.fullName)].join(' ').toLowerCase();return(!t||e.type===t)&&(!q||hay.includes(q))});if(order==='desc')list=list.reverse();$('timelineList').innerHTML=timelineListHtml(list);document.querySelectorAll('.openProfile').forEach(b=>b.onclick=()=>goProfile(b.dataset.id))}

function personPhotoSrc(p){return p?.photo||p?.photoUrl||p?.image||p?.avatar||((Array.isArray(p?.gallery)&&p.gallery[0])?p.gallery[0]:'')}
function photoInitials(p){return personCaricatureHtml(p)}
function personCaricatureIcon(p){const dead=p?.lifeStatus==='dead'||p?.isDead===true;if(dead)return '🧓';if(p?.gender==='female')return '👩';return '👨'}
function personCaricatureHtml(p){return `<span class="caricature-avatar ${p?.gender==='female'?'female':''} ${(p?.lifeStatus==='dead'||p?.isDead===true)?'dead':''}" title="تصویر پیش‌فرض">${personCaricatureIcon(p)}</span>`}
function photoThumbHtml(p,cls=''){const src=personPhotoSrc(p);return `<div class="photo-thumb ${p?.gender==='female'?'female':''} ${cls}">${src?`<img loading="lazy" src="${esc(src)}" alt="${esc(p.fullName||'عکس')}">`:photoInitials(p)}</div>`}
function photoStats(){const total=peopleCache.length,withPhoto=peopleCache.filter(personHasPhoto).length,noPhoto=total-withPhoto,gallery=peopleCache.filter(p=>Array.isArray(p.gallery)&&p.gallery.length).length;return{total,withPhoto,noPhoto,gallery,percent:total?Math.round(withPhoto*100/total):0}}
function photoEngineView(){const st=photoStats();return`<div class="hero"><h2>موتور عکس</h2><p>طرح شجره تغییر نکرده؛ فقط مدیریت، فشرده‌سازی و کنترل عکس‌ها اضافه شد.</p></div><div class="grid stats"><div class="card stat photo-stat-ok"><div><small>کل افراد</small><div class="num">${st.total}</div></div><div class="icon">👥</div></div><div class="card stat photo-stat-ok"><div><small>دارای عکس</small><div class="num">${st.withPhoto}</div></div><div class="icon">📷</div></div><div class="card stat ${st.noPhoto?'photo-stat-warn':'photo-stat-ok'}"><div><small>بدون عکس</small><div class="num">${st.noPhoto}</div></div><div class="icon">🖼️</div></div><div class="card stat"><div><small>پوشش عکس</small><div class="num">${st.percent}%</div></div><div class="icon">✅</div></div><div class="card stat"><div><small>گالری‌دار</small><div class="num">${st.gallery}</div></div><div class="icon">🗂️</div></div></div><div class="card"><div class="photo-drop">📌 از این صفحه برای اضافه‌کردن عکس اصلی هر شخص استفاده کن. عکس قبل از ذخیره خودکار کوچک و سبک می‌شود تا روی موبایل بهتر بالا بیاید.</div><div class="photo-tools"><button id="photoRefreshBtn" class="btn gray">🔄 بروزرسانی</button><button id="photoReportBtn" class="btn purple">📋 گزارش عکس‌ها</button><button id="photoNoPicBtn" class="btn warn">نمایش بدون عکس‌ها</button><button id="photoAllBtn" class="btn">نمایش همه</button></div><div class="photo-progress hidden" id="photoProgress"><span></span></div></div><div class="card"><div class="photo-filter"><input id="photoSearch" class="field" placeholder="جستجوی نام، پدر، مادر، همسر"><select id="photoStatus" class="field"><option value="">همه</option><option value="with">دارای عکس</option><option value="without">بدون عکس</option></select><select id="photoGender" class="field"><option value="">همه جنسیت‌ها</option><option value="male">مرد</option><option value="female">زن</option></select></div><div id="photoList">${photoListHtml(peopleCache)}</div></div>`}
function photoListHtml(list){if(!list.length)return'<div class="empty">موردی پیدا نشد.</div>';return`<div class="photo-grid">${list.map(p=>{const src=personPhotoSrc(p),parents=parentsOf(p),sp=spousesOf(p).map(x=>x.fullName).join('، ');return`<div class="photo-card" data-id="${esc(p.id)}">${photoThumbHtml(p)}<div class="photo-main"><b>${esc(p.fullName||'بدون نام')}</b><small>پدر: ${esc(parents.father?.fullName||'-')} | مادر: ${esc(parents.mother?.fullName||'-')}</small><small>${src?'✅ عکس دارد':'⚠️ عکس ندارد'} ${sp?`| همسر: ${esc(sp)}`:''}</small><div class="photo-actions"><button class="btn small blue openProfile" data-id="${esc(p.id)}">پروفایل</button><button class="btn small green pickPhotoBtn" data-id="${esc(p.id)}">افزودن/تعویض عکس</button>${src?`<button class="btn small red removePhotoBtn" data-id="${esc(p.id)}">حذف عکس</button>`:''}<input class="photo-file" id="photoFile_${esc(p.id)}" data-id="${esc(p.id)}" type="file" accept="image/*"></div></div></div>`}).join('')}</div>`}
function filteredPhotos(forceStatus=''){const q=val('photoSearch').toLowerCase(),status=forceStatus||val('photoStatus'),gender=val('photoGender');return peopleCache.filter(p=>{const parents=parentsOf(p),sp=spousesOf(p).map(x=>x.fullName).join(' '),hay=[p.fullName,parents.father?.fullName,parents.mother?.fullName,sp,p.phone,p.job].join(' ').toLowerCase();const has=personHasPhoto(p);return(!q||hay.includes(q))&&(!gender||p.gender===gender)&&(!status||(status==='with'?has:!has))})}
function refreshPhotoList(forceStatus=''){if(!$('photoList'))return;$('photoList').innerHTML=photoListHtml(filteredPhotos(forceStatus));bindPhotoButtons();document.querySelectorAll('.openProfile').forEach(b=>b.onclick=()=>goProfile(b.dataset.id));document.querySelectorAll('.bioPerson').forEach(b=>b.onclick=(e)=>{e.preventDefault();e.stopPropagation();showBiography(b.dataset.id)})}
function setPhotoProgress(v){const box=$('photoProgress');if(!box)return;box.classList.toggle('hidden',v<=0||v>=100);const bar=box.querySelector('span');if(bar)bar.style.width=Math.max(0,Math.min(100,v))+'%'}
function compressImageFile(file,maxSide=900,quality=.72){return new Promise((resolve,reject)=>{if(!file||!file.type.startsWith('image/'))return reject(new Error('فایل عکس نیست'));const reader=new FileReader();reader.onerror=()=>reject(new Error('خواندن فایل ناموفق بود'));reader.onload=()=>{const img=new Image();img.onerror=()=>reject(new Error('باز کردن عکس ناموفق بود'));img.onload=()=>{let w=img.width,h=img.height;const scale=Math.min(1,maxSide/Math.max(w,h));w=Math.max(1,Math.round(w*scale));h=Math.max(1,Math.round(h*scale));const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;const ctx=canvas.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);let data=canvas.toDataURL('image/jpeg',quality);if(data.length>180000)data=canvas.toDataURL('image/jpeg',.58);if(data.length>140000)data=canvas.toDataURL('image/jpeg',.46);resolve(data)};img.src=reader.result};reader.readAsDataURL(file)})}
async function savePersonPhoto(id,file){const p=personById(id);if(!p)return;try{setPhotoProgress(20);const data=await compressImageFile(file);setPhotoProgress(65);await updateDoc(doc(db,'people',id),{photo:data,photoUpdatedAt:serverTimestamp(),updatedAt:serverTimestamp()});await logChange('photo',id,['photo'],{details:'افزودن یا تعویض عکس'});setPhotoProgress(90);await loadPeople();if(currentRoute==='profile'){selectedPersonId=id;render()}else refreshPhotoList();setPhotoProgress(100);setTimeout(()=>setPhotoProgress(0),400)}catch(e){setPhotoProgress(0);alert('خطای عکس: '+e.message)}}
async function removePersonPhoto(id){if(!confirm('عکس این شخص حذف شود؟'))return;await updateDoc(doc(db,'people',id),{photo:'',photoUpdatedAt:serverTimestamp(),updatedAt:serverTimestamp()});await logChange('photo',id,['photo'],{details:'حذف عکس'});await loadPeople();if(currentRoute==='profile'){selectedPersonId=id;render()}else refreshPhotoList()}
function photoReportText(){const st=photoStats();const no=peopleCache.filter(p=>!personHasPhoto(p)).map(p=>`- ${p.fullName||'بدون نام'} | پدر: ${personName(p.fatherId)}`).join('\n');return `FamilyTreePro Bio Photo\nتاریخ: ${new Date().toLocaleString('fa-IR')}\nکل افراد: ${st.total}\nدارای عکس: ${st.withPhoto}\nبدون عکس: ${st.noPhoto}\nپوشش عکس: ${st.percent}%\n\nافراد بدون عکس:\n${no||'هیچ موردی نیست'}`}
function bindPhotoButtons(){document.querySelectorAll('.pickPhotoBtn').forEach(b=>b.onclick=()=>{const f=$('photoFile_'+b.dataset.id);if(f)f.click()});document.querySelectorAll('.photo-file').forEach(inp=>inp.onchange=()=>{const file=inp.files&&inp.files[0];if(file)savePersonPhoto(inp.dataset.id,file);inp.value=''});document.querySelectorAll('.removePhotoBtn').forEach(b=>b.onclick=()=>removePersonPhoto(b.dataset.id))}

function personHasPhoto(p){return !!(p?.photo||p?.photoUrl||p?.image||p?.avatar||(Array.isArray(p?.gallery)&&p.gallery.length))}
function dataQualityIssues(){const issues=[];const byNameFather=new Map();peopleCache.forEach(p=>{const key=(normalizeName(p.fullName)+'|'+String(p.fatherId||''));if(!byNameFather.has(key))byNameFather.set(key,[]);byNameFather.get(key).push(p)});byNameFather.forEach(list=>{if(list.length>1&&normalizeName(list[0].fullName))issues.push({type:'duplicate',level:'warn',icon:'👥',title:'احتمال فرد تکراری',sub:list.map(p=>p.fullName||'بدون نام').join('، '),ids:list.map(p=>p.id)})});peopleCache.forEach(p=>{if(p.fatherId&&!personById(p.fatherId))issues.push({type:'broken',level:'bad',icon:'👨',title:'پدر پیدا نشد',sub:`${p.fullName||'بدون نام'} به پدری وصل است که در لیست افراد نیست.`,ids:[p.id]});if(p.motherId&&!personById(p.motherId))issues.push({type:'broken',level:'bad',icon:'👩',title:'مادر پیدا نشد',sub:`${p.fullName||'بدون نام'} به مادری وصل است که در لیست افراد نیست.`,ids:[p.id]});if(p.spouseId&&!personById(p.spouseId))issues.push({type:'broken',level:'bad',icon:'💍',title:'همسر پیدا نشد',sub:`${p.fullName||'بدون نام'} به همسری وصل است که در لیست افراد نیست.`,ids:[p.id]});if(p.fatherId===p.id||p.motherId===p.id||p.spouseId===p.id)issues.push({type:'self',level:'bad',icon:'⛔',title:'رابطه اشتباه با خود فرد',sub:`${p.fullName||'بدون نام'} در یکی از روابط به خودش وصل شده است.`,ids:[p.id]});if(!p.birthYear&&!p.birthMonth&&!p.birthDay)issues.push({type:'date',level:'warn',icon:'🎂',title:'تاریخ تولد ناقص',sub:`برای ${p.fullName||'بدون نام'} تاریخ تولد ثبت نشده است.`,ids:[p.id]});if(p.lifeStatus==='dead'&&!p.deathYear&&!p.deathMonth&&!p.deathDay)issues.push({type:'death',level:'warn',icon:'🪦',title:'تاریخ فوت ناقص',sub:`${p.fullName||'بدون نام'} فوت‌شده است ولی تاریخ فوت ندارد.`,ids:[p.id]});if(!personHasPhoto(p))issues.push({type:'photo',level:'info',icon:'📷',title:'عکس ندارد',sub:`برای ${p.fullName||'بدون نام'} عکس ثبت نشده است.`,ids:[p.id]})});return issues}
function qualityStats(){const issues=dataQualityIssues();return{total:peopleCache.length,issues:issues.length,bad:issues.filter(i=>i.level==='bad').length,warn:issues.filter(i=>i.level==='warn').length,photos:peopleCache.filter(personHasPhoto).length,dates:peopleCache.filter(p=>p.birthYear||p.birthMonth||p.birthDay).length}}
function backupObject(){return{app:'FamilyTreePro',version:'V252 Safe No Login Touch',exportedAt:new Date().toISOString(),profile:{uid:currentUser?.uid||'',email:currentUser?.email||'',role:currentProfile?.role||''},counts:{people:peopleCache.length,users:isAdmin()?usersCache.length:0,notifications:notificationsCache.length},people:peopleCache,users:isAdmin()?usersCache:[],notifications:notificationsCache}}
function downloadTextFile(filename,text,type='application/json'){const blob=new Blob([text],{type});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},800)}
function downloadFullBackup(){const name='FamilyTreePro_V251_Backup_'+new Date().toISOString().slice(0,10)+'.json';downloadTextFile(name,JSON.stringify(backupObject(),null,2))}
function qualityReportText(){const st=qualityStats(),issues=dataQualityIssues();return[`FamilyTreePro Data Guard`,`تاریخ گزارش: ${new Date().toLocaleString('fa-IR')}`,`کل افراد: ${st.total}`,`خطاهای مهم: ${st.bad}`,`هشدارها: ${st.warn}`,`افراد دارای عکس: ${st.photos}`,`افراد دارای تاریخ تولد: ${st.dates}`,'',...issues.slice(0,200).map((i,idx)=>`${idx+1}. [${i.level}] ${i.title} - ${i.sub}`)].join('\n')}

function qualityListHtml(list){if(!list.length)return'<div class="empty">فعلاً خطا یا هشدار مهمی پیدا نشد.</div>';return`<div class="guard-list">${list.map(i=>`<div class="guard-issue"><div><b>${i.icon||'⚠️'} ${esc(i.title)}</b><small>${esc(i.sub)}</small><div>${(i.ids||[]).slice(0,4).map(id=>personById(id)?`<button class="link-person openProfile" data-id="${esc(id)}">${esc(personName(id))}</button>`:'').join(' ')}</div></div><span class="pill ${i.level==='bad'?'bad':(i.level==='warn'?'purple':'blue')}">${i.level==='bad'?'مهم':(i.level==='warn'?'هشدار':'اطلاعات')}</span></div>`).join('')}</div>`}
function filterQuality(){const q=val('qualitySearch').toLowerCase(),t=val('qualityType');let list=dataQualityIssues().filter(i=>{const names=(i.ids||[]).map(id=>personName(id)).join(' ');const hay=[i.title,i.sub,i.type,i.level,names].join(' ').toLowerCase();return(!t||i.level===t||i.type===t)&&(!q||hay.includes(q))});$('qualityList').innerHTML=qualityListHtml(list);document.querySelectorAll('.openProfile').forEach(b=>b.onclick=()=>goProfile(b.dataset.id))}

function filterUsers(){const q=val('userSearch').toLowerCase(),r=val('roleFilter'),a=val('approveFilter');let list=usersCache.filter(u=>(!q||String(u.email||'').toLowerCase().includes(q))&&(!r||u.role===r)&&(!a||(a==='approved'?u.approved:!u.approved)));$('usersTable').innerHTML=usersTable(list);bindRouteEvents()}function filterPeople(){const q=val('peopleSearch').toLowerCase();const list=peopleCache.filter(p=>{const hay=[p.fullName,personName(p.fatherId),personName(p.motherId),...spousesOf(p.id).map(s=>s.fullName)].join(' ').toLowerCase();return !q||hay.includes(q)});$('peopleList').innerHTML=peopleList(list,true);bindRouteEvents()}
async function savePerson(){const id=val('editingPersonId'),oldData=id?personById(id):null,data={fullName:val('personName'),gender:val('personGender'),lifeStatus:val('personLife'),birthYear:val('birthYear'),birthMonth:val('birthMonth'),birthDay:val('birthDay'),fatherId:val('fatherId'),motherId:val('motherId'),spouseId:val('spouseId'),updatedAt:serverTimestamp()};if(!data.fullName){$('peopleMsg').textContent='نام را وارد کن';return}if(duplicatePerson(data.fullName,data.fatherId,id)){$('peopleMsg').textContent='این فرد با همین نام و پدر قبلاً ثبت شده است.';return}if(id&&(data.fatherId===id||data.motherId===id||data.spouseId===id)){$('peopleMsg').textContent='فرد نمی‌تواند پدر، مادر یا همسر خودش باشد.';return}let savedId=id;if(id){await updateDoc(doc(db,'people',id),data);await logChange('update',id,changedFields(oldData,data),{details:'ویرایش سریع فرد'})}else{const ref=await addDoc(collection(db,'people'),{...data,createdAt:serverTimestamp()});savedId=ref.id;await logChange('create',savedId,Object.keys(data),{personName:data.fullName,details:'افزودن فرد جدید'})}await syncSpouse(savedId,data.spouseId);clearPersonForm();await loadPeople();render()}
async function syncSpouse(personId,spouseId){personId=String(personId||'');spouseId=String(spouseId||'');if(!personId||!spouseId||personId===spouseId)return;const p=personById(personId),sp=personById(spouseId);const pIds=new Set(getSpouseIds(p));pIds.add(spouseId);await updateDoc(doc(db,'people',personId),{spouseId:[...pIds][0]||'',spouseIds:[...pIds],updatedAt:serverTimestamp()}).catch(()=>{});if(sp){const sIds=new Set(getSpouseIds(sp));sIds.add(personId);await updateDoc(doc(db,'people',spouseId),{spouseId:[...sIds][0]||'',spouseIds:[...sIds],updatedAt:serverTimestamp()}).catch(()=>{})}}let childRowsState=[{name:'',gender:'male',fatherId:'',motherId:''}],backupData=null,backupStats=null;
function readChildRowsUI(){

async function saveChildRows(){

  if(!rows.length){$('batchMsg').textContent='حداقل یک ردیف نام فرزند وارد کن.';return}
  let added=0,skipped=[];

    if(duplicatePerson(r.name,r.fatherId,'')){skipped.push(r.name+' (تکراری)');continue}
    const ref=await addDoc(collection(db,'people'),{fullName:r.name,gender:r.gender||'male',lifeStatus:'alive',birthYear:'',birthMonth:'',birthDay:'',fatherId:r.fatherId||'',motherId:r.motherId||'',spouseId:'',createdAt:serverTimestamp(),updatedAt:serverTimestamp(),source:'v251-children-rows'});await logChange('create',ref.id,['fullName','gender','fatherId','motherId'],{personName:r.name,details:'افزودن چند فرزند ردیفی'});added++;

function globalSearchBuild(q=''){const term=String(q||'').trim().toLowerCase();const out=[];const add=(item,hay,score=1)=>{if(!term||String(hay||'').toLowerCase().includes(term))out.push({...item,score})};globalSearchPages().forEach(p=>add({type:'route',...p},`${p.title} ${p.sub} ${p.keys}`,6));peopleCache.forEach(p=>{const father=personName(p.fatherId),mother=personName(p.motherId),sp=spousesOf(p.id).map(x=>x.fullName).join(' '),ch=childrenOf(p.id).map(x=>x.fullName).join(' ');const hay=[p.fullName,father,mother,sp,ch,p.gender==='female'?'زن':'مرد',p.lifeStatus==='dead'?'فوت فوت شده مرده':'زنده',p.birthYear,p.birthMonth,p.birthDay,p.phone,p.job,p.notes].join(' ');add({type:'person',icon:p.lifeStatus==='dead'?'🪦':(p.gender==='female'?'👩':'👤'),title:p.fullName||'بدون نام',sub:`پدر: ${father} | مادر: ${mother} | همسر: ${sp||'ثبت نشده'} | فرزند: ${childrenOf(p.id).length}`,id:p.id},hay,10)});if(isAdmin())usersCache.forEach(u=>add({type:'route',icon:'🔐',title:u.email||'کاربر بدون ایمیل',sub:`کاربر | نقش: ${u.role||'-'} | ${u.approved?'تایید شده':'در انتظار'}`,route:'users'},`${u.email} ${u.displayName} ${u.role} ${u.approved?'تایید شده approved':'در انتظار pending'}`,4));notificationsCache.forEach(n=>add({type:'notif',icon:'✉️',title:n.title||'اعلان',sub:n.message||'',id:n.id},`${n.title} ${n.message} ${n.type}`,3));return out.sort((a,b)=>b.score-a.score).slice(0,70)}
function globalSearchHighlight(text,q){text=esc(text||'');q=String(q||'').trim();if(!q)return text;try{const safe=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return text.replace(new RegExp(safe,'gi'),m=>`<span class="search-highlight">${m}</span>`)}catch{return text}}
function globalSearchRender(){const input=$('globalSearchInput'),box=$('globalSearchResults');if(!input||!box)return;const q=input.value;const list=globalSearchBuild(q);if(!q.trim()){box.innerHTML='<div class="search-empty">برای جستجو تایپ کن...<br>مثلاً نام شخص، پدر، مادر، همسر، فرزند یا نام صفحه را بنویس.</div>';return}if(!list.length){box.innerHTML='<div class="search-empty">نتیجه‌ای پیدا نشد.</div>';return}box.innerHTML=list.map((r,i)=>`<button class="search-result globalSearchItem" data-i="${i}" type="button"><span class="search-result-icon">${r.icon||'🔎'}</span><span class="search-result-body"><span class="search-result-title">${globalSearchHighlight(r.title,q)}</span><span class="search-result-sub">${globalSearchHighlight(r.sub,q)}</span></span></button>`).join('');box.querySelectorAll('.globalSearchItem').forEach(b=>b.onclick=()=>globalSearchOpen(list[Number(b.dataset.i)]))}
