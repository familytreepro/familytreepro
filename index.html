<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شجره نامه</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#0f172a;
  color:white;
  font-family:tahoma;
  text-align:center;
}

.header{
  background:#111827;
  padding:30px 15px;
}

.header h1{
  margin:0;
  color:#22c55e;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:15px;
}

.card{
  background:#1e293b;
  padding:18px;
  border-radius:16px;
  margin-top:18px;
}

input,select,textarea{
  width:90%;
  max-width:400px;
  padding:10px;
  margin:6px;
  border-radius:10px;
  border:1px solid #334155;
  background:#020617;
  color:white;
  font-family:tahoma;
}

textarea{
  min-height:70px;
}

button{
  padding:10px 16px;
  border:none;
  border-radius:10px;
  margin:6px;
  cursor:pointer;
  font-family:tahoma;
  background:#22c55e;
  color:white;
}

.edit{
  background:#3b82f6;
}

.delete{
  background:#ef4444;
}

.person{
  background:#0f172a;
  border-radius:12px;
  padding:12px;
  margin:10px 0;
  text-align:right;
}

.info{
  font-size:13px;
  color:#cbd5e1;
  line-height:1.8;
}

.tree{
  overflow:auto;
  background:#020617;
  border-radius:16px;
  padding:20px;
}

.node{
  display:inline-block;
  min-width:150px;
  padding:14px;
  border-radius:14px;
  margin:10px;
  color:white;
}

.male{
  background:#2563eb;
}

.female{
  background:#db2777;
}

.children{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:16px;
  border-top:2px dashed #475569;
  margin-top:18px;
  padding-top:18px;
}

.line{
  width:3px;
  height:20px;
  background:#475569;
  margin:auto;
}

.stats{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:12px;
}

.stat{
  background:#020617;
  padding:14px;
  border-radius:14px;
  min-width:130px;
}

.stat strong{
  font-size:24px;
  color:#22c55e;
}

.result{
  background:#020617;
  border-radius:12px;
  padding:10px;
  margin:8px;
  text-align:right;
}

@media(max-width:700px){
  .node{
    min-width:130px;
  }
}
</style>
</head>

<body>

<div class="header">
  <h1>🌳 شجره نامه</h1>
  <p>نسخه پایدار</p>
</div>

<div class="container">

<div class="card">
<h2>📊 داشبورد</h2>

<div class="stats">
  <div class="stat">
    👥 کل افراد
    <br>
    <strong id="totalCount">0</strong>
  </div>

  <div class="stat">
    👦 پسرها
    <br>
    <strong id="maleCount">0</strong>
  </div>

  <div class="stat">
    👧 دخترها
    <br>
    <strong id="femaleCount">0</strong>
  </div>

  <div class="stat">
    🌳 نسل‌ها
    <br>
    <strong id="genCount">0</strong>
  </div>
</div>

</div>

<div class="card">
<h2>➕ افزودن فرد</h2>

<input id="name" placeholder="نام">

<select id="gender">
<option value="male">آقا</option>
<option value="female">خانم</option>
</select>

<input id="father" placeholder="نام پدر">
<input id="mother" placeholder="نام مادر">
<input id="spouse" placeholder="نام همسر">

<input id="birthPlace" placeholder="شهر">

<textarea id="notes" placeholder="توضیحات"></textarea>

<br>

<button onclick="addPerson()">افزودن</button>

</div>

<div class="card">
<h2>👶 افزودن فرزند</h2>

<select id="parentSelect"></select>

<input id="childName" placeholder="نام فرزند">

<select id="childGender">
<option value="male">👦 پسر</option>
<option value="female">👧 دختر</option>
</select>

<button onclick="addChild()">افزودن فرزند</button>

</div>

<div class="card">
<h2>🔎 جستجو</h2>

<input id="searchInput" placeholder="جستجو..." oninput="searchPeople()">

<div id="searchResults"></div>

</div>

<div class="card">
<h2>📋 افراد</h2>

<div id="list"></div>

</div>

<div class="card">
<h2>🌳 شجره</h2>

<div id="tree" class="tree"></div>

</div>

</div>

<script>
var people = JSON.parse(localStorage.getItem("people") || "[]");

function save(){
  localStorage.setItem("people", JSON.stringify(people));
  render();
}

function icon(g){
  return g === "male" ? "👦" : "👧";
}

function newId(){
  return Date.now() + Math.floor(Math.random()*9999);
}

function value(id){
  return document.getElementById(id).value.trim();
}

function addPerson(){

  if(!value("name")){
    alert("نام را وارد کنید");
    return;
  }

  people.push({
    id:newId(),
    name:value("name"),
    gender:value("gender"),
    father:value("father"),
    mother:value("mother"),
    spouse:value("spouse"),
    birthPlace:value("birthPlace"),
    notes:value("notes"),
    children:[]
  });

  clearInputs([
    "name",
    "father",
    "mother",
    "spouse",
    "birthPlace",
    "notes"
  ]);

  save();
}

function addChild(){

  var parentId = document.getElementById("parentSelect").value;

  if(!value("childName")){
    alert("نام فرزند را وارد کنید");
    return;
  }

  var parent = findPerson(people,parentId);

  if(!parent){
    alert("ابتدا یک فرد اضافه کنید");
    return;
  }

  parent.children.push({
    id:newId(),
    name:value("childName"),
    gender:value("childGender"),
    father:parent.name,
    mother:"",
    spouse:"",
    birthPlace:"",
    notes:"",
    children:[]
  });

  clearInputs(["childName"]);

  save();
}

function clearInputs(arr){
  arr.forEach(function(id){
    document.getElementById(id).value = "";
  });
}

function findPerson(list,id){

  for(var i=0;i<list.length;i++){

    if(String(list[i].id) === String(id)){
      return list[i];
    }

    var found = findPerson(list[i].children || [],id);

    if(found){
      return found;
    }
  }

  return null;
}

function deletePerson(id){

  if(!confirm("حذف شود؟")){
    return;
  }

  people = removePerson(people,id);

  save();
}

function removePerson(list,id){

  var result = [];

  list.forEach(function(p){

    if(String(p.id) !== String(id)){

      p.children = removePerson(p.children || [],id);

      result.push(p);
    }

  });

  return result;
}

function editName(id){

  var p = findPerson(people,id);

  if(!p) return;

  var n = prompt("نام جدید:",p.name);

  if(n && n.trim()){

    p.name = n.trim();

    save();
  }
}

function renderOptions(list){

  var html = "";

  list.forEach(function(p){

    html += '<option value="'+p.id+'">'+p.name+'</option>';

    html += renderOptions(p.children || []);

  });

  return html;
}

function renderList(list){

  var html = "";

  list.forEach(function(p){

    html += '<div class="person">';

    html += '<strong>'+icon(p.gender)+' '+p.name+'</strong>';

    html += '<div class="info">';
    html += 'پدر: '+(p.father || "-");
    html += ' | مادر: '+(p.mother || "-");
    html += ' | همسر: '+(p.spouse || "-");
    html += '<br>';
    html += 'شهر: '+(p.birthPlace || "-");
    html += '<br>';
    html += 'توضیحات: '+(p.notes || "-");
    html += '</div>';

    html += '<button class="edit" onclick="editName('+p.id+')">ویرایش</button>';

    html += '<button class="delete" onclick="deletePerson('+p.id+')">حذف</button>';

    html += '<div style="margin-right:25px">';
    html += renderList(p.children || []);
    html += '</div>';

    html += '</div>';

  });

  return html;
}

function renderTreeNode(p){

  var cls = p.gender === "male" ? "male" : "female";

  var html = '<div>';

  html += '<div class="node '+cls+'">';

  html += '<div style="font-size:20px">';
  html += icon(p.gender)+' '+p.name;
  html += '</div>';

  html += '<div class="info">';
  html += 'پدر: '+(p.father || "-");
  html += '<br>';
  html += 'همسر: '+(p.spouse || "-");
  html += '</div>';

  html += '</div>';

  if(p.children && p.children.length){

    html += '<div class="line"></div>';

    html += '<div class="children">';

    p.children.forEach(function(c){

      html += renderTreeNode(c);

    });

    html += '</div>';
  }

  html += '</div>';

  return html;
}

function renderTree(){

  if(!people.length){

    return "<p>هنوز فردی ثبت نشده است.</p>";
  }

  var html = "";

  people.forEach(function(p){

    html += renderTreeNode(p);

  });

  return html;
}

function allPeople(list){

  var all = [];

  list.forEach(function(p){

    all.push(p);

    all = all.concat(allPeople(p.children || []));

  });

  return all;
}

function generationCount(list){

  if(!list.length){
    return 0;
  }

  var max = 0;

  list.forEach(function(p){

    var d = generationCount(p.children || []);

    if(d > max){
      max = d;
    }

  });

  return max + 1;
}

function renderStats(){

  var all = allPeople(people);

  var males = all.filter(function(p){
    return p.gender === "male";
  }).length;

  var females = all.filter(function(p){
    return p.gender === "female";
  }).length;

  document.getElementById("totalCount").innerText = all.length;

  document.getElementById("maleCount").innerText = males;

  document.getElementById("femaleCount").innerText = females;

  document.getElementById("genCount").innerText =
    generationCount(people);
}

function flatten(list,path){

  var all = [];

  list.forEach(function(p){

    var current =
      path ? path + " ← " + p.name : p.name;

    p.path = current;

    all.push(p);

    all = all.concat(
      flatten(p.children || [],current)
    );

  });

  return all;
}

function searchPeople(){

  var s =
    document.getElementById("searchInput")
    .value
    .trim()
    .toLowerCase();

  var box =
    document.getElementById("searchResults");

  if(!s){

    box.innerHTML = "";

    return;
  }

  var results =
    flatten(people,"").filter(function(p){

      return (
        (p.name || "")
        .toLowerCase()
        .includes(s)
      );

    });

  if(!results.length){

    box.innerHTML =
      "<p>نتیجه‌ای پیدا نشد.</p>";

    return;
  }

  box.innerHTML =
    results.map(function(p){

      return '<div class="result">'+
      '<strong>'+
      icon(p.gender)+' '+p.name+
      '</strong><br>'+
      '<small>'+p.path+'</small>'+
      '</div>';

    }).join("");
}

function render(){

  document.getElementById("parentSelect")
  .innerHTML = renderOptions(people);

  document.getElementById("list")
  .innerHTML = renderList(people);

  document.getElementById("tree")
  .innerHTML = renderTree();

  renderStats();
}

render();
</script>

</body>
</html>
